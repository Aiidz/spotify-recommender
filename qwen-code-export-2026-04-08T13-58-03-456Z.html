                "newText": "# рҹҺө Spotify Music Recommendation System\n\nA university project that builds an **interactive music recommendation system** using a Spotify dataset of ~114,000 tracks. Built entirely in **Java** with a **JavaFX GUI** styled as a retro ASCII terminal.\n\n---\n\n## рҹ“Ӣ Table of Contents\n\n- [Features](#-features)\n- [How It Works](#-how-it-works)\n- [Quick Start](#-quick-start)\n- [Installation](#-installation)\n- [Usage Guide](#-usage-guide)\n- [Project Structure](#-project-structure)\n- [Architecture (MVC)](#-architecture-mvc)\n- [OOP Principles](#-oop-principles)\n- [Merge Sort](#-merge-sort)\n- [Scoring Formula](#-scoring-formula)\n- [Troubleshooting](#-troubleshooting)\n- [Tech Stack](#-tech-stack)\n\n---\n\n## вңЁ Features\n\n- рҹ”Қ **Multi-Genre Filtering** вҖ” Select one or more genres to discover matching tracks\n- рҹ“Ҡ **Popularity Filter** вҖ” Optionally set a minimum popularity threshold (0вҖ“100)\n- рҹҺҡпёҸ **Sortable Results** вҖ” Sort by Vibe Score, Popularity, Danceability, Energy, or Valence\n- вҡЎ **Merge Sort** вҖ” Custom O(n log n) sorting algorithm implemented from scratch\n- рҹ–ҘпёҸ **Retro ASCII Terminal UI** вҖ” White and light-blue styled GUI with monospaced fonts\n- рҹ“Ҳ **Top 10 Results** вҖ” Clean ASCII table output with track rankings and composite scores\n- рҹ“Ұ **~114K Tracks** вҖ” Full dataset loaded in memory for instant query results\n\n---\n\n## рҹ§  How It Works\n\n1. **At startup**, the system loads ~114,000 tracks from a CSV dataset into memory\n2. **You select** one or more genres from the alphabetical list (Ctrl+Click for multiple)\n3. **Optionally** set a minimum popularity number (e.g., `50` means only tracks with popularity вүҘ 50)\n4. **Choose** how to sort the results from the dropdown\n5. **Click RECOMMEND** вҶ’ the system filters tracks, sorts them, and displays the Top 10 as a formatted ASCII table\n\n**Behind the scenes:**\n\n```\nCSV File в”Җв”Җв–ә TrackRepository (loads \u0026 parses)\n                в”Ӯ\n                в–ј\n         List\u003cTrackRecord\u003e (~114K objects)\n                в”Ӯ\n                в–ј  в”Ңв”Җ filterByGenres(selectedGenres)\n     RecommendationEngine в”ңв”Җ filterByPopularity(minPopularity)\n                в”Ӯ          в””в”Җ sortBy(field) в”Җв”Җв–ә MergeSort (O(n log n))\n                в–ј\n         formatTopN(filtered, 10) в”Җв”Җв–ә ASCII Table String\n                в”Ӯ\n                в–ј\n         TerminalView displays results\n```\n\n---\n\n## рҹҡҖ Quick Start\n\n### Prerequisites\n\n| Requirement | Version | Notes |\n|-------------|---------|-------|\n| **Java JDK** | 17+ (tested with 25) | Adoptium/Temurin recommended |\n| **JavaFX SDK** | 21+ (tested with 26) | Separate download, see below |\n\n### Install Java\n\nIf you don't have Java installed, download **Temurin JDK** from:\nрҹ‘ү https://adoptium.net/\n\nVerify installation:\n\n```cmd\njavac -version\njava -version\n```\n\n### Install JavaFX SDK\n\nJavaFX is **not** bundled with Java. Download it separately:\n\n1. Go to https://gluonhq.com/products/javafx/\n2. Download the **Windows SDK** zip\n3. Extract it to a simple path, e.g. `C:\\javafx-sdk-26\\`\n\nVerify the extraction worked:\n\n```\nC:\\javafx-sdk-26\\lib\\javafx.controls.jar  вҶҗ this file must exist\nC:\\javafx-sdk-26\\lib\\javafx.fxml.jar      вҶҗ this too\n```\n\n### Configure \u0026 Build\n\n1. Open `build.bat` in a text editor\n2. Set your **Java path** and **JavaFX path** at the top:\n\n```bat\nset JAVA_HOME=C:\\Program Files\\Eclipse Adoptium\\jdk-25.0.2.10-hotspot\nset JAVAFX_LIB=C:\\javafx-sdk-26\\lib\n```\n\n3. Open a terminal in the project folder and run:\n\n```cmd\nbuild.bat          вҶҗ compiles the project\nbuild.bat run      вҶҗ compiles (if needed) and launches the app\n```\n\nThat's it. A window will appear.\n\n---\n\n## рҹ“– Usage Guide\n\n### Main Window Layout\n\n```\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\nв•‘          Spotify Music Recommendation System             в•‘\nв•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\n\nв”Ңв”Җв”Җв”Җ GENRES (Multi-select) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ в–Ў acoustic                                               в”Ӯ\nв”Ӯ в–Ў afrobeat                                               в”Ӯ\nв”Ӯ в–Ў alternative                                            в”Ӯ\nв”Ӯ ... (114 genres total, alphabetical)                     в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nMIN POPULARITY: [____]     SORT BY: [VIBE_SCORE в–ј]\n\n[в–ә RECOMMEND]  [вң• CLEAR]  [вҳҗ SELECT ALL GENRES]\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist   в”Ӯ Genre   в”Ӯ Score в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ    1 в”Ӯ Comedy                   в”Ӯ Gen H... в”Ӯ acousticв”Ӯ  72.4 в”Ӯ\nв”Ӯ    2 в”Ӯ Ghost - Acoustic         в”Ӯ Ben W... в”Ӯ acousticв”Ӯ  65.1 в”Ӯ\nв”Ӯ   ...в”Ӯ                          в”Ӯ          в”Ӯ         в”Ӯ       в”Ӯ\nв”Ӯ   10 в”Ӯ ...                      в”Ӯ          в”Ӯ         в”Ӯ       в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Controls\n\n| Control | What it does |\n|---------|-------------|\n| **Genre List** | Select one or more genres with **Ctrl+Click** (individual) or **Shift+Click** (range) |\n| **Min Popularity** | Optional. Type a number 0вҖ“100. Leave empty to skip this filter |\n| **Sort By** | Dropdown to choose the sort field (see below) |\n| **RECOMMEND** | Execute the search and display results |\n| **CLEAR** | Reset all selections and results |\n| **SELECT ALL GENRES** | Select every genre at once |\n\n### Sort Options\n\n| Sort Field | Description |\n|------------|-------------|\n| **VIBE_SCORE** | Composite score (popularity + danceability + energy + valence). **Default and recommended choice** |\n| **POPULARITY** | Raw Spotify popularity (0вҖ“100). Most popular tracks first |\n| **DANCEABILITY** | Tracks best suited for dancing |\n| **ENERGY** | Most intense / energetic tracks |\n| **VALENCE** | Most positive / happy-sounding tracks |\n\n### Example Queries\n\n**\"I want upbeat pop music\"**\n1. Select `pop` and `dance` genres\n2. Set Min Popularity to `60`\n3. Sort by `ENERGY`\n4. Click RECOMMEND\n\n**\"Show me the best acoustic tracks overall\"**\n1. Select `acoustic`\n2. Leave Min Popularity empty\n3. Sort by `VIBE_SCORE`\n4. Click RECOMMEND\n\n**\"I want chill vibes across multiple genres\"**\n1. Select `ambient`, `chill`, `lo-fi`\n2. Set Min Popularity to `40`\n3. Sort by `VALENCE`\n4. Click RECOMMEND\n\n---\n\n## рҹ“Ғ Project Structure\n\n```\nDSA_PROJECT/\nв”Ӯ\nв”ңв”Җв”Җ README.md                          вҶҗ You are here\nв”ңв”Җв”Җ build.bat                          вҶҗ Compile \u0026 run script\nв”Ӯ\nв”ңв”Җв”Җ dataset/\nв”Ӯ   в””в”Җв”Җ dataset.csv                    (~19MB, 114K tracks)\nв”Ӯ\nв”ңв”Җв”Җ out/                               вҶҗ Compiled .class files (auto-generated)\nв”Ӯ   в””в”Җв”Җ spotify/\nв”Ӯ       в”ңв”Җв”Җ Main.class\nв”Ӯ       в”ңв”Җв”Җ model/\nв”Ӯ       в”ңв”Җв”Җ repository/\nв”Ӯ       в”ңв”Җв”Җ controller/\nв”Ӯ       в””в”Җв”Җ view/\nв”Ӯ           в””в”Җв”Җ terminal.css\nв”Ӯ\nв””в”Җв”Җ src/spotify/\n    в”ңв”Җв”Җ Main.java                      вҶҗ Application entry point\n    в”Ӯ\n    в”ңв”Җв”Җ model/\n    в”Ӯ   в”ңв”Җв”Җ AudioEntity.java           вҶҗ Interface (Abstraction)\n    в”Ӯ   в”ңв”Җв”Җ BaseEntity.java            вҶҗ Abstract class (Encapsulation + Inheritance)\n    в”Ӯ   в””в”Җв”Җ TrackRecord.java           вҶҗ Concrete class (Polymorphism)\n    в”Ӯ\n    в”ңв”Җв”Җ repository/\n    в”Ӯ   в””в”Җв”Җ TrackRepository.java       вҶҗ CSV loading \u0026 parsing\n    в”Ӯ\n    в”ңв”Җв”Җ controller/\n    в”Ӯ   в”ңв”Җв”Җ MergeSorter.java           вҶҗ Generic Merge Sort from scratch\n    в”Ӯ   в””в”Җв”Җ RecommendationEngine.java  вҶҗ Filtering, scoring, sorting\n    в”Ӯ\n    в””в”Җв”Җ view/\n        в”ңв”Җв”Җ TerminalView.java          вҶҗ JavaFX UI construction\n        в””в”Җв”Җ terminal.css               вҶҗ Retro terminal stylesheet\n```\n\n---\n\n## рҹҸ—пёҸ Architecture (MVC)\n\nThe project follows the **Model-View-Controller** pattern:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    MVC Architecture                   в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  MODEL   в”Ӯ    CONTROLLER        в”Ӯ       VIEW         в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ                    в”Ӯ\nв”Ӯ Audio-   в”Ӯ TrackRepository      в”Ӯ TerminalView       в”Ӯ\nв”Ӯ Entity   в”Ӯ  в””в”Җ loadTracks()     в”Ӯ  в””в”Җ buildScene()   в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ  в””в”Җ handleRecommend()в”Ӯ\nв”Ӯ Base-    в”Ӯ RecommendationEngine в”Ӯ                    в”Ӯ\nв”Ӯ Entity   в”Ӯ  в”ңв”Җ filterByGenres() в”Ӯ  JavaFX components в”Ӯ\nв”Ӯ          в”Ӯ  в”ңв”Җ filterByPop()    в”Ӯ  ASCII table       в”Ӯ\nв”Ӯ Track-   в”Ӯ  в”ңв”Җ sortBy() в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә  CSS styling       в”Ӯ\nв”Ӯ Record   в”Ӯ  в”ңв”Җ formatTopN()     в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ  в””в”Җ getAllGenres()   в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ MergeSorter          в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ  в””в”Җ sort()           в”Ӯ                    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n| Layer | Responsibility |\n|-------|---------------|\n| **Model** | Data classes (`AudioEntity`, `BaseEntity`, `TrackRecord`) that represent a track |\n| **Controller** | Business logic: CSV loading, filtering, sorting, scoring, formatting |\n| **View** | JavaFX UI: layout, controls, event handlers, ASCII table display |\n\n---\n\n## рҹҺ“ OOP Principles\n\nThis project demonstrates all four core OOP principles:\n\n| Principle | Where | How |\n|-----------|-------|-----|\n| **Abstraction** | `AudioEntity.java` | Interface defines *what* a track can do, not *how*. The engine sorts any `AudioEntity` without knowing its internals |\n| **Encapsulation** | `BaseEntity.java` | All 13 fields are `private`. External code accesses them only through getters/setters |\n| **Inheritance** | `TrackRecord extends BaseEntity` | `TrackRecord` inherits all fields and the `calculateVibeScore()` method from `BaseEntity` |\n| **Polymorphism** | `toAsciiRow(int rank)` | Declared as `abstract` in `BaseEntity`, implemented in `TrackRecord`. The View calls `entity.toAsciiRow()` on any `AudioEntity` reference вҖ” the correct implementation runs at runtime |\n\n---\n\n## рҹ”Җ Merge Sort\n\n### Why Merge Sort?\n\n- **Guaranteed O(n log n)** time complexity in all cases (best, average, worst)\n- **Stable sort** вҖ” equal elements preserve their original order\n- Clean divide-and-conquer structure that's ew** terminal after installing Java\n\n### Compilation errors about `javafx.application`\n\n```\nerror: package javafx.application is not visible\n```\n\n**Fix:** This means the `--module-path` and `--add-modules` flags aren't being passed to `javac`. Ensure `JAVAFX_LIB` is set correctly in `build.bat` and use `build.bat` (not raw `javac`) to compile.\n\n### App window doesn't appear\n\n- Check the terminal for error messages\n- Ensure the CSV file exists at `dataset/dataset.csv` relative to the project folder\n- The dataset is ~19MB and 114K rows вҖ” loading takes 2вҖ“5 seconds. Wait for the window to appear.\n\n### \"No matching tracks found\"\n\n- Try selecting a different genre\n- Check if your **Min Popularity** filter is too high (e.g., `95` may return very few results)\n- Some genres have fewer tracks than others\n\n---\n\n## рҹ’» Tech Stack\n\n| Technology | Version | Purpose |\n|------------|---------|---------|\n| **Java (Temurin)** | 25 LTS | Programming language |\n| **JavaFX** | 26 | GUI framework |\n| **CSV Dataset** | Spotify ~114K tracks | Music data source |\n\n### External Dependencies\n\n**None.** The project uses only:\n- Java Standard Library (`java.io`, `java.nio`, `java.util`)\n- JavaFX (`javafx.controls`, `javafx.fxml`)\n\nNo third-party libraries (no OpenCSV, no Maven, no Gradle).\n\n---\n\n## рҹ“қ Dataset\n\nThe project uses a Spotify dataset CSV file with the following columns:\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `track_id` | String | Unique Spotify ID |\n| `artists` | String | Artist name(s) |\n| `album_name` | String | Album title |\n| `track_name` | String | Song title |\n| `popularity` | int (0вҖ“100) | Spotify popularity metric |\n| `duration_ms` | long | Track length in milliseconds |\n| `explicit` | boolean | Explicit content flag |\n| `danceability` | double (0.0вҖ“1.0) | Danceability metric |\n| `energy` | double (0.0вҖ“1.0) | Energy / intensity metric |\n| `valence` | double (0.0вҖ“1.0) | Musical positiveness |\n| `track_genre` | String | Single genre classification |\n\nThe dataset contains **114 unique genres** and **~114,000 tracks**.\n\n---\n\n## рҹ‘Ө Author\n\nUniversity project вҖ” Data Structures \u0026 Algorithms course.\n\n---\n\n## рҹ“„ License\n\nEducational use only. Dataset sourced from Spotify for academic purposes.\n"

t go through getters and setters. This is **data hiding** вҖ” the internal state is protected.\"\n\n```java\npublic abstract class BaseEntity implements AudioEntity {\n    private String trackId;        // вҶҗ private\n    private int popularity;         // вҶҗ private\n    private double danceability;    // вҶҗ private\n    // ... 10 more private fields\n\n    public int getPopularity() { return popularity; }  // вҶҗ controlled access\n    public void setPopularity(int p) { this.popularity = p; }  // вҶҗ controlled mutation\n}\n```\n\n#### 3. Inheritance вҖ” `TrackRecord extends BaseEntity`\n\n\u003e \"`TrackRecord` doesn't re-declare `trackId`, `popularity`, or `danceability`. It **inherits** them from `BaseEntity` through `super(...)`. It also inherits `getCompositeScore()`. It only adds what's unique to it вҖ” the `toAsciiRow()` formatting.\"\n\n```java\npublic class TrackRecord extends BaseEntity {\n    public TrackRecord(...) {\n        super(trackId, trackName, artists, ...);  // вҶҗ calls parent constructor\n    }\n}\n```\n\n#### 4. Polymorphism вҖ” `toAsciiRow(int rank)`\n\n\u003e \"This is the polymorphic method. It's declared as **abstract** in `BaseEntity` and **overridden** in `TrackRecord`. When the Controller calls `entity.toAsciiRow(rank)`, it doesn't know the concrete type вҖ” it just knows it's an `AudioEntity`. At runtime, Java resolves it to `TrackRecord`'s implementation. If we later added `PodcastRecord extends BaseEntity`, the same Controller code would work without changes.\"\n\n```java\n// In BaseController:\npublic String formatTopN(List\u003c? extends AudioEntity\u003e results, int n) {\n    for (int i = 0; i \u003c n; i++) {\n        sb.append(results.get(i).toAsciiRow(i + 1));  // вҶҗ polymorphic call\n    }\n}\n```\n\n---\n\n### Slide 5 вҖ” Data Structure Design (2 minutes)\n\n**What to say:**\n\n\u003e \"Let me explain how data flows through the system from file to screen.\"\n\n| Step | Data Structure | Why |\n|------|---------------|-----|\n| **CSV File** | Raw text (19MB, 114K lines) | Persistent storage |\n| **Loading** | `BufferedReader` + `ArrayList\u003cString\u003e` (parsed fields) | Stream-based, line-by-line parsing вҖ” no loading entire file into a String |\n| **In Memory** | `List\u003cTrackRecord\u003e` (ArrayList of objects) | O(1) indexed access, cache-friendly iteration |\n| **Genre Lookup** | `TreeSet\u003cString\u003e` вҶ’ converted to `ArrayList\u003cString\u003e` | `TreeSet` auto-sorts genres alphabetically; converted to `ArrayList` for ListView display |\n| **Filtering** | New `ArrayList\u003cTrackRecord\u003e` (subset) | Creates a new list вҖ” original is untouched |\n| **Sorting** | In-place on the filtered `ArrayList` | Merge Sort uses an auxiliary `Object[]` array вҖ” sorts the existing list without copying |\n\n\u003e \"We chose `ArrayList` over `LinkedList` because: we iterate sequentially for filtering, and Merge Sort accesses by index during the merge step. `ArrayList` gives O(1) random access вҖ” `LinkedList` would degrade Merge Sort to O(nВІ).\"\n\n---\n\n### Slide 6 вҖ” The Sorting Algorithm: Merge Sort (3 minutes)\n\n**What to say:**\n\n\u003e \"We implemented Merge Sort **from scratch** вҖ” no `Collections.sort`, no `Arrays.sort`. Here's why, how, and how fast it is.\"\n\n#### Why Merge Sort?\n\n| Algorithm | Best | Average | Worst | Stable? |\n|-----------|------|---------|-------|---------|\n| Bubble Sort | O(n) | O(nВІ) | O(nВІ) | Yes |\n| Quick Sort | O(n log n) | O(n log n) | **O(nВІ)** | No |\n| **Merge Sort** | **O(n log n)** | **O(n log n)** | **O(n log n)** | **Yes** |\n\n\u003e \"Merge Sort is the only common sort that guarantees O(n log n) in **all cases**. For a university project on sorting algorithms, it's the most defensible choice.\"\n\n#### How It Works вҖ” Visual:\n\n```\nStep 1: DIVIDE вҖ” Keep splitting in half until single elements\n[8, 3, 7, 1, 5, 2, 9, 4]\n[8, 3, 7, 1]        [5, 2, 9, 4]\n[8, 3]  [7, 1]      [5, 2]  [9, 4]\n[8][3]  [7][1]      [5][2]  [9][4]   вҶҗ 8 single-element lists\n\nStep 2: CONQUER вҖ” Merge pairs back together in sorted order\n[3, 8]  [1, 7]      [2, 5]  [4, 9]\n[1, 3, 7, 8]        [2, 4, 5, 9]\n[1, 2, 3, 4, 5, 7, 8, 9]    вҶҗ fully sorted\n```\n\n#### Time Complexity Proof:\n\n```\nT(n) = 2В·T(n/2) + O(n)     вҶҗ divide into 2 halves + merge costs O(n)\n\nLevel 0:           n         вҶҗ 1 problem of size n\nLevel 1:      n/2     n/2    вҶҗ 2 problems of size n/2\nLevel 2:   n/4  n/4  n/4 n/4 вҶҗ 4 problems of size n/4\n  ...\nLevel k:  1 1 1 1 1 1 1 1    вҶҗ n problems of size 1\n\nHeight of tree = logвӮӮ(n)\nWork per level = O(n)  (every element touched once)\nTotal = O(n) Г— O(log n) = O(n log n)\n```\n\n#### Performance on Our Data:\n\n\u003e \"On our 114K dataset, sorting a filtered subset of ~1,000 tracks takes **under 10 milliseconds**. The full sort operation is displayed in the status bar of the UI.\"\n\n---\n\n### Slide 7 вҖ” Real-World Scenario: Why Merge Sort Matters (2 minutes)\n\n**What to say:**\n\n\u003e \"Let me give a real-world scenario where Merge Sort is the right choice over Quick Sort.\"\n\n\u003e \"Imagine **Spotify's internal playlist ranking**. When a user applies filters вҖ” say, 'show me my top workout songs' вҖ” the system needs to sort thousands of tracks. If they use Quick Sort and hit the worst-case O(nВІ) scenario, a sort that normally takes 5ms could take **2 seconds**. In a real-time music app, that's a noticeable lag. Merge Sort's **guaranteed O(n log n)** means predictable, consistent performance вҖ” no matter what data you throw at it.\"\n\n\u003e \"Merge Sort is also used in:\n\u003e - **Java's `Collections.sort()`** (it's actually TimSort, a Merge Sort variant)\n\u003e - **Python's `sorted()`** (also TimSort)\n\u003e - **External sorting** вҖ” when data is too large for RAM, Merge Sort can sort data stored on disk by merging sorted chunks\n\u003e - **Database engines** вҖ” SQL `ORDER BY` often uses merge-based sorting\"\n\n---\n\n### Slide 8 вҖ” Live Demo (2-3 minutes)\n\n\u003e \"Let me demonstrate the running application.\"\n\n**Demo script:**\n\n1. Launch the app: `build.bat run`\n2. Say: \"The app is loading 114,000 tracks from the CSV. You can see the loading screen.\"\n3. Window appears. Say: \"Here's our main interface вҖ” styled like a retro ASCII terminal with white and light-blue theming.\"\n4. Ctrl+Click `pop` and `dance` genres. Say: \"I'm selecting multiple genres using Ctrl+Click вҖ” this is our multi-genre OR logic.\"\n5. Type `50` in Min Popularity. Say: \"Setting minimum popularity to 50 вҖ” this filters out obscure tracks.\"\n6. Change Sort By to `ENERGY`. Say: \"I'll sort by Energy вҖ” this means the highest-intensity tracks appear first.\"\n7. Click **RECOMMEND**. Say: \"And here are the Top 10 results. Notice the status bar shows how many tracks matched and the sort time.\"\n8. Point out: \"The ASCII table is formatted with Unicode box-drawing characters вҖ” all rendered in a JavaFX TextArea with a monospaced font.\"\n\n---\n\n### Slide 9 вҖ” Closing / Summary (30 seconds)\n\n\u003e \"In summary, our Spotify Recommendation System demonstrates:\n\u003e - **Structured AI-assisted development** вҖ” analysis before implementation, human-controlled architecture\n\u003e - **Clean OOP design** вҖ” all four principles demonstrated with traceable code\n\u003e - **Efficient sorting** вҖ” Merge Sort at O(n log n) with a full complexity proof\n\u003e - **Practical data management** вҖ” 114K tracks, filtered, scored, and ranked in milliseconds\n\u003e\n\u003e Thank you. We're happy to take questions.\"\n\n---\n\n## рҹ§  Q\u0026A Cheat Sheet вҖ” Anticipated Questions\n\n### About OOP\n\n**Q: Why use an interface AND an abstract class? Isn't that redundant?**\n\n\u003e \"No вҖ” they serve different purposes. The **interface** (`AudioEntity`) defines the *contract* вҖ” it says what operations any audio entity must support, without any implementation. The **abstract class** (`BaseEntity`) provides *shared implementation* вҖ” the 13 private fields, getters, setters, and the `getCompositeScore()` formula. If I only used the interface, every class would duplicate the field declarations and getters. If I only used the abstract class, I couldn't later have a class that extends something else AND implements AudioEntity. The combination gives maximum flexibility.\"\n\n**Q: Where is polymorphism actually used in the code?**\n\n\u003e \"In `RecommendationEngine.formatTopN()`. The method accepts a `List\u003cTrackRecord\u003e`, but it calls `entity.toAsciiRow(rank)` through the `AudioEntity` interface reference. If we later add `PodcastRecord extends BaseEntity`, the same `formatTopN()` method works without any changes вҖ” that's polymorphism in action. The calling code doesn't need to know the concrete type.\"\n\n**Q: Is encapsulation just making fields private?**\n\n\u003e \"Making fields private is the mechanism, but the purpose is **controlled access**. By using getters and setters, we can add validation later вҖ” for example, in `setPopularity()`, we could reject values outside 0-100. If the field were public, any code could set it to -500 or 99999 with no guard. Getters/setters are the door вҖ” you can put a bouncer behind it.\"\n\n---\n\n### About Merge Sort\n\n**Q: Why not use `Collections.sort()` which is already optimized?**\n\n\u003e \"Two reasons. First, this is a **data structures and algorithms course** вҖ” the point is to demonstrate understanding of the algorithm, not call a library method. Second, `Collections.sort()` uses TimSort, which is a hybrid of Merge Sort and Insertion Sort. By implementing Merge Sort from scratch, we show we understand the divide-and-conquer principle, the recurrence relation, and the merge step вҖ” which is what the assignment is testing.\"\n\n**Q: What happens if two tracks have the exact same score? Does the order matter?**\n\n\u003e \"Merge Sort is a **stable sort** вҖ” meaning if two elements compare as equal, their original relative order is preserved. In our code, the `merge()` method uses `\u003c=` when comparing, which prefers the left element on ties. So if Track A and Track B both have a Vibe Score of 72.4, and A appeared before B in the filtered list, A will still appear before B after sorting. This matters for reproducibility and predictable results.\"\n\n**Q: What's the space complexity of your Merge Sort? Is O(n) memory a problem for 114K tracks?**\n\n\u003e \"The space complexity is O(n) because we allocate an auxiliary `Object[]` array of the same size as the list being sorted. For 114K tracks, that's 114K object references вҖ” roughly 456KB on a 64-bit JVM (4 bytes per reference). The actual TrackRecord objects already exist in memory вҖ” the auxiliary array just holds references, not copies. So the memory overhead is negligible. Even if we sorted the entire 114K list, the extra memory would be under 1MB.\"\n\n**Q: Could you implement Merge Sort iteratively instead of recursively?**\n\n\u003e \"Yes. The iterative version uses a bottom-up approach: start by merging pairs of single elements, then pairs of 2-element sorted subarrays, then pairs of 4-element subarrays, doubling the width each iteration. It avoids recursion and the call stack overhead. The time complexity is still O(n log n), and space is still O(n). I chose the recursive version because it's more readable and directly mirrors the mathematical recurrence relation вҖ” which makes it easier to explain and defend.\"\n\n---\n\n### About Data Structures\n\n**Q: Why ArrayList instead of LinkedList?**\n\n\u003e \"Two reasons. First, Merge Sort accesses elements by index during the merge step (`list.get(i)`). On an ArrayList, `get(i)` is O(1). On a LinkedList, `get(i)` is O(n) because it walks the chain from the head. Using LinkedList would turn Merge Sort's merge step from O(n) to O(nВІ), destroying the algorithm's advantage. Second, ArrayList has better cache locality вҖ” the backing array is contiguous in memory, so CPU prefetching works efficiently.\"\n\n**Q: How much memory does 114K TrackRecord objects use?**\n\n\u003e \"Each TrackRecord has: 3 String references + 1 int + 1 long + 1 boolean + 3 doubles вүҲ 13 fields. On a 64-bit JVM with compressed oops, that's roughly 13 Г— 4 = 52 bytes per object + 16 bytes header + String object overhead. Conservatively, ~150-200 bytes per track. For 114K tracks: 114,000 Г— 200 = ~23MB. Plus the ArrayList backing array (~456KB) and the JVM overhead. Total: well under 100MB вҖ” trivial for modern machines.\"\n\n**Q: What if the CSV file had 10 million rows instead of 114K? Would your approach still work?**\n\n\u003e \"Loading 10 million objects into memory would use ~2GB of RAM, which is possible but wasteful. For that scale, I'd switch to: (1) streaming the CSV and building a **genre-indexed HashMap** вҖ” `Map\u003cString, List\u003cInteger\u003e\u003e` where the integers are file offsets, (2) loading only matching genres into memory on demand, or (3) using a database with indexed queries. The current in-memory ArrayList approach is appropriate for 114K but doesn't scale to millions.\"\n\n---\n\n### About AI Utilization\n\n**Q: Did the AI write this code, or did you?**\n\n\u003e \"The AI generated the code, but **we architected every decision**. Before any code was written, we: analyzed the dataset structure, identified missing columns, asked 12 specific design questions, and approved a file-by-file architecture plan. The AI is the typist; we are the architects. We can explain every class, every method, every algorithm вҖ” as demonstrated by this presentation.\"\n\n**Q: Why did the AI choose this specific OOP structure? Could it have been simpler?**\n\n\u003e \"The AI chose interface + abstract class + concrete class because it demonstrates all four OOP principles in the most pedagogically clear way. A simpler approach would be a single `Track` class with no inheritance вҖ” but that wouldn't demonstrate Abstraction (no interface), Inheritance (no parent class), or Polymorphism (no override). The three-layer hierarchy is the minimum structure needed to showcase all four principles, which is exactly what a university project requires.\"\n\n**Q: What would you change if you did this project again?**\n\n\u003e \"Three things: (1) Add **unit tests** вҖ” we'd write JUnit tests for Merge Sort correctness, filter logic, and Vibe Score calculation. (2) Add **lazy loading** вҖ” instead of loading all 114K tracks at startup, build a genre index and load on demand for faster startup. (3) Add **more sort stability documentation** вҖ” we'd include a unit test proving that equal elements preserve their original order.\"\n\n---\n\n### About the Scoring Formula\n\n**Q: Why equal weights? Isn't popularity more important than valence?**\n\n\u003e \"Equal weights were a design choice for simplicity and fairness. Popularity measures how many people listen to a track вҖ” it's a social signal. Valence measures musical positiveness вҖ” it's an audio feature. They're fundamentally different dimensions. Giving them equal weight means the Vibe Score is a true average of all four factors. If we weighted popularity at 40%, the Vibe Score would be nearly identical to popularity alone, making the other three metrics irrelevant. Equal weights ensure all four features contribute meaningfully.\"\n\n**Q: How would you validate that the Vibe Score actually recommends 'good' music?**\n\n\u003e \"I'd run an **A/B test**: show two groups of users recommendations вҖ” one sorted by raw popularity, one sorted by our Vibe Score вҖ” and measure which group skips fewer tracks and listens longer. If Vibe Score works, users should stay engaged longer because the recommendations match not just what's popular, but what has the right energy, danceability, and mood for their context.\"\n\n---\n\n## вҸұпёҸ Time Management Guide\n\n| Section | Target Time | Slide |\n|---------|------------|-------|\n| Introduction | 30 sec | Slide 1 |\n| Prompt Strategy / AI | 2 min | Slide 2 |\n| Architecture (MVC) | 2 min | Slide 3 |\n| OOP Deep Dive | 3 min | Slide 4 |\n| Data Structure | 2 min | Slide 5 |\n| Merge Sort | 3 min | Slide 6 |\n| Real-World Scenario | 2 min | Slide 7 |\n| Live Demo | 2-3 min | Slide 8 |\n| Closing | 30 sec | Slide 9 |\n| **Total** | **~18 minutes** | |\n\n\u003e If you have a **10-minute limit**, cut Slides 7 and 8 to 1 minute each, and trim the OOP section to 2 minutes.\n\n---\n\n## рҹ’Ў Delivery Tips\n\n1. **Don't read the slides.** Use them as visual aids вҖ” speak to the audience, not the screen.\n2. **Point at the code.** When explaining OOP, open the actual Java files and highlight the relevant lines.\n3. **Practice the live demo.** Run it at least 3 times before the presentation. Know exactly which genres to click.\n4. **If you get stuck on a question:** \"That's a great question. Based on our implementation, the answer is...\" (buy yourself 3 seconds to think).\n5. **Divide among group members clearly.** Each person should own 1-2 sections and be able to answer follow-ups on their part.\n6. **Transitions:** \"Now that [Name] has explained the architecture, I'll walk you through how the sorting algorithm works.\"\n\n---\n\nWant me to create speaker notes as individual cue cards you can print, or prepare this as a slide deck (PowerPoint/Google Slides format)?"

                "text": "# How The Program Works вҖ” Plain English\n\n## Imagine a Music Store\n\nThink of the program like walking into a **giant music store** with 114,000 CDs on the wall.\n\n---\n\n## Step 1 вҖ” Startup: Stocking the Shelves\n\nWhen you launch the app, the first thing it does is:\n\n\u003e **Open the CSV file вҶ’ Read every single row вҶ’ Create a \"card\" for each song вҶ’ Put all 114,000 cards in a big box in memory.**\n\nThat CSV file is just a spreadsheet. Each row is one song. The program reads it line by line, pulls out the song name, artist, genre, popularity number, etc., and turns each row into a neat little object it can work with.\n\n**Takes about 2вҖ“5 seconds.** That's the loading screen you see.\n\n---\n\n## Step 2 вҖ” The Frontend: You Walk Into the Store\n\nThe window that pops up is the **storefront**. Here's what you see:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ        SPOTIFY RECOMMENDATION SYSTEM        в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                             в”Ӯ\nв”Ӯ  GENRES:                                    в”Ӯ\nв”Ӯ  вҳҗ acoustic    вҳҗ pop     вҳҗ rock    вҳҗ jazz  в”Ӯ\nв”Ӯ  вҳҗ hip-hop     вҳҗ metal   вҳҗ country вҳҗ ...   в”Ӯ\nв”Ӯ  (you scroll through 114 genres)            в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ  Min Popularity: [____]                     в”Ӯ\nв”Ӯ  Sort By: [VIBE_SCORE в–ј]                    в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ  [в–ә RECOMMEND]   [вң• CLEAR]                  в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ\nв”Ӯ  в”Ӯ RESULTS AREA (empty right now)        в”Ӯ  в”Ӯ\nв”Ӯ  в”Ӯ                                       в”Ӯ  в”Ӯ\nв”Ӯ  в”Ӯ                                       в”Ӯ  в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ\nв”Ӯ                                             в”Ӯ\nв”Ӯ  Status: \"Ready. Select genres...\"          в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\nThis is just a **form**. You fill it out, click the button, and the backend does the work.\n\n---\n\n## Step 3 вҖ” You Fill Out the Form\n\nLet's say you do this:\n\n1. You **Ctrl+Click** three genres: `pop`, `dance`, `electronic`\n2. You type `50` in the Min Popularity box\n3. You leave Sort By as `VIBE_SCORE`\n4. You click **RECOMMEND**\n\nThat's you telling the store:\n\n\u003e \"Show me songs that are pop OR dance OR electronic, and they have to be at least moderately popular (50+). Then rank them by their overall vibe.\"\n\n---\n\n## Step 4 вҖ” The Backend Goes to Work\n\nThis is where the magic happens. Three things occur, one after another:\n\n### Thing A: Filter by Genre (the bouncer)\n\nThe program grabs the big box of 114,000 song cards and goes through them **one by one**:\n\n```\nCard 1: \"Comedy\" by Gen Hoshino вҖ” genre = \"acoustic\"  вҶ’ вқҢ not in your list, toss it aside\nCard 2: \"Blinding Lights\" вҖ” genre = \"pop\"              вҶ’ вң… in your list, keep it\nCard 3: \"Levitating\" вҖ” genre = \"dance\"                 вҶ’ вң… in your list, keep it\nCard 4: \"Bohemian Rhapsody\" вҖ” genre = \"rock\"           вҶ’ вқҢ not in your list, toss it\n...\n(repeat 114,000 times)\n```\n\nAfter this step, you might have **~5,000 songs** left. The other 109,000 are gone.\n\n### Thing B: Filter by Popularity (the second bouncer)\n\nNow it takes those 5,000 songs and does another pass:\n\n```\n\"Song X\" вҖ” popularity = 82  вҶ’ вң… 82 вүҘ 50, keep it\n\"Song Y\" вҖ” popularity = 12  вҶ’ вқҢ 12 \u003c 50, toss it\n\"Song Z\" вҖ” popularity = 65  вҶ’ вң… 65 вүҘ 50, keep it\n...\n```\n\nNow you're down to maybe **~3,000 songs**.\n\n### Thing C: Sort by Vibe Score (the ranking)\n\nNow comes the sorting. Each of those 3,000 songs gets a **Vibe Score** calculated like this:\n\n```\nVibe Score = (popularity + danceabilityГ—100 + energyГ—100 + valenceГ—100) Г· 4\n\nExample for \"Levitating\" by Dua Lipa:\n  popularity    = 88\n  danceability  = 0.70  вҶ’ Г—100 = 70\n  energy        = 0.82  вҶ’ Г—100 = 82\n  valence       = 0.91  вҶ’ Г—100 = 91\n\n  Vibe Score = (88 + 70 + 82 + 91) Г· 4 = 82.75\n```\n\nNow the program **sorts all 3,000 songs from highest Vibe Score to lowest** using **Merge Sort**.\n\nHere's how Merge Sort works in plain English:\n\n\u003e Imagine you have a messy pile of 3,000 cards with numbers on them.\n\u003e\n\u003e **Step 1:** Split the pile in half вҶ’ two piles of 1,500.\n\u003e **Step 2:** Split each half again вҶ’ four piles of 750.\n\u003e **Step 3:** Keep splitting until every pile is just **one card**.\n\u003e\n\u003e Now you have 3,000 piles of 1 card each. Every pile of 1 is \"sorted\" (there's only one card, so it can't be out of order).\n\u003e\n\u003e **Step 4:** Start merging. Take two piles of 1. Compare the numbers. Put the higher one first. You now have a pile of 2, sorted.\n\u003e **Step 5:** Take two piles of 2. Compare the top cards, pull the higher one, repeat. You now have a pile of 4, sorted.\n\u003e **Step 6:** Keep doubling вҖ” merge two piles of 4 into 8, then 16, then 32... until you have **one pile of 3,000, fully sorted**.\n\u003e\n\u003e This takes **3,000 Г— 12 steps вүҲ 36,000 operations**. If you used a dumb sort (compare every card to every other card), it'd be **3,000 Г— 3,000 = 9,000,000 operations**. Merge Sort is **250Г— faster**.\n\nThis whole sort takes **under 10 milliseconds** on your computer.\n\n---\n\n## Step 5 вҖ” The Results Come Back\n\nThe backend now has a sorted list of 3,000 songs, highest Vibe Score at the top. It grabs the **top 10** and formats them into a text table:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist             в”Ӯ Genre          в”Ӯ  Score  в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ    1 в”Ӯ Levitating               в”Ӯ Dua Lipa           в”Ӯ pop            в”Ӯ   82.8  в”Ӯ\nв”Ӯ    2 в”Ӯ Don't Start Now          в”Ӯ Dua Lipa           в”Ӯ pop            в”Ӯ   80.1  в”Ӯ\nв”Ӯ    3 в”Ӯ Blinding Lights          в”Ӯ The Weeknd         в”Ӯ pop            в”Ӯ   79.5  в”Ӯ\nв”Ӯ   ...в”Ӯ                          в”Ӯ                    в”Ӯ                в”Ӯ         в”Ӯ\nв”Ӯ   10 в”Ӯ ...                      в”Ӯ                    в”Ӯ                в”Ӯ         в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\nIt sends this text block back to the frontend.\n\n---\n\n## Step 6 вҖ” The Frontend Displays It\n\nThe JavaFX window takes that text block and **pastes it into the results TextArea**. You see it on screen. Done.\n\nThe status bar at the bottom updates:\n\n\u003e \"вң“ Found 3,000 tracks | Sorted by VIBE_SCORE | pop, dance, electronic\"\n\n---\n\n## The Entire Flow in One Picture\n\n```\nYou open the app\n       в”Ӯ\n       в–ј\nCSV file (114K rows) вҶ’ parsed into 114K TrackRecord objects\n       в”Ӯ\n       в–ј\nYou select genres + popularity + sort field вҶ’ click RECOMMEND\n       в”Ӯ\n       в–ј\nBACKEND:\n  1. Filter 114K вҶ’ ~5K by genre (OR logic)\n  2. Filter 5K вҶ’ ~3K by popularity (вүҘ 50)\n  3. Calculate Vibe Score for each of the 3K\n  4. Sort 3K by Merge Sort (highest first)\n  5. Take top 10 вҶ’ format as ASCII table\n       в”Ӯ\n       в–ј\nFRONTEND:\n  Display the table in the TextArea\n       в”Ӯ\n       в–ј\nYou see results. Done.\n```\n\n---\n\n## What Each File Does (One-Liner Version)\n\n| File | Role |\n|------|------|\n| `Main.java` | The ignition key вҖ” starts the app, shows loading screen, launches the window |\n| `AudioEntity.java` | A contract вҖ” \"anything that is a song must have these properties\" |\n| `BaseEntity.java` | The blueprint вҖ” stores all the data fields (name, artist, genre, numbers) |\n| `TrackRecord.java` | The actual song вҖ” fills in the blueprint and knows how to format itself as a table row |\n| `TrackRepository.java` | The reader вҖ” opens the CSV, parses each line, handles errors, returns a list of songs |\n| `MergeSorter.java` | The sorter вҖ” takes a list and sorts it using the divide-and-merge strategy |\n| `RecommendationEngine.java` | The brain вҖ” filters songs, scores them, sorts them, formats the top 10 |\n| `TerminalView.java` | The storefront вҖ” builds the window, the buttons, the text boxes, and shows results |\n| `terminal.css` | The paint job вҖ” makes everything look like a white/light-blue retro terminal |\n\n---\n\nThat's it. The frontend is a form you fill out. The backend filters, scores, sorts, and returns the top 10. The whole thing takes less than a second after you click the button."

                "text": "# The OOP Data Flow вҖ” Object by Object\n\n---\n\n## Before You Even Click Anything вҖ” What Objects Exist in Memory\n\nWhen the app finishes loading, these objects are sitting in memory:\n\n**Object 1:** `TrackRepository` вҖ” already did its job. It's just sitting there. It read the CSV, created 114,000 `TrackRecord` objects, and now it's idle.\n\n**Object 2:** An `ArrayList\u003cTrackRecord\u003e` containing 114,000 `TrackRecord` objects. This is the big box. Every song from the CSV is one `TrackRecord` object inside this ArrayList.\n\n**Object 3:** `RecommendationEngine` вҖ” also idle. It hasn't been called yet. It's just waiting.\n\n**Object 4:** `TerminalView` вҖ” this is the window on your screen. It holds references to Object 2 (the ArrayList) and Object 3 (the RecommendationEngine). It's the only object that talks to you.\n\n**Object 5:** 114 `String` objects in the genre `ListView` вҖ” one for each genre name like `\"pop\"`, `\"rock\"`, `\"acoustic\"`.\n\n---\n\n## Step 1 вҖ” You Click Genres in the ListView\n\nThe genre list on screen is a JavaFX `ListView\u003cString\u003e`. It has a built-in object called a `SelectionModel`.\n\nWhen you Ctrl+Click `pop`, then `dance`, then `electronic` вҖ” the `SelectionModel` stores those three strings internally.\n\n**Where exactly?** Inside the `SelectionModel` object, there's an `ObservableList\u003cString\u003e` containing:\n\n```\n[\"pop\", \"dance\", \"electronic\"]\n```\n\nThat list lives inside the `ListView` object. It's not in an array you created вҖ” it's in JavaFX's own data structure.\n\n---\n\n## Step 2 вҖ” You Click RECOMMEND\n\nThe `RECOMMEND` button has an event handler inside `TerminalView`. When you click it, this method fires. Here's what happens, step by step:\n\n### 2a вҖ” The genres are extracted\n\n`TerminalView` asks the `ListView`'s `SelectionModel`: *\"Give me everything the user selected.\"*\n\nThe `SelectionModel` returns an `ObservableList\u003cString\u003e` with three items. `TerminalView` copies those items into a **brand new `HashSet\u003cString\u003e`**:\n\n```\nselectedGenres = {\"pop\", \"dance\", \"electronic\"}\n```\n\nIt's a `HashSet` (not an `ArrayList`) because `HashSet` lookups are O(1) вҖ” instant. The `RecommendationEngine` will use it to check \"is this track's genre in the set?\" millions of times, and `HashSet` is the fastest structure for that.\n\n---\n\n## Step 3 вҖ” The Popularity Field is Read\n\n`TerminalView` looks at the `TextField` where you might have typed a number.\n\n- If you typed `50` вҶ’ it parses the string `\"50\"` into the integer `50`.\n- If you left it empty вҶ’ it uses `0` (meaning: don't filter by popularity).\n\nThis integer is stored in a local variable called `minPopularity`. It's not in any object yet вҖ” it's just a temporary value in the method.\n\n---\n\n## Step 4 вҖ” The Sort Field is Read\n\n`TerminalView` looks at the `ComboBox` dropdown. The user selected `VIBE_SCORE` (or whatever). That value is an **enum constant** вҖ” one of five possible values defined inside `RecommendationEngine`:\n\n```\nSortField.VIBE_SCORE\nSortField.POPULARITY\nSortField.DANCEABILITY\nSortField.ENERGY\nSortField.VALENCE\n```\n\nThis enum value is stored in a local variable called `sortField`.\n\n---\n\n## Step 5 вҖ” TerminalView Calls RecommendationEngine\n\nNow `TerminalView` stops doing UI work and starts calling the controller. It makes this call:\n\n```\nengine.filterByGenres(allTracks, selectedGenres)\n```\n\nLet's break down exactly what happens inside this method call:\n\n### Inside `filterByGenres`:\n\n**Inputs received:**\n- `allTracks` вҶ’ the `ArrayList` of 114,000 `TrackRecord` objects\n- `selectedGenres` вҶ’ the `HashSet` with `{\"pop\", \"dance\", \"electronic\"}`\n\n**What the method does:**\n\n1. Creates a **new, empty `ArrayList\u003cTrackRecord\u003e`** called `filtered`.\n\n2. Starts a `for` loop. It iterates through `allTracks` вҖ” one `TrackRecord` object at a time.\n\n3. For each `TrackRecord`, it calls `.getGenre()` вҖ” that method returns a `String` like `\"pop\"` or `\"acoustic\"`.\n\n4. It asks the `HashSet`: *\"Does this string exist in you?\"* вҖ” `selectedGenres.contains(\"pop\")`.\n\n5. If **yes** вҶ’ the `TrackRecord` object reference is added to the `filtered` ArrayList.\n   If **no** вҶ’ the track is ignored.\n\n6. After checking all 114,000 tracks, the `filtered` ArrayList contains roughly 5,000 `TrackRecord` objects.\n\n**Important:** The `TrackRecord` objects in `filtered` are **the exact same objects** as in `allTracks`. No copies were made. Both ArrayLists hold references to the same objects in memory. It's like having two different index cards pointing to the same person's file.\n\n7. The method returns the `filtered` ArrayList back to `TerminalView`.\n\n---\n\n## Step 6 вҖ” Popularity Filter\n\n`TerminalView` now calls the second method:\n\n```\nengine.filterByPopularity(filtered, minPopularity)\n```\n\n**Inputs:**\n- `filtered` вҶ’ the ArrayList of ~5,000 tracks\n- `minPopularity` вҶ’ the integer `50`\n\n**What happens inside:**\n\n1. Creates another **new, empty `ArrayList\u003cTrackRecord\u003e`** called `filteredByPop`.\n\n2. Loops through the 5,000 tracks.\n\n3. For each track, calls `.getPopularity()` вҖ” returns an `int`.\n\n4. Checks: `is this number \u003e= 50?`\n\n5. If **yes** вҶ’ add to `filteredByPop`. If **no** вҶ’ skip.\n\n6. Returns the new ArrayList вҖ” now down to ~3,000 tracks.\n\nAgain: these 3,000 objects are the **same objects** from the original 114,000. Nothing was copied. We just filtered which references end up in which list.\n\n---\n\n## Step 7 вҖ” Sorting (Merge Sort)\n\n`TerminalView` now calls:\n\n```\nengine.sortBy(filtered, sortField)\n```\n\n**Input:**\n- `filtered` вҶ’ the ArrayList of ~3,000 `TrackRecord` objects\n- `sortField` вҶ’ the enum value `SortField.VIBE_SCORE`\n\n**What happens inside:**\n\n1. The method looks at the `sortField`. It's `VIBE_SCORE`, so it creates a **`Comparator\u003cTrackRecord\u003e`** вҖ” an object whose entire job is to compare two `TrackRecord` objects and say which one is \"bigger.\"\n\n2. The `Comparator` works like this:\n   - It receives two `TrackRecord` objects: let's call them `trackA` and `trackB`.\n   - It calls `trackA.getCompositeScore()` вҶ’ returns a `double`, let's say `82.75`.\n   - It calls `trackB.getCompositeScore()` вҶ’ returns a `double`, let's say `71.30`.\n   - It compares them: `82.75` vs `71.30`. Since we want descending order, it says `trackA` comes first.\n   - It returns a number: negative means `trackA` first, positive means `trackB` first, zero means they're equal.\n\n3. `RecommendationEngine` then calls `MergeSorter.sort(filtered, comparator)`.\n\n**What happens inside `MergeSorter.sort`:**\n\nThe `MergeSorter` object receives the ArrayList and the Comparator. It doesn't know what a `TrackRecord` is. It doesn't know what a Vibe Score is. It just knows: *\"I have a list of things, and I have a way to compare any two of them.\"*\n\nIt then:\n1. Creates an auxiliary `Object[]` array the same size as the ArrayList (~3,000 slots).\n2. Calls its recursive `mergeSortRecursive(list, aux, 0, 2999, comparator)`.\n3. The recursion splits the list, sorts each half, and merges them back together вҖ” using the `Comparator` to decide which element goes first at every comparison.\n4. The ArrayList is **modified in-place**. The objects inside are rearranged вҖ” the highest Vibe Score ends up at index 0, the second highest at index 1, and so on.\n\nThe ArrayList now contains the same 3,000 `TrackRecord` objects, but in sorted order.\n\n---\n\n## Step 8 вҖ” Formatting the Top 10\n\n`TerminalView` calls:\n\n```\nengine.formatTopN(filtered, 10)\n```\n\n**What happens inside:**\n\n1. The method checks: *\"How many tracks are in the list?\"* вҶ’ 3,000.\n2. It calculates: *\"Should I return 10 or 3,000? Whichever is smaller.\"* вҶ’ 10.\n\n3. It creates a `StringBuilder` вҖ” a mutable string object that you can append to without creating a new string each time.\n\n4. It appends the ASCII table header вҖ” a `String` with box-drawing characters:\n   ```\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬...\n   в”Ӯ Rank в”Ӯ Track                    в”Ӯ...\n   в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ј...\n   ```\n\n5. It starts a loop: `i` goes from 0 to 9.\n\n6. For each iteration, it calls `filtered.get(i)` вҖ” this returns the `TrackRecord` at that index.\n\n7. On that `TrackRecord`, it calls `.toAsciiRow(i + 1)`.\n\n**This is polymorphism.** The method doesn't know it's calling `TrackRecord`'s version. It only knows the object is an `AudioEntity` (the interface). But at runtime, Java calls `TrackRecord.toAsciiRow()`, which returns a formatted string like:\n\n```\nв”Ӯ    1 в”Ӯ Levitating               в”Ӯ Dua Lipa           в”Ӯ pop            в”Ӯ   82.8  в”Ӯ\n```\n\n8. That string is appended to the `StringBuilder`.\n\n9. After all 10 rows, it appends the table footer (bottom border).\n\n10. The method calls `.toString()` on the `StringBuilder` вҖ” this creates one giant `String` containing the entire ASCII table.\n\n11. That `String` is returned to `TerminalView`.\n\n---\n\n## Step 9 вҖ” Display\n\n`TerminalView` receives the giant `String`. It calls:\n\n```\nresultsArea.setText(tableString)\n```\n\n`resultsArea` is a JavaFX `TextArea` object. Its `setText()` method takes the string and renders it on screen in the monospaced font defined by the CSS.\n\nThe status bar `Label` object is also updated:\n\n```\nstatusLabel.setText(\"вң“ Found 3000 tracks | Sorted by VIBE_SCORE | pop, dance, electronic\")\n```\n\n---\n\n## The Complete Object Interaction Map\n\n```\nTerminalView (the window)\n    в”Ӯ\n    в”Ӯ holds a reference to в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n    в”Ӯ                                                           в”Ӯ\n    в–ј                                                           в–ј\nListView\u003cString\u003e                                    RecommendationEngine\n    в”Ӯ                                                           в”Ӯ\n    в”Ӯ SelectionModel stores:                                    в”Ӯ\n    в”Ӯ   [\"pop\", \"dance\", \"electronic\"]                          в”Ӯ\n    в”Ӯ                                                           в”Ӯ\n    в”Ӯ user clicks RECOMMEND                                     в”Ӯ\n    в”Ӯ     в”Ӯ                                                     в”Ӯ\n    в”Ӯ     в–ј                                                     в”Ӯ\n    в”Ӯ copies to HashSet\u003cString\u003e в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–әв”Ӯ\n    в”Ӯ   {\"pop\", \"dance\", \"electronic\"}              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n    в”Ӯ                                               в”Ӯ\n    в”Ӯ passes ArrayList\u003cTrackRecord\u003e (114K items) в”Җв”Җв–әв”Ӯ\n    в”Ӯ                                               в–ј\n    в”Ӯ                                    filterByGenres() returns:\n    в”Ӯ                                    ArrayList\u003cTrackRecord\u003e (~5K items)\n    в”Ӯ                                               в”Ӯ\n    в”Ӯ                                    filterByPopularity() returns:\n    в”Ӯ                                    ArrayList\u003cTrackRecord\u003e (~3K items)\n    в”Ӯ                                               в”Ӯ\n    в”Ӯ                                    sortBy() rearranges in-place\n    в”Ӯ                                    using MergeSorter + Comparator\n    в”Ӯ                                               в”Ӯ\n    в”Ӯ                                    formatTopN() returns:\n    в”Ӯ                                    String (ASCII table)\n    в”Ӯ                                               в”Ӯ\n    в”Ӯ receives String в—„в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n    в”Ӯ\n    в–ј\nTextArea.setText(tableString)\n    в”Ӯ\n    в–ј\nUser sees results on screen\n```\n\n---\n\n## Key Takeaway вҖ” What Gets Stored Where\n\n| Data | Stored In | Type |\n|------|-----------|------|\n| 114K tracks at startup | `ArrayList\u003cTrackRecord\u003e` in `TerminalView` | ArrayList of objects |\n| Selected genres | `SelectionModel` inside `ListView`, then copied to `HashSet\u003cString\u003e` | JavaFX internal list вҶ’ HashSet |\n| Popularity threshold | Local variable `minPopularity` | `int` |\n| Sort field | Local variable `sortField` | Enum `SortField` |\n| Filtered tracks (after genre) | New `ArrayList\u003cTrackRecord\u003e` (same object references, not copies) | ArrayList |\n| Filtered tracks (after popularity) | Another new `ArrayList\u003cTrackRecord\u003e` | ArrayList |\n| Sorted order | The filtered ArrayList is rearranged in-place by `MergeSorter` | Same ArrayList, different order |\n| Auxiliary array for sorting | `Object[]` inside `MergeSorter` (temporary, garbage collected after) | Array |\n| Final ASCII table | `StringBuilder` вҶ’ converted to `String` вҶ’ displayed in `TextArea` | String |\n\nEvery `TrackRecord` object is created once at startup and lives in memory until the app closes. Filtering doesn't copy them вҖ” it just creates new ArrayLists that hold references to the same objects. Sorting doesn't copy them either вҖ” it rearranges which index each reference sits at inside the ArrayList."
              }

                "text": "# File-by-File Data Flow Chart\n\nHere is how data moves through every file, in the exact order it happens:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  PHASE 1: STARTUP вҖ” Loading data into memory                        в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\n   dataset/dataset.csv\n         в”Ӯ\n         в”Ӯ  raw text (114,000 lines)\n         в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ TrackRepository  в”Ӯ  reads the file line by line\n   в”Ӯ  .loadTracks()   в”Ӯ  parses each line into fields\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n            в”Ӯ\n            в”Ӯ  returns: ArrayList\u003cTrackRecord\u003e with 114,000 objects\n            в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ     Main.java    в”Ӯ  receives the list, passes it to...\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n            в”Ӯ\n            в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ  TerminalView    в”Ӯ  stores the ArrayList. Populates the genre\n   в”Ӯ  (the window)    в”Ӯ  ListView. Waits for user input.\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  PHASE 2: USER INTERACTION вҖ” You click RECOMMEND                    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\n   You: Ctrl+Click genres, type popularity, pick sort field\n         в”Ӯ\n         в”Ӯ  data lives inside JavaFX UI components:\n         в”Ӯ    вҶ’ ListView.SelectionModel  (stores selected genre Strings)\n         в”Ӯ    вҶ’ TextField                (stores popularity string)\n         в”Ӯ    вҶ’ ComboBox                 (stores SortField enum)\n         в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ  TerminalView    в”Ӯ  extracts user input:\n   в”Ӯ  .handleRec()    в”Ӯ    вҶ’ HashSet\u003cString\u003e  (selected genres)\n   в”Ӯ                  в”Ӯ    вҶ’ int              (min popularity)\n   в”Ӯ                  в”Ӯ    вҶ’ SortField enum   (sort choice)\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n            в”Ӯ\n            в”Ӯ  passes: ArrayList + HashSet + int + SortField\n            в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ  RecommendationEngine        в”Ӯ  the brain вҖ” coordinates everything\n   в”Ӯ                              в”Ӯ\n   в”Ӯ  Step A: .filterByGenres()   в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ       returns ArrayList\u003cTrackRecord\u003e (~5K items)   в”Ӯ\n   в”Ӯ                              в”Ӯ                    в”Ӯ\n   в”Ӯ  Step B: .filterByPop()      в”Ӯ                    в”Ӯ\n   в”Ӯ       returns ArrayList\u003cTrackRecord\u003e (~3K items)   в”Ӯ\n   в”Ӯ                              в”Ӯ                    в”Ӯ\n   в”Ӯ  Step C: .sortBy()           в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n   в”Ӯ       calls MergeSorter      в”Ӯ\n   в”Ӯ       rearranges ArrayList   в”Ӯ\n   в”Ӯ       in-place               в”Ӯ\n   в”Ӯ                              в”Ӯ\n   в”Ӯ  Step D: .formatTopN()       в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ       returns String (ASCII  в”Ӯ                    в”Ӯ\n   в”Ӯ       table of top 10)       в”Ӯ                    в”Ӯ\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                    в”Ӯ\n                                                       в”Ӯ\n                                                       в”Ӯ\n         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n         в”Ӯ\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ   MergeSorter        в”Ӯ     в”Ӯ  TrackRecord objects в”Ӯ\n   в”Ӯ   .sort()            в”Ӯ     в”Ӯ  .toAsciiRow(rank)   в”Ӯ\n   в”Ӯ   divides + merges   в”Ӯ     в”Ӯ  polymorphic method  в”Ӯ\n   в”Ӯ   ArrayList in-place в”Ӯ     в”Ӯ  formats one row     в”Ӯ\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n         в”Ӯ\n         в”Ӯ  returns sorted ArrayList back to RecommendationEngine\n         в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ  RecommendationEngine        в”Ӯ\n   в”Ӯ  .formatTopN()               в”Ӯ  builds the ASCII table string\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n            в”Ӯ\n            в”Ӯ  returns: String (the full ASCII table)\n            в–ј\n   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n   в”Ӯ  TerminalView    в”Ӯ  receives the String\n   в”Ӯ  .handleRec()    в”Ӯ  calls resultsArea.setText(tableString)\n   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n            в”Ӯ\n            в–ј\n   USER SEES RESULTS ON SCREEN\n```\n\n---\n\n# Now, File by File вҖ” In Flow Order\n\nLet me walk through each file **in the order data actually touches it**. I'll tell you exactly what each file is, what it stores, and what it passes to the next file.\n\n---\n\n## File 1 вҖ” `TrackRepository.java`\n\n**What it is:** The CSV reader. It's the only file that ever touches the dataset file on disk.\n\n**When it runs:** Once, at app startup. Then it goes idle.\n\n**What it does step by step:**\n1. Opens `dataset/dataset.csv` using a `BufferedReader` (reads the file one line at a time, doesn't load the whole file into memory at once).\n2. Reads the header line and skips it.\n3. For every remaining line (~114,000 lines):\n   - Splits the CSV line into individual fields (track ID, artist name, song name, popularity number, genre, etc.)\n   - Checks if required fields are present (if a line is broken/empty, it skips that line silently)\n   - Creates a **new `TrackRecord` object** with those fields\n4. Adds each `TrackRecord` into a growing `ArrayList\u003cTrackRecord\u003e`.\n5. After the last line, returns the full `ArrayList\u003cTrackRecord\u003e` (114,000 objects).\n\n**What it produces:** One `ArrayList\u003cTrackRecord\u003e` containing 114,000 `TrackRecord` objects.\n\n**Who receives it:** `Main.java` calls `TrackRepository.loadTracks()` and gets the ArrayList back.\n\n---\n\n## File 2 вҖ” `Main.java`\n\n**What it is:** The ignition key. The app entry point.\n\n**When it runs:** When you launch the app. It runs once, sets everything up, then steps back.\n\n**What it does step by step:**\n1. JavaFX calls `Main.start()`. This is where the app begins.\n2. Shows a **loading screen** (a simple VBox with a progress bar) so you see something while data loads.\n3. Spawns a **background thread** вҖ” this is important because loading 114K tracks takes a few seconds, and if it ran on the main UI thread, the window would freeze.\n4. Inside that thread, it calls `TrackRepository.loadTracks()` вҖ” the file we just covered.\n5. Receives the `ArrayList\u003cTrackRecord\u003e` (114K objects).\n6. Creates the **two core objects**:\n   - `new RecommendationEngine()` вҖ” the brain/controller\n   - `new TerminalView(stage, allTracks, engine)` вҖ” the window/view\n7. Dismisses the loading screen and shows the main window.\n8. `Main.java` is now done. It doesn't do anything else for the rest of the app's life.\n\n**What it produces:** A `TerminalView` object (the window) that holds references to both the `ArrayList\u003cTrackRecord\u003e` and the `RecommendationEngine`.\n\n**Who receives it:** Nobody. `Main.java` is the connector вҖ” it passes things to other objects and then exits the scene.\n\n---\n\n## File 3 вҖ” `AudioEntity.java` (Interface)\n\n**What it is:** A contract. It defines what every \"audio thing\" in this system must be able to do.\n\n**When it runs:** It never \"runs.\" It's an interface вҖ” it has no executable code. It's a blueprint that other classes must follow.\n\n**What it declares (the contract):**\n- `getTrackId()` вҶ’ returns a String\n- `getTrackName()` вҶ’ returns a String\n- `getArtists()` вҶ’ returns a String\n- `getGenre()` вҶ’ returns a String\n- `getPopularity()` вҶ’ returns an int\n- `getDanceability()` вҶ’ returns a double\n- `getEnergy()` вҶ’ returns a double\n- `getValence()` вҶ’ returns a double\n- `getCompositeScore()` вҶ’ returns a double\n- `toAsciiRow(int rank)` вҶ’ returns a String (this is the polymorphic method)\n\n**Who implements it:** `BaseEntity.java` declares `implements AudioEntity`.\n\n**Why it exists:** So that `RecommendationEngine` and `TerminalView` can work with *any* audio entity through this interface, without needing to know the concrete class. If you later added `PodcastRecord`, the same code would still work.\n\n---\n\n## File 4 вҖ” `BaseEntity.java` (Abstract Class)\n\n**What it is:** The data blueprint. It implements the `AudioEntity` interface and provides the actual storage.\n\n**When it runs:** It never runs on its own. It's abstract вҖ” you can't create a `BaseEntity` directly. It only exists to be extended.\n\n**What it stores (13 private fields):**\n\n| Field | Type | Example Value |\n|-------|------|---------------|\n| `trackId` | String | `\"5SuOikwiRyPMVoIQDJUgSV\"` |\n| `trackName` | String | `\"Comedy\"` |\n| `artists` | String | `\"Gen Hoshino\"` |\n| `albumName` | String | `\"Comedy\"` |\n| `genre` | String | `\"acoustic\"` |\n| `popularity` | int | `73` |\n| `durationMs` | long | `230666` |\n| `explicit` | boolean | `false` |\n| `danceability` | double | `0.676` |\n| `energy` | double | `0.461` |\n| `valence` | double | `0.715` |\n\nAll fields are **private**. The only way to read or change them is through getters and setters. That's encapsulation.\n\n**What it provides:**\n- A constructor that takes all 13 values (subclasses call this via `super(...)`)\n- Getters and setters for every field\n- **`getCompositeScore()`** вҖ” the Vibe Score formula:\n  ```\n  (popularity + danceabilityГ—100 + energyГ—100 + valenceГ—100) Г· 4\n  ```\n- An **abstract method** `toAsciiRow(int rank)` вҖ” declared but not implemented. Subclasses MUST provide the implementation.\n\n**Who extends it:** `TrackRecord.java`.\n\n**Who receives it:** Nobody directly. `BaseEntity` is an abstract parent вҖ” it lives inside every `TrackRecord` object.\n\n---\n\n## File 5 вҖ” `TrackRecord.java`\n\n**What it is:** The concrete song object. Every row from the CSV becomes one `TrackRecord`.\n\n**When it runs:** 114,000 of these are created at startup by `TrackRepository`. They sit in the `ArrayList\u003cTrackRecord\u003e` for the life of the app.\n\n**What it does:**\n- Its constructor calls `super(...)` passing all fields to `BaseEntity`. That's it вҖ” `TrackRecord` adds zero new fields.\n- It **overrides** the abstract method `toAsciiRow(int rank)`.\n\n**What `toAsciiRow` does:**\nIt takes this `TrackRecord`'s data (name, artist, genre, score) and formats it into one line of the ASCII table:\n\n```\nв”Ӯ    1 в”Ӯ Levitating               в”Ӯ Dua Lipa           в”Ӯ pop            в”Ӯ   82.8  в”Ӯ\n```\n\nIt handles truncation вҖ” if the song name is longer than 24 characters, it cuts it off and adds \"...\".\n\n**Who calls it:** `RecommendationEngine.formatTopN()` calls `track.toAsciiRow(rank)` for each of the top 10 tracks. This is **polymorphism** вҖ” the engine calls the method through the `AudioEntity` interface, and Java resolves it to `TrackRecord`'s implementation at runtime.\n\n**Who receives it:** The `ArrayList\u003cTrackRecord\u003e` in `TerminalView` holds all 114,000 of these objects.\n\n---\n\n## File 6 вҖ” `TerminalView.java`\n\n**What it is:** The window. The entire GUI. Every button, text box, list, and label lives here.\n\n**When it runs:** From the moment `Main.java` creates it, until you close the window. It's alive the whole time.\n\n**What objects it holds:**\n\n| Object | Type | Purpose |\n|--------|------|---------|\n| `allTracks` | `ArrayList\u003cTrackRecord\u003e` | The 114K tracks вҖ” kept as a reference, never modified |\n| `engine` | `RecommendationEngine` | The controller вҖ” called when user clicks RECOMMEND |\n| `genreListView` | `ListView\u003cString\u003e` | The genre selection list |\n| `popularityField` | `TextField` | Where you type the min popularity number |\n| `sortComboBox` | `ComboBox\u003cSortField\u003e` | The dropdown for choosing sort field |\n| `resultsArea` | `TextArea` | The read-only box that displays the ASCII table |\n| `statusLabel` | `Label` | The status bar at the bottom |\n\n**What it does when you click RECOMMEND:**\n1. Asks `genreListView.getSelectionModel()` for selected items вҶ’ gets an `ObservableList\u003cString\u003e`.\n2. Copies those into a `HashSet\u003cString\u003e` called `selectedGenres`.\n3. Reads `popularityField.getText()` вҶ’ parses to `int minPopularity`.\n4. Reads `sortComboBox.getValue()` вҶ’ gets a `SortField` enum.\n5. Calls `engine.filterByGenres(allTracks, selectedGenres)` вҶ’ gets back a filtered ArrayList.\n6. Calls `engine.filterByPopularity(filtered, minPopularity)` вҶ’ gets back a smaller ArrayList.\n7. Calls `engine.sortBy(filtered, sortField)` вҶ’ the ArrayList is now sorted.\n8. Calls `engine.formatTopN(filtered, 10)` вҶ’ gets back a big String (the ASCII table).\n9. Calls `resultsArea.setText(tableString)` вҶ’ the user sees results.\n\n**Who receives from it:** Nobody. `TerminalView` is the end of the chain вҖ” it displays results to the human.\n\n---\n\n## File 7 вҖ” `RecommendationEngine.java`\n\n**What it is:** The brain. All business logic lives here вҖ” filtering, scoring, sorting, formatting.\n\n**When it runs:** Only when `TerminalView` calls it (when you click RECOMMEND). Otherwise it's idle.\n\n**What methods it has:**\n\n### `filterByGenres(ArrayList\u003cTrackRecord\u003e, HashSet\u003cString\u003e)`\n- Receives the full 114K list and the set of selected genres.\n- Creates a **new empty `ArrayList\u003cTrackRecord\u003e`**.\n- Loops through all 114K tracks. For each one, calls `.getGenre()` and checks if that string is in the `HashSet`.\n- If yes вҶ’ adds that track to the new ArrayList.\n- Returns the new ArrayList (~5K items after filtering).\n\n### `filterByPopularity(ArrayList\u003cTrackRecord\u003e, int)`\n- Receives the genre-filtered list and the minimum popularity number.\n- Creates a **new empty `ArrayList\u003cTrackRecord\u003e`**.\n- Loops through the list. For each track, calls `.getPopularity()` and checks if it's \u003e= the minimum.\n- If yes вҶ’ adds to the new ArrayList.\n- Returns the new ArrayList (~3K items).\n\n### `sortBy(ArrayList\u003cTrackRecord\u003e, SortField)`\n- Receives the filtered list and the chosen sort field.\n- Creates a **`Comparator\u003cTrackRecord\u003e`** based on the `SortField`:\n  - `VIBE_SCORE` вҶ’ comparator calls `a.getCompositeScore()` vs `b.getCompositeScore()`\n  - `POPULARITY` вҶ’ comparator calls `a.getPopularity()` vs `b.getPopularity()`\n  - `DANCEABILITY` вҶ’ comparator calls `a.getDanceability()` vs `b.getDanceability()`\n  - etc.\n- Calls `MergeSorter.sort(list, comparator)` вҶ’ the ArrayList is rearranged in-place.\n\n### `formatTopN(ArrayList\u003cTrackRecord\u003e, int)`\n- Receives the sorted list and the number 10.\n- Builds an ASCII table:\n  - Appends the header (borders + column names)\n  - Loops 10 times. Each iteration: calls `list.get(i).toAsciiRow(i+1)` вҶ’ appends the result\n  - Appends the footer (bottom border)\n- Returns the complete table as one giant `String`.\n\n### `getAllGenres(ArrayList\u003cTrackRecord\u003e)`\n- Called once at startup by `TerminalView` to populate the genre list.\n- Loops through all 114K tracks, collects every unique genre into a `TreeSet\u003cString\u003e` (auto-sorts alphabetically).\n- Returns the `TreeSet` as an `ArrayList\u003cString\u003e` (~114 genre names).\n\n**Who receives from it:** `TerminalView` вҖ” every method returns data back to the View.\n\n---\n\n## File 8 вҖ” `MergeSorter.java`\n\n**What it is:** A generic sorting machine. It knows nothing about music, tracks, or scores. It only knows how to divide a list and merge it back together.\n\n**When it runs:** Only when `RecommendationEngine.sortBy()` calls it.\n\n**What it receives:**\n- An `ArrayList\u003cTrackRecord\u003e` (the filtered, unsorted list)\n- A `Comparator\u003cTrackRecord\u003e` (the comparison rule вҖ” \"compare by Vibe Score descending\")\n\n**What it does:**\n1. Creates an auxiliary `Object[]` array the same size as the list.\n2. Calls its private recursive method: `mergeSortRecursive(list, aux, 0, lastIndex, comparator)`.\n3. The recursion splits the range in half repeatedly until each range is a single element.\n4. Then it merges pairs back together, using the `Comparator` to decide which element goes first.\n5. The merge writes elements back into the original `ArrayList` in sorted order.\n6. The auxiliary array is discarded (garbage collected).\n\n**What it returns:** Nothing. It modifies the `ArrayList` in-place. The list comes in unsorted and leaves sorted.\n\n**Who receives from it:** `RecommendationEngine.sortBy()` вҖ” which then continues to `formatTopN()`.\n\n---\n\n## File 9 вҖ” `terminal.css`\n\n**What it is:** The paint job. A stylesheet that makes the window look like a retro ASCII terminal.\n\n**When it runs:** When `Main.java` creates the `Scene` and attaches the CSS file to it. JavaFX applies the styles to every UI component automatically.\n\n**What it styles:**\n\n| CSS Class | What It Targets | Key Styles |\n|-----------|----------------|------------|\n| `.main-panel` | The root layout | White background |\n| `.title-label` | The ASCII art banner | Monospace font, light-blue background, blue border |\n| `.control-panel` | The filter controls area | Light-blue background, blue border |\n| `.genre-list-view` | The genre selection list | Light-blue background, blue highlight on selection |\n| `.filter-text-field` | The popularity input box | Light-blue background, monospace font |\n| `.filter-combo-box` | The sort dropdown | Light-blue background, monospace font |\n| `.btn-recommend` | The RECOMMEND button | Blue background, white text, hover glow effect |\n| `.terminal-textarea` | The results display area | Light-blue background, dark-blue monospace text |\n| `.status-bar` | The bottom status bar | Light-blue background, blue text |\n\n**Who receives from it:** Nobody. It's a passive resource file consumed by JavaFX.\n\n---\n\n## Complete File Connection Map\n\n```\nTrackRepository  в”Җв”Җв”Җв”Җ(returns ArrayList\u003cTrackRecord\u003e)в”Җв”Җв”ҖвҶ’  Main.java\n                                                               в”Ӯ\n                            AudioEntity (interface) вҶҗв”Җв”Җв”Җв”Җв”Җв”Җв”Җ   в”Ӯ\n                                  вҶ‘                            в”Ӯ\n                             BaseEntity (abstract) вҶҗв”Җв”Җв”Җв”Җв”Җв”Җв”Җ    в”Ӯ\n                                  вҶ‘                            в”Ӯ\n                           TrackRecord (concrete) вҶҗв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ    в”Ӯ\n                                                               в”Ӯ\n                                                               в–ј\nMergeSorter в—„в”Җв”Җ(Comparator)в”Җв”Җ RecommendationEngine в—„в”Җв”Җ(user input)в”Җв”Җ TerminalView\n     в”Ӯ                              в”Ӯ                                  в”Ӯ\n     в”Ӯ  rearranges ArrayList        в”Ӯ  returns filtered/sorted         в”Ӯ  displays\n     в”Ӯ  in-place                    в”Ӯ  data as ASCII String            в”Ӯ  results\n     в–ј                              в–ј                                  в–ј\n  (modifies in-place)     в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖвҶ’ TerminalView в—„в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                                          в”Ӯ\n                                          в–ј\n                                     terminal.css (styling, applied once at startup)\n```\n\nThat is every file, in flow order, showing exactly what data enters, what happens inside, and what data leaves."
