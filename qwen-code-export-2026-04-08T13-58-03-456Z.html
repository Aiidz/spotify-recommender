              "content": "package spotify.controller;\n\nimport java.util.Comparator;\nimport java.util.List;\n\n/**\n * =============================================================================\n * MergeSorter вҖ” MERGE SORT IMPLEMENTATION FROM SCRATCH\n * =============================================================================\n * A generic, stable Merge Sort implementation that sorts any List of type T\n * using a provided Comparator.\n *\n * COMPLEXITY ANALYSIS:\n * в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n * Time Complexity:  O(n log n) вҖ” ALWAYS (best, average, and worst case)\n * Space Complexity: O(n) вҖ” auxiliary array for merging\n *\n * RECURRENCE RELATION:\n *   T(n) = 2В·T(n/2) + O(n)\n *\n * Where:\n *   2В·T(n/2)  = two recursive calls on halves of the input\n *   O(n)      = the merge step that combines two sorted halves\n *\n * EXPANSION:\n *   T(n) = 2В·T(n/2) + n\n *        = 2В·[2В·T(n/4) + n/2] + n\n *        = 4В·T(n/4) + 2n\n *        = 4В·[2В·T(n/8) + n/4] + 2n\n *        = 8В·T(n/8) + 3n\n *        = 2^k В· T(n/2^k) + kВ·n\n *\n *   When n/2^k = 1 вҶ’ k = logвӮӮ(n):\n *   T(n) = n В· T(1) + n В· logвӮӮ(n)\n *        = n + nВ·logвӮӮ(n)\n *        = O(n log n)  в– \n *\n * STABILITY:\n *   This implementation is STABLE вҖ” when two elements compare as equal,\n *   their original relative order is preserved. This matters when the user\n *   sorts by Vibe Score and two tracks have the same score.\n * =============================================================================\n */\npublic class MergeSorter {\n\n    /**\n     * Sorts the given list in-place using Merge Sort.\n     *\n     * \u003cb\u003eHow it works (Divide and Conquer):\u003c/b\u003e\n     * \u003col\u003e\n     *   \u003cli\u003e\u003cb\u003eDIVIDE\u003c/b\u003e вҖ” Split the list into two halves. Each half\n     *       is roughly n/2 elements. This is O(1) work per call.\u003c/li\u003e\n     *   \u003cli\u003e\u003cb\u003eCONQUER\u003c/b\u003e вҖ” Recursively sort each half.\n     *       This gives us the recurrence: 2В·T(n/2).\u003c/li\u003e\n     *   \u003cli\u003e\u003cb\u003eCOMBINE\u003c/b\u003e вҖ” Merge the two sorted halves back together\n     *       by comparing elements one-by-one with the comparator.\n     *       This is O(n) because every element is examined exactly once.\u003c/li\u003e\n     * \u003c/ol\u003e\n     *\n     * Total per level: O(n). Number of levels: logвӮӮ(n).\n     * Overall: O(n log n).\n     *\n     * @param list       The list to sort (modified in-place)\n     * @param comparator Defines the sort order (ascending or descending)\n     * @param \u003cT\u003e        Any type that can be compared via the comparator\n     */\n    public static \u003cT\u003e void sort(List\u003cT\u003e list, Comparator\u003cT\u003e comparator) {\n        // Base case: lists of size 0 or 1 are already sorted\n        if (list == null || list.size() \u003c= 1) {\n            return;\n        }\n\n        // Create a temporary array for the merge process\n        // Space complexity: O(n) вҖ” one auxiliary array of size n\n        @SuppressWarnings(\"unchecked\")\n        T[] temp = (T[]) new Object[list.size()];\n\n        // Begin the recursive divide-and-conquer\n        // Initial call sorts the entire range: [0, list.size()-1]\n        mergeSortRecursive(list, temp, 0, list.size() - 1, comparator);\n    }\n\n    /**\n     * Recursively divides the list into halves until sublists of size 1\n     * are reached, then merges them back together in sorted order.\n     *\n     * Time complexity at this level: O(right - left + 1) for the merge.\n     * Total across all levels: O(n log n).\n     *\n     * @param list       The list being sorted\n     * @param temp       Temporary array for merging (reused to avoid reallocation)\n     * @param left       Left boundary index (inclusive)\n     * @param right      Right boundary index (inclusive)\n     * @param comparator Comparison function for ordering\n     * @param \u003cT\u003e        The element type\n     */\n    private static \u003cT\u003e void mergeSortRecursive(List\u003cT\u003e list, T[] temp,\n                                                int left, int right,\n                                                Comparator\u003cT\u003e comparator) {\n        // BASE CASE: A single element (or empty range) is already sorted.\n        // This is the termination of our recursion вҖ” O(1) work.\n        if (left \u003e= right) {\n            return;\n        }\n\n        // DIVIDE STEP: Find the midpoint to split into two halves.\n        // Using unsigned right shift to avoid integer overflow on very large arrays.\n        // This is O(1) вҖ” simple arithmetic.\n        int mid = (left + right) \u003e\u003e\u003e 1;\n\n        // CONQUER STEP: Recursively sort the left half [left, mid].\n        // This call handles T(n/2) elements.\n        // Over the full recursion tree, there are logвӮӮ(n) levels,\n        // and each level processes all n elements total.\n        mergeSortRecursive(list, temp, left, mid, comparator);\n\n        // CONQUER STEP: Recursively sort the right half [mid+1, right].\n        // Same complexity as the left half: T(n/2).\n        mergeSortRecursive(list, temp, mid + 1, right, comparator);\n\n        // COMBINE STEP: Merge the two sorted halves [left, mid] and [mid+1, right].\n        // This scans each element exactly once вҖ” O(n) at this level.\n        // The merge is what guarantees O(n log n) overall:\n        //   n elements Г— logвӮӮ(n) levels = O(n log n)\n        merge(list, temp, left, mid, right, comparator);\n    }\n\n    /**\n     * Merges two adjacent sorted subarrays: [left, mid] and [mid+1, right].\n     *\n     * This is the heart of Merge Sort's O(n log n) guarantee.\n     * The merge step runs in O(right - left + 1) time because:\n     *   - Each element from both halves is compared exactly once\n     *   - Each element is written to the temp array exactly once\n     *   - Each element is copied back to the original list exactly once\n     *\n     * STABILITY: When comparator.compare(a, b) \u003c= 0, we pick from the left half\n     * first, preserving the original order of equal elements.\n     *\n     * @param list       The list being sorted\n     * @param temp       Temporary storage for the merged result\n     * @param left       Start of the left subarray\n     * @param mid        End of the left subarray / boundary\n     * @param right      End of the right subarray\n     * @param comparator Comparison function for ordering\n     * @param \u003cT\u003e        The element type\n     */\n    private static \u003cT\u003e void merge(List\u003cT\u003e list, T[] temp, int left, int mid,\n                                   int right, Comparator\u003cT\u003e comparator) {\n\n        // Pointers for the left half, right half, and temp array\n        int i = left;      // Pointer for left subarray [left, mid]\n        int j = mid + 1;   // Pointer for right subarray [mid+1, right]\n        int k = left;      // Pointer for temp array\n\n        // Compare elements from both halves and copy the smaller one to temp.\n        // Each iteration processes exactly one element вҖ” O(right - left + 1) total.\n        while (i \u003c= mid \u0026\u0026 j \u003c= right) {\n            // STABLE comparison: use \u003c= to prefer the left element on ties.\n            // This preserves the original order of equal elements.\n            if (comparator.compare(list.get(i), list.get(j)) \u003c= 0) {\n                temp[k++] = list.get(i++);\n            } else {\n                temp[k++] = list.get(j++);\n            }\n        }\n\n        // Copy any remaining elements from the left half.\n        // These are already in sorted order relative to each other.\n        // At most mid - i + 1 iterations вҖ” bounded by O(n).\n        while (i \u003c= mid) {\n            temp[k++] = list.get(i++);\n        }\n\n        // Copy any remaining elements from the right half.\n        // Same reasoning вҖ” bounded by O(n).\n        while (j \u003c= right) {\n            temp[k++] = list.get(j++);\n        }\n\n        // Copy the merged result back into the original list.\n        // This is O(right - left + 1) вҖ” each element written back once.\n        for (int idx = left; idx \u003c= right; idx++) {\n            list.set(idx, temp[idx]);\n        }\n\n        // TOTAL MERGE COST: O(right - left + 1) = O(n) at this level\n        // Combined with logвӮӮ(n) recursion depth вҶ’ O(n log n) overall.\n    }\n}\n",

              "content": "package spotify.controller;\n\nimport spotify.model.AudioEntity;\nimport spotify.model.TrackRecord;\n\nimport java.util.ArrayList;\nimport java.util.Comparator;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * RecommendationEngine вҖ” FILTERING, SCORING, AND SORTING ORCHESTRATOR\n * =============================================================================\n * This class contains the core business logic for the recommendation system:\n *   1. Filtering tracks by genre (multi-genre OR logic) and popularity\n *   2. Sorting filtered results using Merge Sort by any supported field\n *   3. Returning the top-N results as a formatted ASCII table\n *\n * It delegates the actual sorting to MergeSorter, keeping separation of concerns.\n * =============================================================================\n */\npublic class RecommendationEngine {\n\n    /**\n     * SortField вҖ” Enum defining all available sorting criteria.\n     * Each enum value maps to a Comparator that extracts the correct\n     * numeric property from an AudioEntity for comparison.\n     */\n    public enum SortField {\n        VIBE_SCORE,\n        POPULARITY,\n        DANCEABILITY,\n        ENERGY,\n        VALENCE\n    }\n\n    // ==================== FILTERING METHODS ====================\n\n    /**\n     * Filters tracks by selected genres using OR logic.\n     *\n     * A track is included if its genre matches ANY of the selected genres.\n     * This is the MULTI-GENRE OR logic: the user selects multiple genres,\n     * and any track belonging to any of those genres is kept.\n     *\n     * Time Complexity: O(n) вҖ” each track is checked once against the set.\n     *                  (Set.contains is O(1) average case for HashSet)\n     *\n     * @param allTracks      The complete list of tracks\n     * @param selectedGenres Set of genre names to filter by\n     * @return Filtered list containing only tracks matching at least one genre\n     */\n    public List\u003cTrackRecord\u003e filterByGenres(List\u003cTrackRecord\u003e allTracks,\n                                            Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres == null || selectedGenres.isEmpty()) {\n            return new ArrayList\u003c\u003e(); // No genres selected вҶ’ no results\n        }\n\n        List\u003cTrackRecord\u003e filtered = new ArrayList\u003c\u003e();\n\n        // O(n) linear scan вҖ” Set.contains() is O(1) average\n        for (TrackRecord track : allTracks) {\n            if (selectedGenres.contains(track.getGenre())) {\n                filtered.add(track);\n            }\n        }\n\n        return filtered;\n    }\n\n    /**\n     * Filters tracks by minimum popularity threshold.\n     *\n     * A track is included only if its popularity \u003e= minPopularity.\n     *\n     * Time Complexity: O(n) вҖ” each track is checked once.\n     *\n     * @param tracks         The list of tracks to filter\n     * @param minPopularity  Minimum popularity score (0вҖ“100)\n     * @return Filtered list containing only tracks meeting the threshold\n     */\n    public List\u003cTrackRecord\u003e filterByPopularity(List\u003cTrackRecord\u003e tracks,\n                                                 int minPopularity) {\n        if (minPopularity \u003c= 0) {\n            return tracks; // No filtering needed\n        }\n\n        List\u003cTrackRecord\u003e filtered = new ArrayList\u003c\u003e();\n\n        // O(n) linear scan\n        for (TrackRecord track : tracks) {\n            if (track.getPopularity() \u003e= minPopularity) {\n                filtered.add(track);\n            }\n        }\n\n        return filtered;\n    }\n\n    // ==================== SORTING METHODS ====================\n\n    /**\n     * Sorts the given list by the specified field using Merge Sort.\n     *\n     * Results are sorted in DESCENDING order (highest value first),\n     * so that the most relevant/popular/energetic tracks appear at the top.\n     *\n     * Time Complexity: O(n log n) вҖ” guaranteed by Merge Sort\n     * Space Complexity: O(n) вҖ” Merge Sort auxiliary array\n     *\n     * @param tracks    The list to sort (modified in-place)\n     * @param sortField The field to sort by\n     */\n    public void sortBy(List\u003cTrackRecord\u003e tracks, SortField sortField) {\n        if (tracks == null || tracks.size() \u003c= 1) {\n            return; // Nothing to sort\n        }\n\n        Comparator\u003cTrackRecord\u003e comparator = getComparator(sortField);\n        MergeSorter.sort(tracks, comparator);\n    }\n\n    /**\n     * Returns a Comparator for the given SortField.\n     *\n     * All comparators sort in DESCENDING order (higher values first)\n     * by swapping the comparison order: compare(b, a) instead of compare(a, b).\n     *\n     * @param sortField The field to compare\n     * @return A descending-order Comparator for that field\n     */\n    private Comparator\u003cTrackRecord\u003e getComparator(SortField sortField) {\n        switch (sortField) {\n            case VIBE_SCORE:\n                // Sort by composite Vibe Score descending\n                // (popularity + danceability*100 + energy*100 + valence*100) / 4\n                return (a, b) -\u003e Double.compare(b.getCompositeScore(), a.getCompositeScore());\n\n            case POPULARITY:\n                // Sort by raw popularity descending\n                return (a, b) -\u003e Integer.compare(b.getPopularity(), a.getPopularity());\n\n            case DANCEABILITY:\n                // Sort by danceability descending\n                return (a, b) -\u003e Double.compare(b.getDanceability(), a.getDanceability());\n\n            case ENERGY:\n                // Sort by energy descending\n                return (a, b) -\u003e Double.compare(b.getEnergy(), a.getEnergy());\n\n            case VALENCE:\n                // Sort by valence (musical positiveness) descending\n                return (a, b) -\u003e Double.compare(b.getValence(), a.getValence());\n\n            default:\n                // Fallback: sort by Vibe Score\n                return (a, b) -\u003e Double.compare(b.getCompositeScore(), a.getCompositeScore());\n        }\n    }\n\n    // ==================== RESULT FORMATTING ====================\n\n    /**\n     * Returns the top N tracks from the sorted list as a formatted ASCII table.\n     *\n     * The table uses box-drawing Unicode characters for clean borders:\n     *   в”Ңв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”җ\n     *   в”ӮRankв”ӮTrackв”ӮArtistв”ӮGenreв”ӮScoreв”Ӯ\n     *   в”ңв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Ө\n     *   в”Ӯ  1в”Ӯ... в”Ӯ... в”Ӯ... в”Ӯ ... в”Ӯ\n     *   в””в”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҳ\n     *\n     * Each row is produced by calling track.toAsciiRow(rank) вҖ” POLYMORPHISM\n     * in action: the engine doesn't know how the row is formatted, it just\n     * calls the method on the AudioEntity interface.\n     *\n     * @param tracks The sorted list of tracks\n     * @param n      Number of top results to include\n     * @return Formatted ASCII table string\n     */\n    public String formatTopN(List\u003cTrackRecord\u003e tracks, int n) {\n        if (tracks == null || tracks.isEmpty()) {\n            return buildEmptyTable();\n        }\n\n        int limit = Math.min(n, tracks.size());\n        StringBuilder sb = new StringBuilder();\n\n        // Table header\n        sb.append(\"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\");\n        sb.append(\"в”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist             в”Ӯ Genre          в”Ӯ  Score  в”Ӯ\\n\");\n        sb.append(\"в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\\n\");\n\n        // Table rows вҖ” POLYMORPHISM: each track formats its own row\n        for (int i = 0; i \u003c limit; i++) {\n            AudioEntity track = tracks.get(i);\n            sb.append(track.toAsciiRow(i + 1)).append(\"\\n\");\n        }\n\n        // Table footer\n        sb.append(\"в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\\n\");\n        sb.append(\"\\n  Showing \").append(limit).append(\" of \")\n                .append(tracks.size()).append(\" matching tracks.\\n\");\n\n        return sb.toString();\n    }\n\n    /**\n     * Builds an ASCII table for the case when no results are found.\n     */\n    private String buildEmptyTable() {\n        StringBuilder sb = new StringBuilder();\n        sb.append(\"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\");\n        sb.append(\"в”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist             в”Ӯ Genre          в”Ӯ  Score  в”Ӯ\\n\");\n        sb.append(\"в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\\n\");\n        sb.append(\"в”Ӯ      в”Ӯ   No matching tracks found.                    в”Ӯ                  в”Ӯ         в”Ӯ\\n\");\n        sb.append(\"в”Ӯ      в”Ӯ   Try selecting different genres or filters.   в”Ӯ                  в”Ӯ         в”Ӯ\\n\");\n        sb.append(\"в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\\n\");\n        return sb.toString();\n    }\n\n    // ==================== GENRE ENUMERATION ====================\n\n    /**\n     * Extracts all unique genre names from the full track list.\n     *\n     * Time Complexity: O(n) вҖ” scans each track once\n     * Space Complexity: O(g) вҖ” where g is the number of unique genres\n     *\n     * @param allTracks The complete list of tracks\n     * @return A sorted list of unique genre names (alphabetical)\n     */\n    public List\u003cString\u003e getAllGenres(List\u003cTrackRecord\u003e allTracks) {\n        // Use a java.util.TreeSet for automatic alphabetical sorting\n        java.util.Set\u003cString\u003e genreSet = new java.util.TreeSet\u003c\u003e();\n\n        for (TrackRecord track : allTracks) {\n            String genre = track.getGenre();\n            if (genre != null \u0026\u0026 !genre.isEmpty()) {\n                genreSet.add(genre);\n            }\n        }\n\n        return new ArrayList\u003c\u003e(genreSet);\n    }\n}\n",

                "newText": "package spotify.controller;\n\nimport spotify.model.AudioEntity;\nimport spotify.model.TrackRecord;\n\nimport java.util.ArrayList;\nimport java.util.Comparator;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * RecommendationEngine вҖ” FILTERING, SCORING, AND SORTING ORCHESTRATOR\n * =============================================================================\n * This class contains the core business logic for the recommendation system:\n *   1. Filtering tracks by genre (multi-genre OR logic) and popularity\n *   2. Sorting filtered results using Merge Sort by any supported field\n *   3. Returning the top-N results as a formatted ASCII table\n *\n * It delegates the actual sorting to MergeSorter, keeping separation of concerns.\n * =============================================================================\n */\npublic class RecommendationEngine {\n\n    /**\n     * SortField вҖ” Enum defining all available sorting criteria.\n     * Each enum value maps to a Comparator that extracts the correct\n     * numeric property from an AudioEntity for comparison.\n     */\n    public enum SortField {\n        VIBE_SCORE,\n        POPULARITY,\n        DANCEABILITY,\n        ENERGY,\n        VALENCE\n    }\n\n    // ==================== FILTERING METHODS ====================\n\n    /**\n     * Filters tracks by selected genres using OR logic.\n     *\n     * A track is included if its genre matches ANY of the selected genres.\n     * This is the MULTI-GENRE OR logic: the user selects multiple genres,\n     * and any track belonging to any of those genres is kept.\n     *\n     * Time Complexity: O(n) вҖ” each track is checked once against the set.\n     *                  (Set.contains is O(1) average case for HashSet)\n     *\n     * @param allTracks      The complete list of tracks\n     * @param selectedGenres Set of genre names to filter by\n     * @return Filtered list containing only tracks matching at least one genre\n     */\n    public List\u003cTrackRecord\u003e filterByGenres(List\u003cTrackRecord\u003e allTracks,\n                                            Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres == null || selectedGenres.isEmpty()) {\n            return new ArrayList\u003c\u003e(); // No genres selected вҶ’ no results\n        }\n\n        List\u003cTrackRecord\u003e filtered = new ArrayList\u003c\u003e();\n\n        // O(n) linear scan вҖ” Set.contains() is O(1) average\n        for (TrackRecord track : allTracks) {\n            if (selectedGenres.contains(track.getGenre())) {\n                filtered.add(track);\n            }\n        }\n\n        return filtered;\n    }\n\n    /**\n     * Filters tracks by minimum popularity threshold.\n     *\n     * A track is included only if its popularity \u003e= minPopularity.\n     *\n     * Time Complexity: O(n) вҖ” each track is checked once.\n     *\n     * @param tracks         The list of tracks to filter\n     * @param minPopularity  Minimum popularity score (0вҖ“100)\n     * @return Filtered list containing only tracks meeting the threshold\n     */\n    public List\u003cTrackRecord\u003e filterByPopularity(List\u003cTrackRecord\u003e tracks,\n                                                 int minPopularity) {\n        if (minPopularity \u003c= 0) {\n            return tracks; // No filtering needed\n        }\n\n        List\u003cTrackRecord\u003e filtered = new ArrayList\u003c\u003e();\n\n        // O(n) linear scan\n        for (TrackRecord track : tracks) {\n            if (track.getPopularity() \u003e= minPopularity) {\n                filtered.add(track);\n            }\n        }\n\n        return filtered;\n    }\n\n    // ==================== SORTING METHODS ====================\n\n    /**\n     * Sorts the given list by the specified field using Merge Sort.\n     *\n     * Results are sorted in DESCENDING order (highest value first),\n     * so that the most relevant/popular/energetic tracks appear at the top.\n     *\n     * Time Complexity: O(n log n) вҖ” guaranteed by Merge Sort\n     * Space Complexity: O(n) вҖ” Merge Sort auxiliary array\n     *\n     * @param tracks    The list to sort (modified in-place)\n     * @param sortField The field to sort by\n     */\n    public void sortBy(List\u003cTrackRecord\u003e tracks, SortField sortField) {\n        if (tracks == null || tracks.size() \u003c= 1) {\n            return; // Nothing to sort\n        }\n\n        Comparator\u003cTrackRecord\u003e comparator = getComparator(sortField);\n        MergeSorter.sort(tracks, comparator);\n    }\n\n    /**\n     * Returns a Comparator for the given SortField.\n     *\n     * All comparators sort in DESCENDING order (higher values first)\n     * by swapping the comparison order: compare(b, a) instead of compare(a, b).\n     *\n     * @param sortField The field to compare\n     * @return A descending-order Comparator for that field\n     */\n    private Comparator\u003cTrackRecord\u003e getComparator(SortField sortField) {\n        switch (sortField) {\n            case VIBE_SCORE:\n                // Sort by composite Vibe Score descending\n                // (popularity + danceability*100 + energy*100 + valence*100) / 4\n                return (a, b) -\u003e Double.compare(b.getCompositeScore(), a.getCompositeScore());\n\n            case POPULARITY:\n                // Sort by raw popularity descending\n                return (a, b) -\u003e Integer.compare(b.getPopularity(), a.getPopularity());\n\n            case DANCEABILITY:\n                // Sort by danceability descending\n                return (a, b) -\u003e Double.compare(b.getDanceability(), a.getDanceability());\n\n            case ENERGY:\n                // Sort by energy descending\n                return (a, b) -\u003e Double.compare(b.getEnergy(), a.getEnergy());\n\n            case VALENCE:\n                // Sort by valence (musical positiveness) descending\n                return (a, b) -\u003e Double.compare(b.getValence(), a.getValence());\n\n            default:\n                // Fallback: sort by Vibe Score\n                return (a, b) -\u003e Double.compare(b.getCompositeScore(), a.getCompositeScore());\n        }\n    }\n\n    // ==================== RESULT FORMATTING ====================\n\n    /**\n     * Returns the top N tracks from the sorted list as a formatted ASCII table.\n     *\n     * The table uses box-drawing Unicode characters for clean borders:\n     *   в”Ңв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”¬в”Җв”Җв”Җв”җ\n     *   в”ӮRankв”ӮTrackв”ӮArtistв”ӮGenreв”ӮScoreв”Ӯ\n     *   в”ңв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Ө\n     *   в”Ӯ  1в”Ӯ... в”Ӯ... в”Ӯ... в”Ӯ ... в”Ӯ\n     *   в””в”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҳ\n     *\n     * Each row is produced by calling track.toAsciiRow(rank) вҖ” POLYMORPHISM\n     * in action: the engine doesn't know how the row is formatted, it just\n     * calls the method on the AudioEntity interface.\n     *\n     * @param tracks The sorted list of tracks\n     * @param n      Number of top results to include\n     * @return Formatted ASCII table string\n     */\n    public String formatTopN(List\u003cTrackRecord\u003e tracks, int n) {\n        if (tracks == null || tracks.isEmpty()) {\n            return buildEmptyTable();\n        }\n\n        int limit = Math.min(n, tracks.size());\n        StringBuilder sb = new StringBuilder();\n\n        // Table header\n        sb.append(\"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\");\n        sb.append(\"в”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist             в”Ӯ Genre          в”Ӯ  Score  в”Ӯ\\n\");\n        sb.append(\"в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\\n\");\n\n        // Table rows вҖ” POLYMORPHISM: each track formats its own row\n        for (int i = 0; i \u003c limit; i++) {\n            AudioEntity track = tracks.get(i);\n            sb.append(track.toAsciiRow(i + 1)).append(\"\\n\");\n        }\n\n        // Table footer\n        sb.append(\"в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\\n\");\n        sb.append(\"\\n  Showing \").append(limit).append(\" of \")\n                .append(tracks.size()).append(\" matching tracks.\\n\");\n\n        return sb.toString();\n    }\n\n    /**\n     * Builds an ASCII table for the case when no results are found.\n     */\n    private String buildEmptyTable() {\n        StringBuilder sb = new StringBuilder();\n        sb.append(\"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\");\n        sb.append(\"в”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist             в”Ӯ Genre          в”Ӯ  Score  в”Ӯ\\n\");\n        sb.append(\"в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\\n\");\n        sb.append(\"в”Ӯ      в”Ӯ   No matching tracks found.                    в”Ӯ                  в”Ӯ         в”Ӯ\\n\");\n        sb.append(\"в”Ӯ      в”Ӯ   Try selecting different genres or filters.   в”Ӯ                  в”Ӯ         в”Ӯ\\n\");\n        sb.append(\"в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\\n\");\n        return sb.toString();\n    }\n\n    // ==================== GENRE ENUMERATION ====================\n\n    /**\n     * Extracts all unique genre names from the full track list.\n     *\n     * Time Complexity: O(n) вҖ” scans each track once\n     * Space Complexity: O(g) вҖ” where g is the number of unique genres\n     *\n     * @param allTracks The complete list of tracks\n     * @return A sorted list of unique genre names (alphabetical)\n     */\n    public List\u003cString\u003e getAllGenres(List\u003cTrackRecord\u003e allTracks) {\n        // Use a java.util.TreeSet for automatic alphabetical sorting\n        java.util.Set\u003cString\u003e genreSet = new java.util.TreeSet\u003c\u003e();\n\n        for (TrackRecord track : allTracks) {\n            String genre = track.getGenre();\n            if (genre != null \u0026\u0026 !genre.isEmpty()) {\n                genreSet.add(genre);\n            }\n        }\n\n        return new ArrayList\u003c\u003e(genreSet);\n    }\n}\n"

              "content": "/* ===================================================================\n * terminal.css вҖ” Retro ASCII Terminal Theme\n * ===================================================================\n * Color palette:\n *   Background:     White (#FFFFFF)\n *   Terminal bg:    Light Blue (#E8F4FD)\n *   Text:           Dark Blue (#1A5276)\n *   Accent:         Medium Blue (#2E86C1)\n *   Borders:        Steel Blue (#5DADE2)\n *   Highlight:      Bright Blue (#3498DB)\n * =================================================================== */\n\n/* Root application background */\n.root {\n    -fx-background-color: #FFFFFF;\n    -fx-font-family: \"Segoe UI\", \"Arial\", sans-serif;\n}\n\n/* Main container panel */\n.main-panel {\n    -fx-background-color: #FFFFFF;\n    -fx-padding: 15;\n    -fx-spacing: 12;\n}\n\n/* ===== TITLE BANNER ===== */\n.title-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 14px;\n    -fx-text-fill: #1A5276;\n    -fx-font-weight: bold;\n    -fx-padding: 8;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n}\n\n.subtitle-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-text-fill: #2E86C1;\n    -fx-padding: 4 8;\n}\n\n/* ===== CONTROL PANEL ===== */\n.control-panel {\n    -fx-background-color: #F0F8FF;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n    -fx-padding: 12;\n    -fx-spacing: 10;\n}\n\n.section-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-text-fill: #1A5276;\n    -fx-font-weight: bold;\n    -fx-padding: 0 0 2 0;\n}\n\n/* ===== GENRE LIST ===== */\n.genre-list-view {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-back -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-text-fill: #2E86C1;\n    -fx-background-color: transparent;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 3;\n    -fx-background-radius: 3;\n    -fx-padding: 6 16;\n    -fx-cursor: hand;\n}\n\n.btn-clear:hover {\n    -fx-background-color: #D4E6F1;\n}\n\n/* ===== STATUS BAR ===== */\n.status-bar {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-text-fill: #2E86C1;\n    -fx-padding: 4 8;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1 0 0 0;\n}\n\n/* ===== TERMINAL TEXT AREA (RESULTS) ===== */\n.terminal-textarea {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 13px;\n    -fx-text-fill: #1A5276;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 2;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n    -fx-padding: 8;\n    -fx-control-inner-background: #E8F4FD;\n}\n\n.terminal-textarea .content {\n    -fx-background-color: #E8F4FD;\n}\n\n.terminal-textarea:focused {\n    -fx-border-color: #2E86C1;\n}\n\n/* ===== LOADING OVERLAY ===== */\n.loading-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 16px;\n    -fx-text-fill: #1A5276;\n    -fx-alignment: center;\n}\n\n/* ===== SCROLL PANE ===== */\n.genre-scroll-pane {\n    -fx-background-color: transparent;\n    -fx-border-color: transparent;\n}\n\n.genre-scroll-pane \u003e .viewport {\n    -fx-background-color: transparent;\n}\n\n/* ===== HBox for controls row ===== */\n.controls-row {\n    -fx-spacing: 15;\n    -fx-alignment: center-left;\n}\n\n/* ===== Separator line ===== */\n.separator-line {\n    -fx-border-color: #D4E6F1;\n    -fx-border-width: 0 0 1 0;\n    -fx-padding: 5 0;\n}\n",

                "newText": "/* ===================================================================\n * terminal.css вҖ” Retro ASCII Terminal Theme\n * ===================================================================\n * Color palette:\n *   Background:     White (#FFFFFF)\n *   Terminal bg:    Light Blue (#E8F4FD)\n *   Text:           Dark Blue (#1A5276)\n *   Accent:         Medium Blue (#2E86C1)\n *   Borders:        Steel Blue (#5DADE2)\n *   Highlight:      Bright Blue (#3498DB)\n * =================================================================== */\n\n/* Root application background */\n.root {\n    -fx-background-color: #FFFFFF;\n    -fx-font-family: \"Segoe UI\", \"Arial\", sans-serif;\n}\n\n/* Main container panel */\n.main-panel {\n    -fx-background-color: #FFFFFF;\n    -fx-padding: 15;\n    -fx-spacing: 12;\n}\n\n/* ===== TITLE BANNER ===== */\n.title-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 14px;\n    -fx-text-fill: #1A5276;\n    -fx-font-weight: bold;\n    -fx-padding: 8;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n}\n\n.subtitle-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-text-fill: #2E86C1;\n    -fx-padding: 4 8;\n}\n\n/* ===== CONTROL PANEL ===== */\n.control-panel {\n    -fx-background-color: #F0F8FF;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n    -fx-padding: 12;\n    -fx-spacing: 10;\n}\n\n.section-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-text-fill: #1A5276;\n    -fx-font-weight: bold;\n    -fx-padding: 0 0 2 0;\n}\n\n/* ===== GENRE LIST ===== */\n.genre-list-view {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 3;\n    -fx-background-radius: 3;\n    -fx-pref-height: 140px;\n}\n\n.genre-list-view .list-cell {\n    -fx-background-color: transparent;\n    -fx-text-fill: #1A5276;\n    -fx-padding: 3 8;\n}\n\n.genre-list-view .list-cell:selected {\n    -fx-background-color: #3498DB;\n    -fx-text-fill: #FFFFFF;\n}\n\n.genre-list-view .list-cell:filled:hover {\n    -fx-background-color: #D4E6F1;\n}\n\n/* ===== TEXT FIELDS \u0026 COMBO BOXES ===== */\n.filter-text-field {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 3;\n    -fx-background-radius: 3;\n    -fx-pref-width: 80px;\n    -fx-padding: 4;\n    -fx-text-fill: #1A5276;\n    -fx-prompt-text-fill: #85C1E9;\n}\n\n.filter-combo-box {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 3;\n    -fx-background-radius: 3;\n    -fx-pref-width: 180px;\n}\n\n.filter-combo-box .list-cell {\n    -fx-text-fill: #1A5276;\n}\n\n/* ===== BUTTONS ===== */\n.btn-recommend {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 14px;\n    -fx-font-weight: bold;\n    -fx-text-fill: #FFFFFF;\n    -fx-background-color: #2E86C1;\n    -fx-border-color: #1A5276;\n    -fx-border-width: 2;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n    -fx-padding: 10 30;\n    -fx-cursor: hand;\n    -fx-effect: dropshadow(gaussian, #5DADE2, 4, 0.3, 0, 2);\n}\n\n.btn-recommend:hover {\n    -fx-background-color: #3498DB;\n    -fx-effect: dropshadow(gaussian, #2E86C1, 6, 0.5, 0, 3);\n}\n\n.btn-recommend:pressed {\n    -fx-background-color: #1A5276;\n    -fx-effect: none;\n}\n\n.btn-clear {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 12px;\n    -fx-text-fill: #2E86C1;\n    -fx-background-color: transparent;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1;\n    -fx-border-radius: 3;\n    -fx-background-radius: 3;\n    -fx-padding: 6 16;\n    -fx-cursor: hand;\n}\n\n.btn-clear:hover {\n    -fx-background-color: #D4E6F1;\n}\n\n/* ===== STATUS BAR ===== */\n.status-bar {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 11px;\n    -fx-text-fill: #2E86C1;\n    -fx-padding: 4 8;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 1 0 0 0;\n}\n\n/* ===== TERMINAL TEXT AREA (RESULTS) ===== */\n.terminal-textarea {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 13px;\n    -fx-text-fill: #1A5276;\n    -fx-background-color: #E8F4FD;\n    -fx-border-color: #5DADE2;\n    -fx-border-width: 2;\n    -fx-border-radius: 4;\n    -fx-background-radius: 4;\n    -fx-padding: 8;\n    -fx-control-inner-background: #E8F4FD;\n}\n\n.terminal-textarea .content {\n    -fx-background-color: #E8F4FD;\n}\n\n.terminal-textarea:focused {\n    -fx-border-color: #2E86C1;\n}\n\n/* ===== LOADING OVERLAY ===== */\n.loading-label {\n    -fx-font-family: \"Consolas\", \"Courier New\", \"Monospaced\";\n    -fx-font-size: 16px;\n    -fx-text-fill: #1A5276;\n    -fx-alignment: center;\n}\n\n/* ===== SCROLL PANE ===== */\n.genre-scroll-pane {\n    -fx-background-color: transparent;\n    -fx-border-color: transparent;\n}\n\n.genre-scroll-pane \u003e .viewport {\n    -fx-background-color: transparent;\n}\n\n/* ===== HBox for controls row ===== */\n.controls-row {\n    -fx-spacing: 15;\n    -fx-alignment: center-left;\n}\n\n/* ===== Separator line ===== */\n.separator-line {\n    -fx-border-color: #D4E6F1;\n    -fx-border-width: 0 0 1 0;\n    -fx-padding: 5 0;\n}\n"

            "rawInput": {
              "content": "package spotify.view;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.controller.RecommendationEngine.SortField;\nimport spotify.model.TrackRecord;\n\nimport javafx.geometry.Insets;\nimport javafx.geometry.Orientation;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.CheckBox;\nimport javafx.scene.control.ComboBox;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ListView;\nimport javafx.scene.control.SelectionMode;\nimport javafx.scene.control.TextArea;\nimport javafx.scene.control.TextField;\nimport javafx.scene.layout.BorderPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * TerminalView вҖ” JavaFX UI (VIEW layer of MVC)\n * =============================================================================\n * Builds the JavaFX window with a retro ASCII terminal aesthetic:\n *   - White/light-blue color scheme\n *   - Monospaced fonts throughout\n *   - Genre multi-select ListView\n *   - Popularity filter TextField\n *   - Sort-by ComboBox dropdown\n *   - Read-only TextArea for ASCII table output\n *\n * This class knows NOTHING about data loading or sorting internals.\n * It simply gathers user input, delegates to the controller, and displays results.\n * =============================================================================\n */\npublic class TerminalView {\n\n    // ---- UI Components ----\n    private final Stage primaryStage;\n    private final List\u003cTrackRecord\u003e allTracks;\n    private final RecommendationEngine engine;\n\n    private ListView\u003cString\u003e genreListView;\n    private TextField popularityField;\n    private ComboBox\u003cSortField\u003e sortComboBox;\n    private TextArea resultsArea;\n    private Label statusLabel;\n\n    /**\n     * Constructs the view and builds the entire UI.\n     *\n     * @param stage  The primary JavaFX Stage\n     * @param allTracks All loaded tracks from the dataset\n     * @param engine The recommendation engine for processing queries\n     */\n    public TerminalView(Stage primaryStage, List\u003cTrackRecord\u003e allTracks,\n                        RecommendationEngine engine) {\n        this.primaryStage = primaryStage;\n        this.allTracks = allTracks;\n        this.engine = engine;\n        buildScene();\n    }\n\n    /**\n     * Builds the complete scene with all UI components and styling.\n     */\n    private void buildScene() {\n        primaryStage.setTitle(\"Spotify Music Recommendation System\");\n\n        // ---- Main layout: BorderPane ----\n        BorderPane root = new BorderPane();\n        root.getStyleClass().add(\"main-panel\");\n\n        // ---- TOP: Title banner ----\n        VBox topPanel = buildTopPanel();\n        BorderPane.setAlignment(topPanel, javafx.geometry.Pos.CENTER);\n        root.setTop(topPanel);\n\n        // ---- CENTER: Controls + Results ----\n        VBox centerPanel = buildCenterPanel();\n        root.setCenter(centerPanel);\n\n        // ---- BOTTOM: Status bar ----\n        statusLabel = new Label(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n        statusLabel.getStyleClass().add(\"status-bar\");\n        statusLabel.setMaxWidth(Double.MAX_VALUE);\n        root.setBottom(statusLabel);\n\n        // ---- Load CSS ----\n        Scene scene = new Scene(root, 900, 720);\n        scene.getStylesheets().add(\n                getClass().getResource(\"terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setScene(scene);\n        primaryStage.setMinWidth(800);\n        primaryStage.setMinHeight(600);\n    }\n\n    /**\n     * Builds the title banner at the top of the window.\n     */\n    private VBox buildTopPanel() {\n        VBox vbox = new VBox(6);\n        vbox.setPadding(new Insets(10, 15, 5, 15));\n\n        // ASCII art title\n        Label titleLabel = new Label(\n                \"в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\\n\"\n                + \"в•‘   ____        _        ____  _                        в•‘\\n\"\n                + \"в•‘  / ___| _   _| |__    / ___|(_)_ __ ___  ___  ___    в•‘\\n\"\n                + \"в•‘  \\\\___ \\\\| | | | '_ \\\\  | |  _ | | '__/ _ \\\\/ __|/ _ \\\\   в•‘\\n\"\n                + \"в•‘   ___) | |_| | |_) | | |_| || | | |  __/\\\\__ \\\\  __/   в•‘\\n\"\n                + \"в•‘  |____/ \\\\__,_|_.__/   \\\\____||_|_|  \\\\___||___/\\\\___|   в•‘\\n\"\n                + \"в•‘                                                      в•‘\\n\"\n                + \"в•‘         Music Recommendation System                  в•‘\\n\"\n                + \"в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\"\n        );\n        titleLabel.getStyleClass().add(\"title-label\");\n        titleLabel.setWrapText(true);\n\n        Label subtitleLabel = new Label(\n                \"Powered by Merge Sort  вҖў  Filter by Genre  вҖў  Weighted Vibe Score\"\n        );\n        subtitleLabel.getStyleClass().add(\"subtitle-label\");\n\n        vbox.getChildren().addAll(titleLabel, subtitleLabel);\n        return vbox;\n    }\n\n    /**\n     * Builds the center panel containing controls and results area.\n     */\n    private VBox buildCenterPanel() {\n        VBox vbox = new VBox(10);\n        vbox.setPadding(new Insets(10, 15, 10, 15));\n\n        // --- Controls panel ---\n        VBox controlsPanel = buildControlsPanel();\n        controlsPanel.getStyleClass().add(\"control-panel\");\n\n        // --- Results area ---\n        resultsArea = new TextArea();\n        resultsArea.setEditable(false);\n        resultsArea.setWrapText(false);\n        resultsArea.getStyleClass().add(\"terminal-textarea\");\n        resultsArea.setFont(Font.font(\"Consolas\", 13));\n        resultsArea.setPromptText(\n                \"  Results will appear here after you click [RECOMMEND]...\"\n        );\n\n        vbox.getChildren().addAll(controlsPanel, resultsArea);\n        VBox.setVgrow(resultsArea, javafx.scene.layout.Priority.ALWAYS);\n\n        return vbox;\n    }\n\n    /**\n     * Builds the controls panel with genre selection, popularity filter,\n     * sort dropdown, and action buttons.\n     */\n    private VBox buildControlsPanel() {\n        VBox controlsBox = new VBox(10);\n\n        // ---- Row 1: Genre selection ----\n        Label genreLabel = new Label(\"GENRES (Multi-select with Ctrl+Click / Shift+Click):\");\n        genreLabel.getStyleClass().add(\"section-label\");\n\n        genreListView = new ListView\u003c\u003e();\n        genreListView.getSelectionModel().setSelectionMode(SelectionMode.MULTIPLE);\n        genreListView.getStyleClass().add(\"genre-list-view\");\n\n        // Populate genres alphabetically\n        List\u003cString\u003e genres = engine.getAllGenres(allTracks);\n        genreListView.getItems().addAll(genres);\n\n        VBox.setVgrow(genreListView, javafx.scene.layout.Priority.SOMETIMES);\n\n        // ---- Row 2: Popularity filter + Sort by ----\n        HBox filterRow = new HBox(20);\n        filterRow.getStyleClass().add(\"controls-row\");\n\n        // Popularity filter\n        VBox popBox = new VBox(4);\n        Label popLabel = new Label(\"MIN POPULARITY (0-100, optional):\");\n        popLabel.getStyleClass().add(\"section-label\");\n        popularityField = new TextField();\n        popularityField.getStyleClass().add(\"filter-text-field\");\n        popularityField.setPromptText(\"e.g. 50\");\n        popularityField.setPrefWidth(80);\n        popBox.getChildren().addAll(popLabel, popularityField);\n\n        // Sort by dropdown\n        VBox sortBox = new VBox(4);\n        Label sortLabel = new Label(\"SORT BY:\");\n        sortLabel.getStyleClass().add(\"section-label\");\n        sortComboBox = new ComboBox\u003c\u003e();\n        sortComboBox.getItems().addAll(SortField.values());\n        sortComboBox.setValue(SortField.VIBE_SCORE); // Default sort\n        sortComboBox.getStyleClass().add(\"filter-combo-box\");\n        sortBox.getChildren().addAll(sortLabel, sortComboBox);\n\n        filterRow.getChildren().addAll(popBox, sortBox);\n\n        // ---- Row 3: Action buttons ----\n        HBox buttonRow = new HBox(15);\n        buttonRow.getStyleClass().add(\"controls-row\");\n\n        Button recommendBtn = new Button(\"в–ә  RECOMMEND\");\n        recommendBtn.getStyleClass().add(\"btn-recommend\");\n        recommendBtn.setOnAction(e -\u003e handleRecommend());\n\n        Button clearBtn = new Button(\"вң•  CLEAR\");\n        clearBtn.getStyleClass().add(\"btn-clear\");\n        clearBtn.setOnAction(e -\u003e handleClear());\n\n        Button selectAllBtn = new Button(\"вҳҗ SELECT ALL GENRES\");\n        selectAllBtn.getStyleClass().add(\"btn-clear\");\n        selectAllBtn.setOnAction(e -\u003e handleSelectAllGenres());\n\n        buttonRow.getChildren().addAll(recommendBtn, clearBtn, selectAllBtn);\n\n        controlsBox.getChildren().addAll(genreLabel, genreListView, filterRow, buttonRow);\n        return controlsBox;\n    }\n\n    // ==================== EVENT HANDLERS ====================\n\n    /**\n     * Handles the RECOMMEND button click.\n     * 1. Validates that at least one genre is selected.\n     * 2. Parses optional popularity filter.\n     * 3. Applies filters via the engine.\n     * 4. Sorts results via Merge Sort.\n     * 5. Formats and displays the top 10 as an ASCII table.\n     */\n    private void handleRecommend() {\n        // Step 1: Get selected genres\n        Set\u003cString\u003e selectedGenres = new HashSet\u003c\u003e(genreListView.getSelectionModel().getSelectedItems());\n\n        if (selectedGenres.isEmpty()) {\n            statusLabel.setText(\"вҡ  Please select at least one genre.\");\n            resultsArea.setText(\n                    \"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\"\n                    + \"в”Ӯ  вҡ   No genres selected!                                в”Ӯ\\n\"\n                    + \"в”Ӯ                                                        в”Ӯ\\n\"\n                    + \"в”Ӯ  Please select one or more genres from the list above в”Ӯ\\n\"\n                    + \"в”Ӯ  using Ctrl+Click or Shift+Click, then try again.     в”Ӯ\\n\"\n                    + \"в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\"\n            );\n            return;\n        }\n\n        // Step 2: Parse optional popularity threshold\n        int minPopularity = 0;\n        String popText = popularityField.getText().trim();\n        if (!popText.isEmpty()) {\n            try {\n                minPopularity = Integer.parseInt(popText);\n                minPopularity = Math.max(0, Math.min(100, minPopularity)); // Clamp 0-100\n            } catch (NumberFormatException e) {\n                statusLabel.setText(\"вҡ  Invalid popularity value. Using 0 (no filter).\");\n                minPopularity = 0;\n            }\n        }\n\n        // Step 3: Get sort field\n        SortField sortField = sortComboBox.getValue();\n        if (sortField == null) {\n            sortField = SortField.VIBE_SCORE;\n        }\n\n        // Step 4: Execute recommendation pipeline\n        long startTime = System.currentTimeMillis();\n\n        // Filter by genres (multi-genre OR logic)\n        List\u003cTrackRecord\u003e filtered = engine.filterByGenres(allTracks, selectedGenres);\n\n        // Filter by minimum popularity\n        filtered = engine.filterByPopularity(filtered, minPopularity);\n\n        // Sort using Merge Sort (O(n log n))\n        engine.sortBy(filtered, sortField);\n\n        long elapsed = System.currentTimeMillis() - startTime;\n\n        // Step 5: Format and display top 10\n        String table = engine.formatTopN(filtered, 10);\n\n        // Add header info\n        StringBuilder fullOutput = new StringBuilder();\n        fullOutput.append(\"  Sort: \").append(sortField)\n                .append(\"  |  Genres: \").append(selectedGenres.size())\n                .append(\"  |  Filtered: \").append(filtered.size())\n                .append(\"  |  Time: \").append(elapsed).append(\"ms\\n\\n\");\n        fullOutput.append(table);\n\n        resultsArea.setText(fullOutput.toString());\n        resultsArea.positionCaret(0); // Scroll to top\n\n        // Update status bar\n        String genreSummary = buildGenreSummary(selectedGenres);\n        statusLabel.setText(\n                \"вң“ Found \" + filtered.size() + \" tracks | Sorted by \"\n                + sortField + \" | \" + genreSummary\n        );\n    }\n\n    /**\n     * Handles the CLEAR button click вҖ” resets all filters and results.\n     */\n    private void handleClear() {\n        genreListView.getSelectionModel().clearSelection();\n        popularityField.clear();\n        sortComboBox.setValue(SortField.VIBE_SCORE);\n        resultsArea.clear();\n        statusLabel.setText(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n    }\n\n    /**\n     * Handles the SELECT ALL GENRES button вҖ” selects every genre in the list.\n     */\n    private void handleSelectAllGenres() {\n        genreListView.getSelectionModel().selectAll();\n    }\n\n    /**\n     * Builds a short summary string of selected genres for the status bar.\n     */\n    private String buildGenreSummary(Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres.size() \u003c= 3) {\n            return String.join(\", \", selectedGenres);\n        }\n        List\u003cString\u003e sorted = new ArrayList\u003c\u003e(selectedGenres);\n        sorted.sort(String::compareTo);\n        return sorted.get(0) + \", \" + sorted.get(1) + \", + \" + (sorted.size() - 2) + \" more\";\n    }\n\n    /**\n     * Shows the stage (window).\n     */\n    public void show() {\n        primaryStage.show();\n    }\n}\n",

                "newText": "package spotify.view;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.controller.RecommendationEngine.SortField;\nimport spotify.model.TrackRecord;\n\nimport javafx.geometry.Insets;\nimport javafx.geometry.Orientation;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.CheckBox;\nimport javafx.scene.control.ComboBox;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ListView;\nimport javafx.scene.control.SelectionMode;\nimport javafx.scene.control.TextArea;\nimport javafx.scene.control.TextField;\nimport javafx.scene.layout.BorderPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * TerminalView вҖ” JavaFX UI (VIEW layer of MVC)\n * =============================================================================\n * Builds the JavaFX window with a retro ASCII terminal aesthetic:\n *   - White/light-blue color scheme\n *   - Monospaced fonts throughout\n *   - Genre multi-select ListView\n *   - Popularity filter TextField\n *   - Sort-by ComboBox dropdown\n *   - Read-only TextArea for ASCII table output\n *\n * This class knows NOTHING about data loading or sorting internals.\n * It simply gathers user input, delegates to the controller, and displays results.\n * =============================================================================\n */\npublic class TerminalView {\n\n    // ---- UI Components ----\n    private final Stage primaryStage;\n    private final List\u003cTrackRecord\u003e allTracks;\n    private final RecommendationEngine engine;\n\n    private ListView\u003cString\u003e genreListView;\n    private TextField popularityField;\n    private ComboBox\u003cSortField\u003e sortComboBox;\n    private TextArea resultsArea;\n    private Label statusLabel;\n\n    /**\n     * Constructs the view and builds the entire UI.\n     *\n     * @param stage  The primary JavaFX Stage\n     * @param allTracks All loaded tracks from the dataset\n     * @param engine The recommendation engine for processing queries\n     */\n    public TerminalView(Stage primaryStage, List\u003cTrackRecord\u003e allTracks,\n                        RecommendationEngine engine) {\n        this.primaryStage = primaryStage;\n        this.allTracks = allTracks;\n        this.engine = engine;\n        buildScene();\n    }\n\n    /**\n     * Builds the complete scene with all UI components and styling.\n     */\n    private void buildScene() {\n        primaryStage.setTitle(\"Spotify Music Recommendation System\");\n\n        // ---- Main layout: BorderPane ----\n        BorderPane root = new BorderPane();\n        root.getStyleClass().add(\"main-panel\");\n\n        // ---- TOP: Title banner ----\n        VBox topPanel = buildTopPanel();\n        BorderPane.setAlignment(topPanel, javafx.geometry.Pos.CENTER);\n        root.setTop(topPanel);\n\n        // ---- CENTER: Controls + Results ----\n        VBox centerPanel = buildCenterPanel();\n        root.setCenter(centerPanel);\n\n        // ---- BOTTOM: Status bar ----\n        statusLabel = new Label(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n        statusLabel.getStyleClass().add(\"status-bar\");\n        statusLabel.setMaxWidth(Double.MAX_VALUE);\n        root.setBottom(statusLabel);\n\n        // ---- Load CSS ----\n        Scene scene = new Scene(root, 900, 720);\n        scene.getStylesheets().add(\n                getClass().getResource(\"terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setScene(scene);\n        primaryStage.setMinWidth(800);\n        primaryStage.setMinHeight(600);\n    }\n\n    /**\n     * Builds the title banner at the top of the window.\n     */\n    private VBox buildTopPanel() {\n        VBox vbox = new VBox(6);\n        vbox.setPadding(new Insets(10, 15, 5, 15));\n\n        // ASCII art title\n        Label titleLabel = new Label(\n                \"в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\\n\"\n                + \"в•‘   ____        _        ____  _                        в•‘\\n\"\n                + \"в•‘  / ___| _   _| |__    / ___|(_)_ __ ___  ___  ___    в•‘\\n\"\n                + \"в•‘  \\\\___ \\\\| | | | '_ \\\\  | |  _ | | '__/ _ \\\\/ __|/ _ \\\\   в•‘\\n\"\n                + \"в•‘   ___) | |_| | |_) | | |_| || | | |  __/\\\\__ \\\\  __/   в•‘\\n\"\n                + \"в•‘  |____/ \\\\__,_|_.__/   \\\\____||_|_|  \\\\___||___/\\\\___|   в•‘\\n\"\n                + \"в•‘                                                      в•‘\\n\"\n                + \"в•‘         Music Recommendation System                  в•‘\\n\"\n                + \"в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\"\n        );\n        titleLabel.getStyleClass().add(\"title-label\");\n        titleLabel.setWrapText(true);\n\n        Label subtitleLabel = new Label(\n                \"Powered by Merge Sort  вҖў  Filter by Genre  вҖў  Weighted Vibe Score\"\n        );\n        subtitleLabel.getStyleClass().add(\"subtitle-label\");\n\n        vbox.getChildren().addAll(titleLabel, subtitleLabel);\n        return vbox;\n    }\n\n    /**\n     * Builds the center panel containing controls and results area.\n     */\n    private VBox buildCenterPanel() {\n        VBox vbox = new VBox(10);\n        vbox.setPadding(new Insets(10, 15, 10, 15));\n\n        // --- Controls panel ---\n        VBox controlsPanel = buildControlsPanel();\n        controlsPanel.getStyleClass().add(\"control-panel\");\n\n        // --- Results area ---\n        resultsArea = new TextArea();\n        resultsArea.setEditable(false);\n        resultsArea.setWrapText(false);\n        resultsArea.getStyleClass().add(\"terminal-textarea\");\n        resultsArea.setFont(Font.font(\"Consolas\", 13));\n        resultsArea.setPromptText(\n                \"  Results will appear here after you click [RECOMMEND]...\"\n        );\n\n        vbox.getChildren().addAll(controlsPanel, resultsArea);\n        VBox.setVgrow(resultsArea, javafx.scene.layout.Priority.ALWAYS);\n\n        return vbox;\n    }\n\n    /**\n     * Builds the controls panel with genre selection, popularity filter,\n     * sort dropdown, and action buttons.\n     */\n    private VBox buildControlsPanel() {\n        VBox controlsBox = new VBox(10);\n\n        // ---- Row 1: Genre selection ----\n        Label genreLabel = new Label(\"GENRES (Multi-select with Ctrl+Click / Shift+Click):\");\n        genreLabel.getStyleClass().add(\"section-label\");\n\n        genreListView = new ListView\u003c\u003e();\n        genreListView.getSelectionModel().setSelectionMode(SelectionMode.MULTIPLE);\n        genreListView.getStyleClass().add(\"genre-list-view\");\n\n        // Populate genres alphabetically\n        List\u003cString\u003e genres = engine.getAllGenres(allTracks);\n        genreListView.getItems().addAll(genres);\n\n        VBox.setVgrow(genreListView, javafx.scene.layout.Priority.SOMETIMES);\n\n        // ---- Row 2: Popularity filter + Sort by ----\n        HBox filterRow = new HBox(20);\n        filterRow.getStyleClass().add(\"controls-row\");\n\n        // Popularity filter\n        VBox popBox = new VBox(4);\n        Label popLabel = new Label(\"MIN POPULARITY (0-100, optional):\");\n        popLabel.getStyleClass().add(\"section-label\");\n        popularityField = new TextField();\n        popularityField.getStyleClass().add(\"filter-text-field\");\n        popularityField.setPromptText(\"e.g. 50\");\n        popularityField.setPrefWidth(80);\n        popBox.getChildren().addAll(popLabel, popularityField);\n\n        // Sort by dropdown\n        VBox sortBox = new VBox(4);\n        Label sortLabel = new Label(\"SORT BY:\");\n        sortLabel.getStyleClass().add(\"section-label\");\n        sortComboBox = new ComboBox\u003c\u003e();\n        sortComboBox.getItems().addAll(SortField.values());\n        sortComboBox.setValue(SortField.VIBE_SCORE); // Default sort\n        sortComboBox.getStyleClass().add(\"filter-combo-box\");\n        sortBox.getChildren().addAll(sortLabel, sortComboBox);\n\n        filterRow.getChildren().addAll(popBox, sortBox);\n\n        // ---- Row 3: Action buttons ----\n        HBox buttonRow = new HBox(15);\n        buttonRow.getStyleClass().add(\"controls-row\");\n\n        Button recommendBtn = new Button(\"в–ә  RECOMMEND\");\n        recommendBtn.getStyleClass().add(\"btn-recommend\");\n        recommendBtn.setOnAction(e -\u003e handleRecommend());\n\n        Button clearBtn = new Button(\"вң•  CLEAR\");\n        clearBtn.getStyleClass().add(\"btn-clear\");\n        clearBtn.setOnAction(e -\u003e handleClear());\n\n        Button selectAllBtn = new Button(\"вҳҗ SELECT ALL GENRES\");\n        selectAllBtn.getStyleClass().add(\"btn-clear\");\n        selectAllBtn.setOnAction(e -\u003e handleSelectAllGenres());\n\n        buttonRow.getChildren().addAll(recommendBtn, clearBtn, selectAllBtn);\n\n        controlsBox.getChildren().addAll(genreLabel, genreListView, filterRow, buttonRow);\n        return controlsBox;\n    }\n\n    // ==================== EVENT HANDLERS ====================\n\n    /**\n     * Handles the RECOMMEND button click.\n     * 1. Validates that at least one genre is selected.\n     * 2. Parses optional popularity filter.\n     * 3. Applies filters via the engine.\n     * 4. Sorts results via Merge Sort.\n     * 5. Formats and displays the top 10 as an ASCII table.\n     */\n    private void handleRecommend() {\n        // Step 1: Get selected genres\n        Set\u003cString\u003e selectedGenres = new HashSet\u003c\u003e(genreListView.getSelectionModel().getSelectedItems());\n\n        if (selectedGenres.isEmpty()) {\n            statusLabel.setText(\"вҡ  Please select at least one genre.\");\n            resultsArea.setText(\n                    \"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\"\n                    + \"в”Ӯ  вҡ   No genres selected!                                в”Ӯ\\n\"\n                    + \"в”Ӯ                                                        в”Ӯ\\n\"\n                    + \"в”Ӯ  Please select one or more genres from the list above в”Ӯ\\n\"\n                    + \"в”Ӯ  using Ctrl+Click or Shift+Click, then try again.     в”Ӯ\\n\"\n                    + \"в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\"\n            );\n            return;\n        }\n\n        // Step 2: Parse optional popularity threshold\n        int minPopularity = 0;\n        String popText = popularityField.getText().trim();\n        if (!popText.isEmpty()) {\n            try {\n                minPopularity = Integer.parseInt(popText);\n                minPopularity = Math.max(0, Math.min(100, minPopularity)); // Clamp 0-100\n            } catch (NumberFormatException e) {\n                statusLabel.setText(\"вҡ  Invalid popularity value. Using 0 (no filter).\");\n                minPopularity = 0;\n            }\n        }\n\n        // Step 3: Get sort field\n        SortField sortField = sortComboBox.getValue();\n        if (sortField == null) {\n            sortField = SortField.VIBE_SCORE;\n        }\n\n        // Step 4: Execute recommendation pipeline\n        long startTime = System.currentTimeMillis();\n\n        // Filter by genres (multi-genre OR logic)\n        List\u003cTrackRecord\u003e filtered = engine.filterByGenres(allTracks, selectedGenres);\n\n        // Filter by minimum popularity\n        filtered = engine.filterByPopularity(filtered, minPopularity);\n\n        // Sort using Merge Sort (O(n log n))\n        engine.sortBy(filtered, sortField);\n\n        long elapsed = System.currentTimeMillis() - startTime;\n\n        // Step 5: Format and display top 10\n        String table = engine.formatTopN(filtered, 10);\n\n        // Add header info\n        StringBuilder fullOutput = new StringBuilder();\n        fullOutput.append(\"  Sort: \").append(sortField)\n                .append(\"  |  Genres: \").append(selectedGenres.size())\n                .append(\"  |  Filtered: \").append(filtered.size())\n                .append(\"  |  Time: \").append(elapsed).append(\"ms\\n\\n\");\n        fullOutput.append(table);\n\n        resultsArea.setText(fullOutput.toString());\n        resultsArea.positionCaret(0); // Scroll to top\n\n        // Update status bar\n        String genreSummary = buildGenreSummary(selectedGenres);\n        statusLabel.setText(\n                \"вң“ Found \" + filtered.size() + \" tracks | Sorted by \"\n                + sortField + \" | \" + genreSummary\n        );\n    }\n\n    /**\n     * Handles the CLEAR button click вҖ” resets all filters and results.\n     */\n    private void handleClear() {\n        genreListView.getSelectionModel().clearSelection();\n        popularityField.clear();\n        sortComboBox.setValue(SortField.VIBE_SCORE);\n        resultsArea.clear();\n        statusLabel.setText(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n    }\n\n    /**\n     * Handles the SELECT ALL GENRES button вҖ” selects every genre in the list.\n     */\n    private void handleSelectAllGenres() {\n        genreListView.getSelectionModel().selectAll();\n    }\n\n    /**\n     * Builds a short summary string of selected genres for the status bar.\n     */\n    private String buildGenreSummary(Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres.size() \u003c= 3) {\n            return String.join(\", \", selectedGenres);\n        }\n        List\u003cString\u003e sorted = new ArrayList\u003c\u003e(selectedGenres);\n        sorted.sort(String::compareTo);\n        return sorted.get(0) + \", \" + sorted.get(1) + \", + \" + (sorted.size() - 2) + \" more\";\n    }\n\n    /**\n     * Shows the stage (window).\n     */\n    public void show() {\n        primaryStage.show();\n    }\n}\n"

            "status": "completed",
            "rawInput": {
              "content": "package spotify;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.model.TrackRecord;\nimport spotify.repository.TrackRepository;\nimport spotify.view.TerminalView;\n\nimport javafx.application.Application;\nimport javafx.geometry.Pos;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ProgressBar;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.io.IOException;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.util.List;\n\n/**\n * =============================================================================\n * Main вҖ” APPLICATION ENTRY POINT (JavaFX)\n * =============================================================================\n * This class bootstraps the entire application:\n *   1. Displays a loading screen while the dataset is parsed\n *   2. Loads all ~114k tracks into memory via TrackRepository\n *   3. Creates the RecommendationEngine (controller)\n *   4. Creates and displays the TerminalView (view)\n *\n * MVC Wiring:\n *   Model    = TrackRecord (data objects loaded from CSV)\n *   View     = TerminalView (JavaFX UI)\n *   Controller = RecommendationEngine + TrackRepository\n *\n * No external libraries are used вҖ” only JavaFX and the Java standard library.\n * =============================================================================\n */\npublic class Main extends Application {\n\n    /** Path to the dataset CSV relative to the project root. */\n    private static final String CSV_FILENAME = \"dataset/dataset.csv\";\n\n    /**\n     * JavaFX entry point.\n     * Called automatically by the JavaFX launcher.\n     *\n     * @param primaryStage The main application window\n     */\n    @Override\n    public void start(Stage primaryStage) {\n        // ---- Show loading screen first ----\n        VBox loadingBox = new VBox(15);\n        loadingBox.setAlignment(Pos.CENTER);\n\n        Label loadingLabel = new Label(\"Loading Spotify Dataset...\");\n        loadingLabel.setFont(Font.font(\"Consolas\", 18));\n        loadingLabel.setStyle(\"-fx-text-fill: #1A5276;\");\n\n        Label fileLabel = new Label(\"Reading: \" + CSV_FILENAME);\n        fileLabel.setFont(Font.font(\"Consolas\", 12));\n        fileLabel.setStyle(\"-fx-text-fill: #2E86C1;\");\n\n        ProgressBar progressBar = new ProgressBar();\n        progressBar.setPrefWidth(300);\n        progressBar.setStyle(\n                \"-fx-accent: #2E86C1;\"\n                + \"-fx-background-color: #E8F4FD;\"\n        );\n\n        loadingBox.getChildren().addAll(loadingLabel, fileLabel, progressBar);\n\n        Scene loadingScene = new Scene(loadingBox, 450, 200);\n        loadingScene.getStylesheets().add(\n                getClass().getResource(\"view/terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setTitle(\"Spotify Music Recommendation System вҖ” Loading...\");\n        primaryStage.setScene(loadingScene);\n        primaryStage.setResizable(false);\n        primaryStage.show();\n\n        // ---- Load data asynchronously, then switch to main UI ----\n        new Thread(() -\u003e {\n            List\u003cTrackRecord\u003e allTracks = loadDataset();\n\n            // Switch back to JavaFX Application thread\n            javafx.application.Platform.runLater(() -\u003e {\n                if (allTracks == null || allTracks.isEmpty()) {\n                    // Show error if loading failed\n                    showErrorScreen(primaryStage, \"Failed to load dataset. Check the file path.\");\n                    return;\n                }\n\n                // Build the MVC application\n                launchMainApp(primaryStage, allTracks);\n            });\n        }).start();\n    }\n\n    /**\n     * Loads the dataset from the CSV file using TrackRepository.\n     *\n     * @return List of all loaded TrackRecord objects, or null on failure\n     */\n    private List\u003cTrackRecord\u003e loadDataset() {\n        try {\n            // Resolve the CSV path relative to the current working directory\n            Path csvPath = Paths.get(CSV_FILENAME);\n\n            if (!java.nio.file.Files.exists(csvPath)) {\n                System.err.println(\"[Main] ERROR: CSV file not found at: \" + csvPath.toAbsolutePath());\n                return null;\n            }\n\n            TrackRepository repository = new TrackRepository();\n            return repository.loadTracks(csvPath);\n\n        } catch (IOException e) {\n            System.err.println(\"[Main] ERROR: Failed to read CSV file: \" + e.getMessage());\n            return null;\n        }\n    }\n\n    /**\n     * Wires up the MVC components and launches the main application window.\n     *\n     * @param stage     The primary stage\n     * @param allTracks The loaded track data\n     */\n    private void launchMainApp(Stage stage, List\u003cTrackRecord\u003e allTracks) {\n        // ---- CONTROLLER ----\n        RecommendationEngine engine = new RecommendationEngine();\n\n        // ---- VIEW (receives model data + controller reference) ----\n        TerminalView view = new TerminalView(stage, allTracks, engine);\n\n        // ---- Show the main window ----\n        stage.setTitle(\"Spotify Music Recommendation System\");\n        stage.setWidth(950);\n        stage.setHeight(750);\n        view.show();\n\n        System.out.println(\"[Main] Application started with \" + allTracks.size() + \" tracks loaded.\");\n    }\n\n    /**\n     * Displays an error screen when the dataset fails to load.\n     */\n    private void showErrorScreen(Stage stage, String message) {\n        VBox errorBox = new VBox(15);\n        errorBox.setAlignment(Pos.CENTER);\n\n        Label errorLabel = new Label(\"ERROR\");\n        errorLabel.setFont(Font.font(\"Consolas\", 24));\n        errorLabel.setStyle(\"-fx-text-fill: #C0392B;\");\n\n        Label msgLabel = new Label(message);\n        msgLabel.setFont(Font.font(\"Consolas\", 12));\n        msgLabel.setStyle(\"-fx-text-fill: #2E86C1;\");\n        msgLabel.setWrapText(true);\n        msgLabel.setMaxWidth(350);\n\n        Label hintLabel = new Label(\n                \"Ensure the file exists at: \" + CSV_FILENAME\n        );\n        hintLabel.setFont(Font.font(\"Consolas\", 11));\n        hintLabel.setStyle(\"-fx-text-fill: #85929E;\");\n\n        errorBox.getChildren().addAll(errorLabel, msgLabel, hintLabel);\n\n        Scene errorScene = new Scene(errorBox, 450, 250);\n        stage.setScene(errorScene);\n        stage.setTitle(\"Spotify Music Recommendation System вҖ” Error\");\n    }\n\n    /**\n     * Standard Java main method вҖ” launches the JavaFX application.\n     *\n     * @param args Command-line arguments (unused)\n     */\n    public static void main(String[] args) {\n        launch(args);\n    }\n}\n",
