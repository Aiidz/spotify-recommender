  Label loadingLabel = new Label(\"Loading Spotify Dataset...\");\n        loadingLabel.setFont(Font.font(\"Consolas\", 18));\n        loadingLabel.setStyle(\"-fx-text-fill: #1A5276;\");\n\n        Label fileLabel = new Label(\"Reading: \" + CSV_FILENAME);\n        fileLabel.setFont(Font.font(\"Consolas\", 12));\n        fileLabel.setStyle(\"-fx-text-fill: #2E86C1;\");\n\n        ProgressBar progressBar = new ProgressBar();\n        progressBar.setPrefWidth(300);\n        progressBar.setStyle(\n                \"-fx-accent: #2E86C1;\"\n                + \"-fx-background-color: #E8F4FD;\"\n        );\n\n        loadingBox.getChildren().addAll(loadingLabel, fileLabel, progressBar);\n\n        Scene loadingScene = new Scene(loadingBox, 450, 200);\n        loadingScene.getStylesheets().add(\n                getClass().getResource(\"view/terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setTitle(\"Spotify Music Recommendation System вҖ” Loading...\");\n        primaryStage.setScene(loadingScene);\n        primaryStage.setResizable(false);\n        primaryStage.show();\n\n        // ---- Load data asynchronously, then switch to main UI ----\n        new Thread(() -\u003e {\n            List\u003cTrackRecord\u003e allTracks = loadDataset();\n\n            // Switch back to JavaFX Application thread\n            javafx.application.Platform.runLater(() -\u003e {\n                if (allTracks == null || allTracks.isEmpty()) {\n                    // Show error if loading failed\n                    showErrorScreen(primaryStage, \"Failed to load dataset. Check the file path.\");\n                    return;\n                }\n\n                // Build the MVC application\n                launchMainApp(primaryStage, allTracks);\n            });\n        }).start();\n    }\n\n    /**\n     * Loads the dataset from the CSV file using TrackRepository.\n     *\n     * @return List of all loaded TrackRecord objects, or null on failure\n     */\n    private List\u003cTrackRecord\u003e loadDataset() {\n        try {\n            // Resolve the CSV path relative to the current working directory\n            Path csvPath = Paths.get(CSV_FILENAME);\n\n            if (!java.nio.file.Files.exists(csvPath)) {\n                System.err.println(\"[Main] ERROR: CSV file not found at: \" + csvPath.toAbsolutePath());\n                return null;\n            }\n\n            TrackRepository repository = new TrackRepository();\n            return repository.loadTracks(csvPath);\n\n        } catch (IOException e) {\n            System.err.println(\"[Main] ERROR: Failed to read CSV file: \" + e.getMessage());\n            return null;\n        }\n    }\n\n    /**\n     * Wires up the MVC components and launches the main application window.\n     *\n     * @param stage     The primary stage\n     * @param allTracks The loaded track data\n     */\n    private void launchMainApp(Stage stage, List\u003cTrackRecord\u003e allTracks) {\n        // ---- CONTROLLER ----\n        RecommendationEngine engine = new RecommendationEngine();\n\n        // ---- VIEW (receives model data + controller reference) ----\n        TerminalView view = new TerminalView(stage, allTracks, engine);\n\n        // ---- Show the main window ----\n        stage.setTitle(\"Spotify Music Recommendation System\");\n        stage.setWidth(950);\n        stage.setHeight(750);\n        view.show();\n\n        System.out.println(\"[Main] Application started with \" + allTracks.size() + \" tracks loaded.\");\n    }\n\n    /**\n     * Displays an error screen when the dataset fails to load.\n     */\n    private void showErrorScreen(Stage stage, String message) {\n        VBox errorBox = new VBox(15);\n        errorBox.setAlignment(Pos.CENTER);\n\n        Label errorLabel = new Label(\"ERROR\");\n        errorLabel.setFont(Font.font(\"Consolas\", 24));\n        errorLabel.setStyle(\"-fx-text-fill: #C0392B;\");\n\n        Label msgLabel = new Label(message);\n        msgLabel.setFont(Font.font(\"Consolas\", 12));\n        msgLabel.setStyle(\"-fx-text-fill: #2E86C1;\");\n        msgLabel.setWrapText(true);\n        msgLabel.setMaxWidth(350);\n\n        Label hintLabel = new Label(\n                \"Ensure the file exists at: \" + CSV_FILENAME\n        );\n        hintLabel.setFont(Font.font(\"Consolas\", 11));\n        hintLabel.setStyle(\"-fx-text-fill: #85929E;\");\n\n        errorBox.getChildren().addAll(errorLabel, msgLabel, hintLabel);\n\n        Scene errorScene = new Scene(errorBox, 450, 250);\n        stage.setScene(errorScene);\n        stage.setTitle(\"Spotify Music Recommendation System вҖ” Error\");\n    }\n\n    /**\n     * Standard Java main method вҖ” launches the JavaFX application.\n     *\n     * @param args Command-line arguments (unused)\n     */\n    public static void main(String[] args) {\n        launch(args);\n    }\n}\n"

                  "type": "text",
                  "text": "package spotify.view;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.controller.RecommendationEngine.SortField;\nimport spotify.model.TrackRecord;\n\nimport javafx.geometry.Insets;\nimport javafx.geometry.Orientation;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.CheckBox;\nimport javafx.scene.control.ComboBox;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ListView;\nimport javafx.scene.control.SelectionMode;\nimport javafx.scene.control.TextArea;\nimport javafx.scene.control.TextField;\nimport javafx.scene.layout.BorderPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * TerminalView вҖ” JavaFX UI (VIEW layer of MVC)\n * =============================================================================\n * Builds the JavaFX window with a retro ASCII terminal aesthetic:\n *   - White/light-blue color scheme\n *   - Monospaced fonts throughout\n *   - Genre multi-select ListView\n *   - Popularity filter TextField\n *   - Sort-by ComboBox dropdown\n *   - Read-only TextArea for ASCII table output\n *\n * This class knows NOTHING about data loading or sorting internals.\n * It simply gathers user input, delegates to the controller, and displays results.\n * =============================================================================\n */\npublic class TerminalView {\n\n    // ---- UI Components ----\n    private final Stage primaryStage;\n    private final List\u003cTrackRecord\u003e allTracks;\n    private final RecommendationEngine engine;\n\n    private ListView\u003cString\u003e genreListView;\n    private TextField popularityField;\n    private ComboBox\u003cSortField\u003e sortComboBox;\n    private TextArea resultsArea;\n    private Label statusLabel;\n\n    /**\n     * Constructs the view and builds the entire UI.\n     *\n     * @param stage  The primary JavaFX Stage\n     * @param allTracks All loaded tracks from the dataset\n     * @param engine The recommendation engine for processing queries\n     */\n    public TerminalView(Stage primaryStage, List\u003cTrackRecord\u003e allTracks,\n                        RecommendationEngine engine) {\n        this.primaryStage = primaryStage;\n        this.allTracks = allTracks;\n        this.engine = engine;\n        buildScene();\n    }\n\n    /**\n     * Builds the complete scene with all UI components and styling.\n     */\n    private void buildScene() {\n        primaryStage.setTitle(\"Spotify Music Recommendation System\");\n\n        // ---- Main layout: BorderPane ----\n        BorderPane root = new BorderPane();\n        root.getStyleClass().add(\"main-panel\");\n\n        // ---- TOP: Title banner ----\n        VBox topPanel = buildTopPanel();\n        BorderPane.setAlignment(topPanel, javafx.geometry.Pos.CENTER);\n        root.setTop(topPanel);\n\n        // ---- CENTER: Controls + Results ----\n        VBox centerPanel = buildCenterPanel();\n        root.setCenter(centerPanel);\n\n        // ---- BOTTOM: Status bar ----\n        statusLabel = new Label(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n        statusLabel.getStyleClass().add(\"status-bar\");\n        statusLabel.setMaxWidth(Double.MAX_VALUE);\n        root.setBottom(statusLabel);\n\n        // ---- Load CSS ----\n        Scene scene = new Scene(root, 900, 720);\n        scene.getStylesheets().add(\n                getClass().getResource(\"terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setScene(scene);\n        primaryStage.setMinWidth(800);\n        primaryStage.setMinHeight(600);\n    }\n\n    /**\n     * Builds the title banner at the top of the window.\n     */\n    private VBox buildTopPanel() {\n        VBox vbox = new VBox(6);\n        vbox.setPadding(new Insets(10, 15, 5, 15));\n\n        // ASCII art title\n        Label titleLabel = new Label(\n                \"в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\\n\"\n                + \"в•‘   ____        _        ____  _                        в•‘\\n\"\n                + \"в•‘  / ___| _   _| |__    / ___|(_)_ __ ___  ___  ___    в•‘\\n\"\n                + \"в•‘  \\\\___ \\\\| | | | '_ \\\\  | |  _ | | '__/ _ \\\\/ __|/ _ \\\\   в•‘\\n\"\n                + \"в•‘   ___) | |_| | |_) | | |_| || | | |  __/\\\\__ \\\\  __/   в•‘\\n\"\n                + \"в•‘  |____/ \\\\__,_|_.__/   \\\\____||_|_|  \\\\___||___/\\\\___|   в•‘\\n\"\n                + \"в•‘                                                      в•‘\\n\"\n                + \"в•‘         Music Recommendation System                  в•‘\\n\"\n                + \"в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\"\n        );\n        titleLabel.getStyleClass().add(\"title-label\");\n        titleLabel.setWrapText(true);\n\n        Label subtitleLabel = new Label(\n                \"Powered by Merge Sort  вҖў  Filter by Genre  вҖў  Weighted Vibe Score\"\n        );\n        subtitleLabel.getStyleClass().add(\"subtitle-label\");\n\n        vbox.getChildren().addAll(titleLabel, subtitleLabel);\n        return vbox;\n    }\n\n    /**\n     * Builds the center panel containing controls and results area.\n     */\n    private VBox buildCenterPanel() {\n        VBox vbox = new VBox(10);\n        vbox.setPadding(new Insets(10, 15, 10, 15));\n\n        // --- Controls panel ---\n        VBox controlsPanel = buildControlsPanel();\n        controlsPanel.getStyleClass().add(\"control-panel\");\n\n        // --- Results area ---\n        resultsArea = new TextArea();\n        resultsArea.setEditable(false);\n        resultsArea.setWrapText(false);\n        resultsArea.getStyleClass().add(\"terminal-textarea\");\n        resultsArea.setFont(Font.font(\"Consolas\", 13));\n        resultsArea.setPromptText(\n                \"  Results will appear here after you click [RECOMMEND]...\"\n        );\n\n        vbox.getChildren().addAll(controlsPanel, resultsArea);\n        VBox.setVgrow(resultsArea, javafx.scene.layout.Priority.ALWAYS);\n\n        return vbox;\n    }\n\n    /**\n     * Builds the controls panel with genre selection, popularity filter,\n     * sort dropdown, and action buttons.\n     */\n    private VBox buildControlsPanel() {\n        VBox controlsBox = new VBox(10);\n\n        // ---- Row 1: Genre selection ----\n        Label genreLabel = new Label(\"GENRES (Multi-select with Ctrl+Click / Shift+Click):\");\n        genreLabel.getStyleClass().add(\"section-label\");\n\n        genreListView = new ListView\u003c\u003e();\n        genreListView.getSelectionModel().setSelectionMode(SelectionMode.MULTIPLE);\n        genreListView.getStyleClass().add(\"genre-list-view\");\n\n        // Populate genres alphabetically\n        List\u003cString\u003e genres = engine.getAllGenres(allTracks);\n        genreListView.getItems().addAll(genres);\n\n        VBox.setVgrow(genreListView, javafx.scene.layout.Priority.SOMETIMES);\n\n        // ---- Row 2: Popularity filter + Sort by ----\n        HBox filterRow = new HBox(20);\n        filterRow.getStyleClass().add(\"controls-row\");\n\n        // Popularity filter\n        VBox popBox = new VBox(4);\n        Label popLabel = new Label(\"MIN POPULARITY (0-100, optional):\");\n        popLabel.getStyleClass().add(\"section-label\");\n        popularityField = new TextField();\n        popularityField.getStyleClass().add(\"filter-text-field\");\n        popularityField.setPromptText(\"e.g. 50\");\n        popularityField.setPrefWidth(80);\n        popBox.getChildren().addAll(popLabel, popularityField);\n\n        // Sort by dropdown\n        VBox sortBox = new VBox(4);\n        Label sortLabel = new Label(\"SORT BY:\");\n        sortLabel.getStyleClass().add(\"section-label\");\n        sortComboBox = new ComboBox\u003c\u003e();\n        sortComboBox.getItems().addAll(SortField.values());\n        sortComboBox.setValue(SortField.VIBE_SCORE); // Default sort\n        sortComboBox.getStyleClass().add(\"filter-combo-box\");\n        sortBox.getChildren().addAll(sortLabel, sortComboBox);\n\n        filterRow.getChildren().addAll(popBox, sortBox);\n\n        // ---- Row 3: Action buttons ----\n        HBox buttonRow = new HBox(15);\n        buttonRow.getStyleClass().add(\"controls-row\");\n\n        Button recommendBtn = new Button(\"в–ә  RECOMMEND\");\n        recommendBtn.getStyleClass().add(\"btn-recommend\");\n        recommendBtn.setOnAction(e -\u003e handleRecommend());\n\n        Button clearBtn = new Button(\"вң•  CLEAR\");\n        clearBtn.getStyleClass().add(\"btn-clear\");\n        clearBtn.setOnAction(e -\u003e handleClear());\n\n        Button selectAllBtn = new Button(\"вҳҗ SELECT ALL GENRES\");\n        selectAllBtn.getStyleClass().add(\"btn-clear\");\n        selectAllBtn.setOnAction(e -\u003e handleSelectAllGenres());\n\n        buttonRow.getChildren().addAll(recommendBtn, clearBtn, selectAllBtn);\n\n        controlsBox.getChildren().addAll(genreLabel, genreListView, filterRow, buttonRow);\n        return controlsBox;\n    }\n\n    // ==================== EVENT HANDLERS ====================\n\n    /**\n     * Handles the RECOMMEND button click.\n     * 1. Validates that at least one genre is selected.\n     * 2. Parses optional popularity filter.\n     * 3. Applies filters via the engine.\n     * 4. Sorts results via Merge Sort.\n     * 5. Formats and displays the top 10 as an ASCII table.\n     */\n    private void handleRecommend() {\n        // Step 1: Get selected genres\n        Set\u003cString\u003e selectedGenres = new HashSet\u003c\u003e(genreListView.getSelectionModel().getSelectedItems());\n\n        if (selectedGenres.isEmpty()) {\n            statusLabel.setText(\"вҡ  Please select at least one genre.\");\n            resultsArea.setText(\n                    \"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\"\n                    + \"в”Ӯ  вҡ   No genres selected!                                в”Ӯ\\n\"\n                    + \"в”Ӯ                                                        в”Ӯ\\n\"\n                    + \"в”Ӯ  Please select one or more genres from the list above в”Ӯ\\n\"\n                    + \"в”Ӯ  using Ctrl+Click or Shift+Click, then try again.     в”Ӯ\\n\"\n                    + \"в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\"\n            );\n            return;\n        }\n\n        // Step 2: Parse optional popularity threshold\n        int minPopularity = 0;\n        String popText = popularityField.getText().trim();\n        if (!popText.isEmpty()) {\n            try {\n                minPopularity = Integer.parseInt(popText);\n                minPopularity = Math.max(0, Math.min(100, minPopularity)); // Clamp 0-100\n            } catch (NumberFormatException e) {\n                statusLabel.setText(\"вҡ  Invalid popularity value. Using 0 (no filter).\");\n                minPopularity = 0;\n            }\n        }\n\n        // Step 3: Get sort field\n        SortField sortField = sortComboBox.getValue();\n        if (sortField == null) {\n            sortField = SortField.VIBE_SCORE;\n        }\n\n        // Step 4: Execute recommendation pipeline\n        long startTime = System.currentTimeMillis();\n\n        // Filter by genres (multi-genre OR logic)\n        List\u003cTrackRecord\u003e filtered = engine.filterByGenres(allTracks, selectedGenres);\n\n        // Filter by minimum popularity\n        filtered = engine.filterByPopularity(filtered, minPopularity);\n\n        // Sort using Merge Sort (O(n log n))\n        engine.sortBy(filtered, sortField);\n\n        long elapsed = System.currentTimeMillis() - startTime;\n\n        // Step 5: Format and display top 10\n        String table = engine.formatTopN(filtered, 10);\n\n        // Add header info\n        StringBuilder fullOutput = new StringBuilder();\n        fullOutput.append(\"  Sort: \").append(sortField)\n                .append(\"  |  Genres: \").append(selectedGenres.size())\n                .append(\"  |  Filtered: \").append(filtered.size())\n                .append(\"  |  Time: \").append(elapsed).append(\"ms\\n\\n\");\n        fullOutput.append(table);\n\n        resultsArea.setText(fullOutput.toString());\n        resultsArea.positionCaret(0); // Scroll to top\n\n        // Update status bar\n        String genreSummary = buildGenreSummary(selectedGenres);\n        statusLabel.setText(\n                \"вң“ Found \" + filtered.size() + \" tracks | Sorted by \"\n                + sortField + \" | \" + genreSummary\n        );\n    }\n\n    /**\n     * Handles the CLEAR button click вҖ” resets all filters and results.\n     */\n    private void handleClear() {\n        genreListView.getSelectionModel().clearSelection();\n        popularityField.clear();\n        sortComboBox.setValue(SortField.VIBE_SCORE);\n        resultsArea.clear();\n        statusLabel.setText(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n    }\n\n    /**\n     * Handles the SELECT ALL GENRES button вҖ” selects every genre in the list.\n     */\n    private void handleSelectAllGenres() {\n        genreListView.getSelectionModel().selectAll();\n    }\n\n    /**\n     * Builds a short summary string of selected genres for the status bar.\n     */\n    private String buildGenreSummary(Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres.size() \u003c= 3) {\n            return String.join(\", \", selectedGenres);\n        }\n        List\u003cString\u003e sorted = new ArrayList\u003c\u003e(selectedGenres);\n        sorted.sort(String::compareTo);\n        return sorted.get(0) + \", \" + sorted.get(1) + \", + \" + (sorted.size() - 2) + \" more\";\n    }\n\n    /**\n     * Shows the stage (window).\n     */\n    public void show() {\n        primaryStage.show();\n    }\n}\n"
                }

ORPHISM: Overrides BaseEntity.toAsciiRow(int)\n     * =================================================================\n     * Formats this track as a single row in the ASCII results table.\n     * The View layer knows nothing about TrackRecord internals вҖ” it\n     * simply calls audioEntity.toAsciiRow(rank) on any AudioEntity.\n     *\n     * Column widths:\n     *   Rank:     4 chars\n     *   Track:   24 chars (truncated with \"...\" if longer)\n     *   Artist:  18 chars (truncated with \"...\" if longer)\n     *   Genre:   14 chars (truncated if longer)\n     *   Score:    7 chars (X.X format)\n     *\n     * @param rank The 1-based display rank\n     * @return Formatted ASCII table row\n     */\n    @Override\n    public String toAsciiRow(int rank) {\n        String track = truncate(getTrackName(), 24);\n        String artist = truncate(getArtists(), 18);\n        String genre = truncate(getGenre(), 14);\n        String score = String.format(\"%6.1f\", getCompositeScore());\n\n        return String.format(\"в”Ӯ %3d в”Ӯ %-24s в”Ӯ %-18s в”Ӯ %-14s в”Ӯ %7s в”Ӯ\",\n                rank, track, artist, genre, score);\n    }\n\n    /**\n     * Truncates a string to maxLength characters, appending \"...\" if truncated.\n     *\n     * @param input     The string to truncate\n     * @param maxLength Maximum desired length (before adding \"...\")\n     * @return Truncated string with ellipsis if needed\n     */\n    private String truncate(String input, int maxLength) {\n        if (input == null || input.isEmpty()) {\n            return \"Unknown\";\n        }\n        if (input.length() \u003c= maxLength) {\n            return input;\n        }\n        return input.substring(0, maxLength - 3) + \"...\";\n    }\n}\n",
                "newText": "package spotify.model;\n\n/**\n * =============================================================================\n * TrackRecord вҖ” CONCRETE CLASS (POLYMORPHISM)\n * =============================================================================\n * This is the concrete implementation representing a single Spotify track.\n * It extends BaseEntity (Inheritance) and overrides toAsciiRow() to provide\n * its own ASCII formatting вҖ” demonstrating POLYMORPHISM.\n *\n * The View layer calls toAsciiRow() on any AudioEntity reference, and the\n * correct implementation is invoked at runtime вҖ” classic polymorphic behavior.\n * =============================================================================\n */\npublic class TrackRecord extends BaseEntity {\n\n    /**\n     * Constructs a TrackRecord with all fields from the dataset.\n     *\n     * @param trackId       Unique Spotify identifier\n     * @param trackName     Song title\n     * @param artists       Artist name(s)\n     * @param albumName     Album title\n     * @param genre         Single genre classification\n     * @param popularity    Spotify popularity (0вҖ“100)\n     * @param durationMs    Duration in milliseconds\n     * @param explicit      Explicit content flag\n     * @param danceability  Danceability metric (0.0вҖ“1.0)\n     * @param energy        Energy metric (0.0вҖ“1.0)\n     * @param valence       Valence / positiveness metric (0.0вҖ“1.0)\n     */\n    public TrackRecord(String trackId, String trackName, String artists,\n                       String albumName, String genre, int popularity,\n                       long durationMs, boolean explicit,\n                       double danceability, double energy, double valence) {\n        super(trackId, trackName, artists, albumName, genre, popularity,\n                durationMs, explicit, danceability, energy, valence);\n    }\n\n    /**\n     * =================================================================\n     * POLYMORPHISM: Overrides BaseEntity.toAsciiRow(int)\n     * =================================================================\n     * Formats this track as a single row in the ASCII results table.\n     * The View layer knows nothing about TrackRecord internals вҖ” it\n     * simply calls audioEntity.toAsciiRow(rank) on any AudioEntity.\n     *\n     * Column widths:\n     *   Rank:     4 chars\n     *   Track:   24 chars (truncated with \"...\" if longer)\n     *   Artist:  18 chars (truncated with \"...\" if longer)\n     *   Genre:   14 chars (truncated if longer)\n     *   Score:    7 chars (X.X format)\n     *\n     * @param rank The 1-based display rank\n     * @return Formatted ASCII table row\n     */\n    @Override\n    public String toAsciiRow(int rank) {\n        String track = truncate(getTrackName(), 24);\n        String artist = truncate(getArtists(), 18);\n        String genre = truncate(getGenre(), 14);\n        String score = String.format(\"%6.1f\", getCompositeScore());\n\n        return String.format(\"в”Ӯ %4d в”Ӯ %-24s в”Ӯ %-18s в”Ӯ %-14s в”Ӯ %7s в”Ӯ\",\n                rank, track, artist, genre, score);\n    }\n\n    /**\n     * Truncates a string to maxLength characters, appending \"...\" if truncated.\n     *\n     * @param input     The string to truncate\n     * @param maxLength Maximum desired length (before adding \"...\")\n     * @return Truncated string with ellipsis if needed\n     */\n    private String truncate(String input, int maxLength) {\n        if (input == null || input.isEmpty()) {\n            return \"Unknown\";\n        }\n        if (input.length() \u003c= maxLength) {\n            return input;\n        }\n        return input.substring(0, maxLength - 3) + \"...\";\n    }\n}\n"

                "oldText": "package spotify.view;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.controller.RecommendationEngine.SortField;\nimport spotify.model.TrackRecord;\n\nimport javafx.geometry.Insets;\nimport javafx.geometry.Orientation;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.CheckBox;\nimport javafx.scene.control.ComboBox;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ListView;\nimport javafx.scene.control.SelectionMode;\nimport javafx.scene.control.TextArea;\nimport javafx.scene.control.TextField;\nimport javafx.scene.layout.BorderPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * TerminalView вҖ” JavaFX UI (VIEW layer of MVC)\n * =============================================================================\n * Builds the JavaFX window with a retro ASCII terminal aesthetic:\n *   - White/light-blue color scheme\n *   - Monospaced fonts throughout\n *   - Genre multi-select ListView\n *   - Popularity filter TextField\n *   - Sort-by ComboBox dropdown\n *   - Read-only TextArea for ASCII table output\n *\n * This class knows NOTHING about data loading or sorting internals.\n * It simply gathers user input, delegates to the controller, and displays results.\n * =============================================================================\n */\npublic class TerminalView {\n\n    // ---- UI Components ----\n    private final Stage primaryStage;\n    private final List\u003cTrackRecord\u003e allTracks;\n    private final RecommendationEngine engine;\n\n    private ListView\u003cString\u003e genreListView;\n    private TextField popularityField;\n    private ComboBox\u003cSortField\u003e sortComboBox;\n    private TextArea resultsArea;\n    private Label statusLabel;\n\n    /**\n     * Constructs the view and builds the entire UI.\n     *\n     * @param stage  The primary JavaFX Stage\n     * @param allTracks All loaded tracks from the dataset\n     * @param engine The recommendation engine for processing queries\n     */\n    public TerminalView(Stage primaryStage, List\u003cTrackRecord\u003e allTracks,\n                        RecommendationEngine engine) {\n        this.primaryStage = primaryStage;\n        this.allTracks = allTracks;\n        this.engine = engine;\n        buildScene();\n    }\n\n    /**\n     * Builds the complete scene with all UI components and styling.\n     */\n    private void buildScene() {\n        primaryStage.setTitle(\"Spotify Music Recommendation System\");\n\n        // ---- Main layout: BorderPane ----\n        BorderPane root = new BorderPane();\n        root.getStyleClass().add(\"main-panel\");\n\n        // ---- TOP: Title banner ----\n        VBox topPanel = buildTopPanel();\n        BorderPane.setAlignment(topPanel, javafx.geometry.Pos.CENTER);\n        root.setTop(topPanel);\n\n        // ---- CENTER: Controls + Results ----\n        VBox centerPanel = buildCenterPanel();\n        root.setCenter(centerPanel);\n\n        // ---- BOTTOM: Status bar ----\n        statusLabel = new Label(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n        statusLabel.getStyleClass().add(\"status-bar\");\n        statusLabel.setMaxWidth(Double.MAX_VALUE);\n        root.setBottom(statusLabel);\n\n        // ---- Load CSS ----\n        Scene scene = new Scene(root, 900, 720);\n        scene.getStylesheets().add(\n                getClass().getResource(\"terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setScene(scene);\n        primaryStage.setMinWidth(800);\n        primaryStage.setMinHeight(600);\n    }\n\n    /**\n     * Builds the title banner at the top of the window.\n     */\n    private VBox buildTopPanel() {\n        VBox vbox = new VBox(6);\n        vbox.setPadding(new Insets(10, 15, 5, 15));\n\n        // ASCII art title\n        Label titleLabel = new Label(\n                \"в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\\n\"\n                + \"в•‘   ____        _        ____  _                        в•‘\\n\"\n                + \"в•‘  / ___| _   _| |__    / ___|(_)_ __ ___  ___  ___    в•‘\\n\"\n                + \"в•‘  \\\\___ \\\\| | | | '_ \\\\  | |  _ | | '__/ _ \\\\/ __|/ _ \\\\   в•‘\\n\"\n                + \"в•‘   ___) | |_| | |_) | | |_| || | | |  __/\\\\__ \\\\  __/   в•‘\\n\"\n                + \"в•‘  |____/ \\\\__,_|_.__/   \\\\____||_|_|  \\\\___||___/\\\\___|   в•‘\\n\"\n                + \"в•‘                                                      в•‘\\n\"\n                + \"в•‘         Music Recommendation System                  в•‘\\n\"\n                + \"в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\"\n        );\n        titleLabel.getStyleClass().add(\"title-label\");\n        titleLabel.setWrapText(true);\n\n        Label subtitleLabel = new Label(\n                \"Powered by Merge Sort  вҖў  Filter by Genre  вҖў  Weighted Vibe Score\"\n        );\n        subtitleLabel.getStyleClass().add(\"subtitle-label\");\n\n        vbox.getChildren().addAll(titleLabel, subtitleLabel);\n        return vbox;\n    }\n\n    /**\n     * Builds the center panel containing controls and results area.\n     */\n    private VBox buildCenterPanel() {\n        VBox vbox = new VBox(10);\n        vbox.setPadding(new Insets(10, 15, 10, 15));\n\n        // --- Controls panel ---\n        VBox controlsPanel = buildControlsPanel();\n        controlsPanel.getStyleClass().add(\"control-panel\");\n\n        // --- Results area ---\n        resultsArea = new TextArea();\n        resultsArea.setEditable(false);\n        resultsArea.setWrapText(false);\n        resultsArea.getStyleClass().add(\"terminal-textarea\");\n        resultsArea.setFont(Font.font(\"Consolas\", 13));\n        resultsArea.setPromptText(\n                \"  Results will appear here after you click [RECOMMEND]...\"\n        );\n\n        vbox.getChildren().addAll(controlsPanel, resultsArea);\n        VBox.setVgrow(resultsArea, javafx.scene.layout.Priority.ALWAYS);\n\n        return vbox;\n    }\n\n    /**\n     * Builds the controls panel with genre selection, popularity filter,\n     * sort dropdown, and action buttons.\n     */\n    private VBox buildControlsPanel() {\n        VBox controlsBox = new VBox(10);\n\n        // ---- Row 1: Genre selection ----\n        Label genreLabel = new Label(\"GENRES (Multi-select with Ctrl+Click / Shift+Click):\");\n        genreLabel.getStyleClass().add(\"section-label\");\n\n        genreListView = new ListView\u003c\u003e();\n        genreListView.getSelectionModel().setSelectionMode(SelectionMode.MULTIPLE);\n        genreListView.getStyleClass().add(\"genre-list-view\");\n\n        // Populate genres alphabetically\n        List\u003cString\u003e genres = engine.getAllGenres(allTracks);\n        genreListView.getItems().addAll(genres);\n\n        VBox.setVgrow(genreListView, javafx.scene.layout.Priority.SOMETIMES);\n\n        // ---- Row 2: Popularity filter + Sort by ----\n        HBox filterRow = new HBox(20);\n        filterRow.getStyleClass().add(\"controls-row\");\n\n        // Popularity filter\n        VBox popBox = new VBox(4);\n        Label popLabel = new Label(\"MIN POPULARITY (0-100, optional):\");\n        popLabel.getStyleClass().add(\"section-label\");\n        popularityField = new TextField();\n        popularityField.getStyleClass().add(\"filter-text-field\");\n        popularityField.setPromptText(\"e.g. 50\");\n        popularityField.setPrefWidth(80);\n        popBox.getChildren().addAll(popLabel, popularityField);\n\n        // Sort by dropdown\n        VBox sortBox = new VBox(4);\n        Label sortLabel = new Label(\"SORT BY:\");\n        sortLabel.getStyleClass().add(\"section-label\");\n        sortComboBox = new ComboBox\u003c\u003e();\n        sortComboBox.getItems().addAll(SortField.values());\n        sortComboBox.setValue(SortField.VIBE_SCORE); // Default sort\n        sortComboBox.getStyleClass().add(\"filter-combo-box\");\n        sortBox.getChildren().addAll(sortLabel, sortComboBox);\n\n        filterRow.getChildren().addAll(popBox, sortBox);\n\n        // ---- Row 3: Action buttons ----\n        HBox buttonRow = new HBox(15);\n        buttonRow.getStyleClass().add(\"controls-row\");\n\n        Button recommendBtn = new Button(\"в–ә  RECOMMEND\");\n        recommendBtn.getStyleClass().add(\"btn-recommend\");\n        recommendBtn.setOnAction(e -\u003e handleRecommend());\n\n        Button clearBtn = new Button(\"вң•  CLEAR\");\n        clearBtn.getStyleClass().add(\"btn-clear\");\n        clearBtn.setOnAction(e -\u003e handleClear());\n\n        Button selectAllBtn = new Button(\"вҳҗ SELECT ALL GENRES\");\n        selectAllBtn.getStyleClass().add(\"btn-clear\");\n        selectAllBtn.setOnAction(e -\u003e handleSelectAllGenres());\n\n        buttonRow.getChildren().addAll(recommendBtn, clearBtn, selectAllBtn);\n\n        controlsBox.getChildren().addAll(genreLabel, genreListView, filterRow, buttonRow);\n        return controlsBox;\n    }\n\n    // ==================== EVENT HANDLERS ====================\n\n    /**\n     * Handles the RECOMMEND button click.\n     * 1. Validates that at least one genre is selected.\n     * 2. Parses optional popularity filter.\n     * 3. Applies filters via the engine.\n     * 4. Sorts results via Merge Sort.\n     * 5. Formats and displays the top 10 as an ASCII table.\n     */\n    private void handleRecommend() {\n        // Step 1: Get selected genres\n        Set\u003cString\u003e selectedGenres = new HashSet\u003c\u003e(genreListView.getSelectionModel().getSelectedItems());\n\n        if (selectedGenres.isEmpty()) {\n            statusLabel.setText(\"вҡ  Please select at least one genre.\");\n            resultsArea.setText(\n                    \"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\"\n                    + \"в”Ӯ  вҡ   No genres selected!                                в”Ӯ\\n\"\n                    + \"в”Ӯ                                                        в”Ӯ\\n\"\n                    + \"в”Ӯ  Please select one or more genres from the list above в”Ӯ\\n\"\n                    + \"в”Ӯ  using Ctrl+Click or Shift+Click, then try again.     в”Ӯ\\n\"\n                    + \"в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\"\n            );\n            return;\n        }\n\n        // Step 2: Parse optional popularity threshold\n        int minPopularity = 0;\n        String popText = popularityField.getText().trim();\n        if (!popText.isEmpty()) {\n            try {\n                minPopularity = Integer.parseInt(popText);\n                minPopularity = Math.max(0, Math.min(100, minPopularity)); // Clamp 0-100\n            } catch (NumberFormatException e) {\n                statusLabel.setText(\"вҡ  Invalid popularity value. Using 0 (no filter).\");\n                minPopularity = 0;\n            }\n        }\n\n        // Step 3: Get sort field\n        SortField sortField = sortComboBox.getValue();\n        if (sortField == null) {\n            sortField = SortField.VIBE_SCORE;\n        }\n\n        // Step 4: Execute recommendation pipeline\n        long startTime = System.currentTimeMillis();\n\n        // Filter by genres (multi-genre OR logic)\n        List\u003cTrackRecord\u003e filtered = engine.filterByGenres(allTracks, selectedGenres);\n\n        // Filter by minimum popularity\n        filtered = engine.filterByPopularity(filtered, minPopularity);\n\n        // Sort using Merge Sort (O(n log n))\n        engine.sortBy(filtered, sortField);\n\n        long elapsed = System.currentTimeMillis() - startTime;\n\n        // Step 5: Format and display top 10\n        String table = engine.formatTopN(filtered, 10);\n\n        // Add header info\n        StringBuilder fullOutput = new StringBuilder();\n        fullOutput.append(\"  Sort: \").append(sortField)\n                .append(\"  |  Genres: \").append(selectedGenres.size())\n                .append(\"  |  Filtered: \").append(filtered.size())\n                .append(\"  |  Time: \").append(elapsed).append(\"ms\\n\\n\");\n        fullOutput.append(table);\n\n        resultsArea.setText(fullOutput.toString());\n        resultsArea.positionCaret(0); // Scroll to top\n\n        // Update status bar\n        String genreSummary = buildGenreSummary(selectedGenres);\n        statusLabel.setText(\n                \"вң“ Found \" + filtered.size() + \" tracks | Sorted by \"\n                + sortField + \" | \" + genreSummary\n        );\n    }\n\n    /**\n     * Handles the CLEAR button click вҖ” resets all filters and results.\n     */\n    private void handleClear() {\n        genreListView.getSelectionModel().clearSelection();\n        popularityField.clear();\n        sortComboBox.setValue(SortField.VIBE_SCORE);\n        resultsArea.clear();\n        statusLabel.setText(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n    }\n\n    /**\n     * Handles the SELECT ALL GENRES button вҖ” selects every genre in the list.\n     */\n    private void handleSelectAllGenres() {\n        genreListView.getSelectionModel().selectAll();\n    }\n\n    /**\n     * Builds a short summary string of selected genres for the status bar.\n     */\n    private String buildGenreSummary(Set\u003cString\u003e selectedGenres) {\n        if (selectedGenres.size() \u003c= 3) {\n            return String.join(\", \", selectedGenres);\n        }\n        List\u003cString\u003e sorted = new ArrayList\u003c\u003e(selectedGenres);\n        sorted.sort(String::compareTo);\n        return sorted.get(0) + \", \" + sorted.get(1) + \", + \" + (sorted.size() - 2) + \" more\";\n    }\n\n    /**\n     * Shows the stage (window).\n     */\n    public void show() {\n        primaryStage.show();\n    }\n}\n",
                "newText": "package spotify.view;\n\nimport spotify.controller.RecommendationEngine;\nimport spotify.controller.RecommendationEngine.SortField;\nimport spotify.model.TrackRecord;\n\nimport javafx.geometry.Insets;\nimport javafx.scene.Scene;\nimport javafx.scene.control.Button;\nimport javafx.scene.control.ComboBox;\nimport javafx.scene.control.Label;\nimport javafx.scene.control.ListView;\nimport javafx.scene.control.SelectionMode;\nimport javafx.scene.control.TextArea;\nimport javafx.scene.control.TextField;\nimport javafx.scene.layout.BorderPane;\nimport javafx.scene.layout.HBox;\nimport javafx.scene.layout.VBox;\nimport javafx.scene.text.Font;\nimport javafx.stage.Stage;\n\nimport java.util.ArrayList;\nimport java.util.HashSet;\nimport java.util.List;\nimport java.util.Set;\n\n/**\n * =============================================================================\n * TerminalView вҖ” JavaFX UI (VIEW layer of MVC)\n * =============================================================================\n * Builds the JavaFX window with a retro ASCII terminal aesthetic:\n *   - White/light-blue color scheme\n *   - Monospaced fonts throughout\n *   - Genre multi-select ListView\n *   - Popularity filter TextField\n *   - Sort-by ComboBox dropdown\n *   - Read-only TextArea for ASCII table output\n *\n * This class knows NOTHING about data loading or sorting internals.\n * It simply gathers user input, delegates to the controller, and displays results.\n * =============================================================================\n */\npublic class TerminalView {\n\n    // ---- UI Components ----\n    private final Stage primaryStage;\n    private final List\u003cTrackRecord\u003e allTracks;\n    private final RecommendationEngine engine;\n\n    private ListView\u003cString\u003e genreListView;\n    private TextField popularityField;\n    private ComboBox\u003cSortField\u003e sortComboBox;\n    private TextArea resultsArea;\n    private Label statusLabel;\n\n    /**\n     * Constructs the view and builds the entire UI.\n     *\n     * @param stage  The primary JavaFX Stage\n     * @param allTracks All loaded tracks from the dataset\n     * @param engine The recommendation engine for processing queries\n     */\n    public TerminalView(Stage primaryStage, List\u003cTrackRecord\u003e allTracks,\n                        RecommendationEngine engine) {\n        this.primaryStage = primaryStage;\n        this.allTracks = allTracks;\n        this.engine = engine;\n        buildScene();\n    }\n\n    /**\n     * Builds the complete scene with all UI components and styling.\n     */\n    private void buildScene() {\n        primaryStage.setTitle(\"Spotify Music Recommendation System\");\n\n        // ---- Main layout: BorderPane ----\n        BorderPane root = new BorderPane();\n        root.getStyleClass().add(\"main-panel\");\n\n        // ---- TOP: Title banner ----\n        VBox topPanel = buildTopPanel();\n        BorderPane.setAlignment(topPanel, javafx.geometry.Pos.CENTER);\n        root.setTop(topPanel);\n\n        // ---- CENTER: Controls + Results ----\n        VBox centerPanel = buildCenterPanel();\n        root.setCenter(centerPanel);\n\n        // ---- BOTTOM: Status bar ----\n        statusLabel = new Label(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n        statusLabel.getStyleClass().add(\"status-bar\");\n        statusLabel.setMaxWidth(Double.MAX_VALUE);\n        root.setBottom(statusLabel);\n\n        // ---- Load CSS ----\n        Scene scene = new Scene(root, 900, 720);\n        scene.getStylesheets().add(\n                getClass().getResource(\"terminal.css\").toExternalForm()\n        );\n\n        primaryStage.setScene(scene);\n        primaryStage.setMinWidth(800);\n        primaryStage.setMinHeight(600);\n    }\n\n    /**\n     * Builds the title banner at the top of the window.\n     */\n    private VBox buildTopPanel() {\n        VBox vbox = new VBox(6);\n        vbox.setPadding(new Insets(10, 15, 5, 15));\n\n        // ASCII art title\n        Label titleLabel = new Label(\n                \"в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\\n\"\n                + \"в•‘   ____        _        ____  _                        в•‘\\n\"\n                + \"в•‘  / ___| _   _| |__    / ___|(_)_ __ ___  ___  ___    в•‘\\n\"\n                + \"в•‘  \\\\___ \\\\| | | | '_ \\\\  | |  _ | | '__/ _ \\\\/ __|/ _ \\\\   в•‘\\n\"\n                + \"в•‘   ___) | |_| | |_) | | |_| || | | |  __/\\\\__ \\\\  __/   в•‘\\n\"\n                + \"в•‘  |____/ \\\\__,_|_.__/   \\\\____||_|_|  \\\\___||___/\\\\___|   в•‘\\n\"\n                + \"в•‘                                                      в•‘\\n\"\n                + \"в•‘         Music Recommendation System                  в•‘\\n\"\n                + \"в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\"\n        );\n        titleLabel.getStyleClass().add(\"title-label\");\n        titleLabel.setWrapText(true);\n\n        Label subtitleLabel = new Label(\n                \"Powered by Merge Sort  вҖў  Filter by Genre  вҖў  Weighted Vibe Score\"\n        );\n        subtitleLabel.getStyleClass().add(\"subtitle-label\");\n\n        vbox.getChildren().addAll(titleLabel, subtitleLabel);\n        return vbox;\n    }\n\n    /**\n     * Builds the center panel containing controls and results area.\n     */\n    private VBox buildCenterPanel() {\n        VBox vbox = new VBox(10);\n        vbox.setPadding(new Insets(10, 15, 10, 15));\n\n        // --- Controls panel ---\n        VBox controlsPanel = buildControlsPanel();\n        controlsPanel.getStyleClass().add(\"control-panel\");\n\n        // --- Results area ---\n        resultsArea = new TextArea();\n        resultsArea.setEditable(false);\n        resultsArea.setWrapText(false);\n        resultsArea.getStyleClass().add(\"terminal-textarea\");\n        resultsArea.setFont(Font.font(\"Consolas\", 13));\n        resultsArea.setPromptText(\n                \"  Results will appear here after you click [RECOMMEND]...\"\n        );\n\n        vbox.getChildren().addAll(controlsPanel, resultsArea);\n        VBox.setVgrow(resultsArea, javafx.scene.layout.Priority.ALWAYS);\n\n        return vbox;\n    }\n\n    /**\n     * Builds the controls panel with genre selection, popularity filter,\n     * sort dropdown, and action buttons.\n     */\n    private VBox buildControlsPanel() {\n        VBox controlsBox = new VBox(10);\n\n        // ---- Row 1: Genre selection ----\n        Label genreLabel = new Label(\"GENRES (Multi-select with Ctrl+Click / Shift+Click):\");\n        genreLabel.getStyleClass().add(\"section-label\");\n\n        genreListView = new ListView\u003c\u003e();\n        genreListView.getSelectionModel().setSelectionMode(SelectionMode.MULTIPLE);\n        genreListView.getStyleClass().add(\"genre-list-view\");\n\n        // Populate genres alphabetically\n        List\u003cString\u003e genres = engine.getAllGenres(allTracks);\n        genreListView.getItems().addAll(genres);\n\n        VBox.setVgrow(genreListView, javafx.scene.layout.Priority.SOMETIMES);\n\n        // ---- Row 2: Popularity filter + Sort by ----\n        HBox filterRow = new HBox(20);\n        filterRow.getStyleClass().add(\"controls-row\");\n\n        // Popularity filter\n        VBox popBox = new VBox(4);\n        Label popLabel = new Label(\"MIN POPULARITY (0-100, optional):\");\n        popLabel.getStyleClass().add(\"section-label\");\n        popularityField = new TextField();\n        popularityField.getStyleClass().add(\"filter-text-field\");\n        popularityField.setPromptText(\"e.g. 50\");\n        popularityField.setPrefWidth(80);\n        popBox.getChildren().addAll(popLabel, popularityField);\n\n        // Sort by dropdown\n        VBox sortBox = new VBox(4);\n        Label sortLabel = new Label(\"SORT BY:\");\n        sortLabel.getStyleClass().add(\"section-label\");\n        sortComboBox = new ComboBox\u003c\u003e();\n        sortComboBox.getItems().addAll(SortField.values());\n        sortComboBox.setValue(SortField.VIBE_SCORE); // Default sort\n        sortComboBox.getStyleClass().add(\"filter-combo-box\");\n        sortBox.getChildren().addAll(sortLabel, sortComboBox);\n\n        filterRow.getChildren().addAll(popBox, sortBox);\n\n        // ---- Row 3: Action buttons ----\n        HBox buttonRow = new HBox(15);\n        buttonRow.getStyleClass().add(\"controls-row\");\n\n        Button recommendBtn = new Button(\"в–ә  RECOMMEND\");\n        recommendBtn.getStyleClass().add(\"btn-recommend\");\n        recommendBtn.setOnAction(e -\u003e handleRecommend());\n\n        Button clearBtn = new Button(\"вң•  CLEAR\");\n        clearBtn.getStyleClass().add(\"btn-clear\");\n        clearBtn.setOnAction(e -\u003e handleClear());\n\n        Button selectAllBtn = new Button(\"вҳҗ SELECT ALL GENRES\");\n        selectAllBtn.getStyleClass().add(\"btn-clear\");\n        selectAllBtn.setOnAction(e -\u003e handleSelectAllGenres());\n\n        buttonRow.getChildren().addAll(recommendBtn, clearBtn, selectAllBtn);\n\n        controlsBox.getChildren().addAll(genreLabel, genreListView, filterRow, buttonRow);\n        return controlsBox;\n    }\n\n    // ==================== EVENT HANDLERS ====================\n\n    /**\n     * Handles the RECOMMEND button click.\n     * 1. Validates that at least one genre is selected.\n     * 2. Parses optional popularity filter.\n     * 3. Applies filters via the engine.\n     * 4. Sorts results via Merge Sort.\n     * 5. Formats and displays the top 10 as an ASCII table.\n     */\n    private void handleRecommend() {\n        // Step 1: Get selected genres\n        Set\u003cString\u003e selectedGenres = new HashSet\u003c\u003e(genreListView.getSelectionModel().getSelectedItems());\n\n        if (selectedGenres.isEmpty()) {\n            statusLabel.setText(\"вҡ  Please select at least one genre.\");\n            resultsArea.setText(\n                    \"в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\\n\"\n                    + \"в”Ӯ  вҡ   No genres selected!                                в”Ӯ\\n\"\n                    + \"в”Ӯ                                                        в”Ӯ\\n\"\n                    + \"в”Ӯ  Please select one or more genres from the list above в”Ӯ\\n\"\n                    + \"в”Ӯ  using Ctrl+Click or Shift+Click, then try again.     в”Ӯ\\n\"\n                    + \"в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\"\n            );\n            return;\n        }\n\n        // Step 2: Parse optional popularity threshold\n        int minPopularity = 0;\n        String popText = popularityField.getText().trim();\n        if (!popText.isEmpty()) {\n            try {\n                minPopularity = Integer.parseInt(popText);\n                minPopularity = Math.max(0, Math.min(100, minPopularity)); // Clamp 0-100\n            } catch (NumberFormatException e) {\n                statusLabel.setText(\"вҡ  Invalid popularity value. Using 0 (no filter).\");\n                minPopularity = 0;\n            }\n        }\n\n        // Step 3: Get sort field\n        SortField sortField = sortComboBox.getValue();\n        if (sortField == null) {\n            sortField = SortField.VIBE_SCORE;\n        }\n\n        // Step 4: Execute recommendation pipeline\n        long startTime = System.currentTimeMillis();\n\n        // Filter by genres (multi-genre OR logic)\n        List\u003cTrackRecord\u003e filtered = engine.filterByGenres(allTracks, selectedGenres);\n\n        // Filter by minimum popularity\n        filtered = engine.filterByPopularity(filtered, minPopularity);\n\n        // Sort using Merge Sort (O(n log n))\n        engine.sortBy(filtered, sortField);\n\n        long elapsed = System.currentTimeMillis() - startTime;\n\n        // Step 5: Format and display top 10\n        String table = engine.formatTopN(filtered, 10);\n\n        // Add header info\n        StringBuilder fullOutput = new StringBuilder();\n        fullOutput.append(\"  Sort: \").append(sortField)\n                .append(\"  |  Genres: \").append(selectedGenres.size())\n                .append(\"  |  Filtered: \").append(filtered.size())\n                .append(\"  |  Time: \").append(elapsed).append(\"ms\\n\\n\");\n        fullOutput.append(table);\n\n        resultsArea.setText(fullOutput.toString());\n        resultsArea.positionCaret(0); // Scroll to top\n\n        // Update status bar\n        String genreSummary = buildGenreSummary(selectedGenres);\n        statusLabel.setText(\n                \"вң“ Found \" + filtered.size() + \" tracks | Sorted by \"\n                + sortField + \" | \" + genreSummary\n        );\n    }\n\n    /**\n     * Handles the CLEAR button click вҖ” resets all filters and results.\n     */\n    private void handleClear() {\n        genreListView.getSelectionModel().clearSelection();\n        popularityField.clear();\n        sortComboBox.setValue(SortField.VIBE_SCORE);\n        resultsArea.clear();\n        statusLabel.setText(\"Ready. Select genres and click [RECOMMEND] to begin.\");\n    }\n\n    /**\n     * Handles the SELECT ALL GENRES button вҖ” selects every genre in the list.\n     */\n    private void handleSelectAllGenres() {\n        genreListView.getSelectionModel().selectAll();\n    }\n\n    /**\n     * Builds a short summary string of selected genres for the status bar.\n     */\n    private String buildGenreSummary(Set\u003cString\u00               "content": "# рҹҺө Spotify Music Recommendation System\n\nA university project that builds an **interactive music recommendation system** using a Spotify dataset of ~114,000 tracks. Built entirely in **Java** with a **JavaFX GUI** styled as a retro ASCII terminal.\n\n---\n\n## рҹ“Ӣ Table of Contents\n\n- [Features](#-features)\n- [How It Works](#-how-it-works)\n- [Quick Start](#-quick-start)\n- [Installation](#-installation)\n- [Usage Guide](#-usage-guide)\n- [Project Structure](#-project-structure)\n- [Architecture (MVC)](#-architecture-mvc)\n- [OOP Principles](#-oop-principles)\n- [Merge Sort](#-merge-sort)\n- [Scoring Formula](#-scoring-formula)\n- [Troubleshooting](#-troubleshooting)\n- [Tech Stack](#-tech-stack)\n\n---\n\n## вңЁ Features\n\n- рҹ”Қ **Multi-Genre Filtering** вҖ” Select one or more genres to discover matching tracks\n- рҹ“Ҡ **Popularity Filter** вҖ” Optionally set a minimum popularity threshold (0вҖ“100)\n- рҹҺҡпёҸ **Sortable Results** вҖ” Sort by Vibe Score, Popularity, Danceability, Energy, or Valence\n- вҡЎ **Merge Sort** вҖ” Custom O(n log n) sorting algorithm implemented from scratch\n- рҹ–ҘпёҸ **Retro ASCII Terminal UI** вҖ” White and light-blue styled GUI with monospaced fonts\n- рҹ“Ҳ **Top 10 Results** вҖ” Clean ASCII table output with track rankings and composite scores\n- рҹ“Ұ **~114K Tracks** вҖ” Full dataset loaded in memory for instant query results\n\n---\n\n## рҹ§  How It Works\n\n1. **At startup**, the system loads ~114,000 tracks from a CSV dataset into memory\n2. **You select** one or more genres from the alphabetical list (Ctrl+Click for multiple)\n3. **Optionally** set a minimum popularity number (e.g., `50` means only tracks with popularity вүҘ 50)\n4. **Choose** how to sort the results from the dropdown\n5. **Click RECOMMEND** вҶ’ the system filters tracks, sorts them, and displays the Top 10 as a formatted ASCII table\n\n**Behind the scenes:**\n\n```\nCSV File в”Җв”Җв–ә TrackRepository (loads \u0026 parses)\n                в”Ӯ\n                в–ј\n         List\u003cTrackRecord\u003e (~114K objects)\n                в”Ӯ\n                в–ј  в”Ңв”Җ filterByGenres(selectedGenres)\n     RecommendationEngine в”ңв”Җ filterByPopularity(minPopularity)\n                в”Ӯ          в””в”Җ sortBy(field) в”Җв”Җв–ә MergeSort (O(n log n))\n                в–ј\n         formatTopN(filtered, 10) в”Җв”Җв–ә ASCII Table String\n                в”Ӯ\n                в–ј\n         TerminalView displays results\n```\n\n---\n\n## рҹҡҖ Quick Start\n\n### Prerequisites\n\n| Requirement | Version | Notes |\n|-------------|---------|-------|\n| **Java JDK** | 17+ (tested with 25) | Adoptium/Temurin recommended |\n| **JavaFX SDK** | 21+ (tested with 26) | Separate download, see below |\n\n### Install Java\n\nIf you don't have Java installed, download **Temurin JDK** from:\nрҹ‘ү https://adoptium.net/\n\nVerify installation:\n\n```cmd\njavac -version\njava -version\n```\n\n### Install JavaFX SDK\n\nJavaFX is **not** bundled with Java. Download it separately:\n\n1. Go to https://gluonhq.com/products/javafx/\n2. Download the **Windows SDK** zip\n3. Extract it to a simple path, e.g. `C:\\javafx-sdk-26\\`\n\nVerify the extraction worked:\n\n```\nC:\\javafx-sdk-26\\lib\\javafx.controls.jar  вҶҗ this file must exist\nC:\\javafx-sdk-26\\lib\\javafx.fxml.jar      вҶҗ this too\n```\n\n### Configure \u0026 Build\n\n1. Open `build.bat` in a text editor\n2. Set your **Java path** and **JavaFX path** at the top:\n\n```bat\nset JAVA_HOME=C:\\Program Files\\Eclipse Adoptium\\jdk-25.0.2.10-hotspot\nset JAVAFX_LIB=C:\\javafx-sdk-26\\lib\n```\n\n3. Open a terminal in the project folder and run:\n\n```cmd\nbuild.bat          вҶҗ compiles the project\nbuild.bat run      вҶҗ compiles (if needed) and launches the app\n```\n\nThat's it. A window will appear.\n\n---\n\n## рҹ“– Usage Guide\n\n### Main Window Layout\n\n```\nв•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\nв•‘          Spotify Music Recommendation System             в•‘\nв•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\n\nв”Ңв”Җв”Җв”Җ GENRES (Multi-select) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ в–Ў acoustic                                               в”Ӯ\nв”Ӯ в–Ў afrobeat                                               в”Ӯ\nв”Ӯ в–Ў alternative                                            в”Ӯ\nв”Ӯ ... (114 genres total, alphabetical)                     в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nMIN POPULARITY: [____]     SORT BY: [VIBE_SCORE в–ј]\n\n[в–ә RECOMMEND]  [вң• CLEAR]  [вҳҗ SELECT ALL GENRES]\n\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ Rank в”Ӯ Track                    в”Ӯ Artist   в”Ӯ Genre   в”Ӯ Score в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ    1 в”Ӯ Comedy                   в”Ӯ Gen H... в”Ӯ acousticв”Ӯ  72.4 в”Ӯ\nв”Ӯ    2 в”Ӯ Ghost - Acoustic         в”Ӯ Ben W... в”Ӯ acousticв”Ӯ  65.1 в”Ӯ\nв”Ӯ   ...в”Ӯ                          в”Ӯ          в”Ӯ         в”Ӯ       в”Ӯ\nв”Ӯ   10 в”Ӯ ...                      в”Ӯ          в”Ӯ         в”Ӯ       в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Controls\n\n| Control | What it does |\n|---------|-------------|\n| **Genre List** | Select one or more genres with **Ctrl+Click** (individual) or **Shift+Click** (range) |\n| **Min Popularity** | Optional. Type a number 0вҖ“100. Leave empty to skip this filter |\n| **Sort By** | Dropdown to choose the sort field (see below) |\n| **RECOMMEND** | Execute the search and display results |\n| **CLEAR** | Reset all selections and results |\n| **SELECT ALL GENRES** | Select every genre at once |\n\n### Sort Options\n\n| Sort Field | Description |\n|------------|-------------|\n| **VIBE_SCORE** | Composite score (popularity + danceability + energy + valence). **Default and recommended choice** |\n| **POPULARITY** | Raw Spotify popularity (0вҖ“100). Most popular tracks first |\n| **DANCEABILITY** | Tracks best suited for dancing |\n| **ENERGY** | Most intense / energetic tracks |\n| **VALENCE** | Most positive / happy-sounding tracks |\n\n### Example Queries\n\n**\"I want upbeat pop music\"**\n1. Select `pop` and `dance` genres\n2. Set Min Popularity to `60`\n3. Sort by `ENERGY`\n4. Click RECOMMEND\n\n**\"Show me the best acoustic tracks overall\"**\n1. Select `acoustic`\n2. Leave Min Popularity empty\n3. Sort by `VIBE_SCORE`\n4. Click RECOMMEND\n\n**\"I want chill vibes across multiple genres\"**\n1. Select `ambient`, `chill`, `lo-fi`\n2. Set Min Popularity to `40`\n3. Sort by `VALENCE`\n4. Click RECOMMEND\n\n---\n\n## рҹ“Ғ Project Structure\n\n```\nDSA_PROJECT/\nв”Ӯ\nв”ңв”Җв”Җ README.md                          вҶҗ You are here\nв”ңв”Җв”Җ build.bat                          вҶҗ Compile \u0026 run script\nв”Ӯ\nв”ңв”Җв”Җ dataset/\nв”Ӯ   в””в”Җв”Җ dataset.csv                    (~19MB, 114K tracks)\nв”Ӯ\nв”ңв”Җв”Җ out/                               вҶҗ Compiled .class files (auto-generated)\nв”Ӯ   в””в”Җв”Җ spotify/\nв”Ӯ       в”ңв”Җв”Җ Main.class\nв”Ӯ       в”ңв”Җв”Җ model/\nв”Ӯ       в”ңв”Җв”Җ repository/\nв”Ӯ       в”ңв”Җв”Җ controller/\nв”Ӯ       в””в”Җв”Җ view/\nв”Ӯ           в””в”Җв”Җ terminal.css\nв”Ӯ\nв””в”Җв”Җ src/spotify/\n    в”ңв”Җв”Җ Main.java                      вҶҗ Application entry point\n    в”Ӯ\n    в”ңв”Җв”Җ model/\n    в”Ӯ   в”ңв”Җв”Җ AudioEntity.java           вҶҗ Interface (Abstraction)\n    в”Ӯ   в”ңв”Җв”Җ BaseEntity.java            вҶҗ Abstract class (Encapsulation + Inheritance)\n    в”Ӯ   в””в”Җв”Җ TrackRecord.java           вҶҗ Concrete class (Polymorphism)\n    в”Ӯ\n    в”ңв”Җв”Җ repository/\n    в”Ӯ   в””в”Җв”Җ TrackRepository.java       вҶҗ CSV loading \u0026 parsing\n    в”Ӯ\n    в”ңв”Җв”Җ controller/\n    в”Ӯ   в”ңв”Җв”Җ MergeSorter.java           вҶҗ Generic Merge Sort from scratch\n    в”Ӯ   в””в”Җв”Җ RecommendationEngine.java  вҶҗ Filtering, scoring, sorting\n    в”Ӯ\n    в””в”Җв”Җ view/\n        в”ңв”Җв”Җ TerminalView.java          вҶҗ JavaFX UI construction\n        в””в”Җв”Җ terminal.css               вҶҗ Retro terminal stylesheet\n```\n\n---\n\n## рҹҸ—пёҸ Architecture (MVC)\n\nThe project follows the **Model-View-Controller** pattern:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    MVC Architecture                   в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  MODEL   в”Ӯ    CONTROLLER        в”Ӯ       VIEW         в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ                    в”Ӯ\nв”Ӯ Audio-   в”Ӯ TrackRepository      в”Ӯ TerminalView       в”Ӯ\nв”Ӯ Entity   в”Ӯ  в””в”Җ loadTracks()     в”Ӯ  в””в”Җ buildScene()   в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ  в””в”Җ handleRecommend()в”Ӯ\nв”Ӯ Base-    в”Ӯ RecommendationEngine в”Ӯ                    в”Ӯ\nв”Ӯ Entity   в”Ӯ  в”ңв”Җ filterByGenres() в”Ӯ  JavaFX components в”Ӯ\nв”Ӯ          в”Ӯ  в”ңв”Җ filterByPop()    в”Ӯ  ASCII table       в”Ӯ\nв”Ӯ Track-   в”Ӯ  в”ңв”Җ sortBy() в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә  CSS styling       в”Ӯ\nв”Ӯ Record   в”Ӯ  в”ңв”Җ formatTopN()     в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ  в””в”Җ getAllGenres()   в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ                      в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ MergeSorter          в”Ӯ                    в”Ӯ\nв”Ӯ          в”Ӯ  в””в”Җ sort()           в”Ӯ                    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n| Layer | Responsibility |\n|-------|---------------|\n| **Model** | Data classes (`AudioEntity`, `BaseEntity`, `TrackRecord`) that represent a track |\n| **Controller** | Business logic: CSV loading, filtering, sorting, scoring, formatting |\n| **View** | JavaFX UI: layout, controls, event handlers, ASCII table display |\n\n---\n\n## рҹҺ“ OOP Principles\n\nThis project demonstrates all four core OOP principles:\n\n| Principle | Where | How |\n|-----------|-------|-----|\n| **Abstraction** | `AudioEntity.java` | Interface defines *what* a track can do, not *how*. The engine sorts any `AudioEntity` without knowing its internals |\n| **Encapsulation** | `BaseEntity.java` | All 13 fields are `private`. External code accesses them only through getters/setters |\n| **Inheritance** | `TrackRecord extends BaseEntity` | `TrackRecord` inherits all fields and the `calculateVibeScore()` method from `BaseEntity` |\n| **Polymorphism** | `toAsciiRow(int rank)` | Declared as `abstract` in `BaseEntity`, implemented in `TrackRecord`. The View calls `entity.toAsciiRow()` on any `AudioEntity` reference вҖ” the correct implementation runs at runtime |\n\n---\n\n## рҹ”Җ Merge Sort\n\n### Why Merge Sort?\n\n- **Guaranteed O(n log n)** time complexity in all cases (best, average, worst)\n- **Stable sort** вҖ” equal elements preserve their original order\n- Clean divide-and-conquer structure that's easy to explain and analyze\n\n### Implementation Details\n\n- **Generic**: Works with `List\u003cT\u003e` and any `Comparator\u003cT\u003e`\n- **From scratch**: Zero use of `Collections.sort()` or `Arrays.sort()`\n- **In-place**: Modifies the original list (uses auxiliary array for merging)\n- **5 sort fields**: Vibe Score, Popularity, Danceability, Energy, Valence\n\n### Complexity\n\n```\nRecurrence:  T(n) = 2В·T(n/2) + O(n)\n\n  Divide:    Split list in half         вҶ’ O(1)\n  Conquer:   Recursively sort halves    вҶ’ 2В·T(n/2)\n  Combine:   Merge two sorted halves    вҶ’ O(n)\n\nExpanded:    T(n) = n + nВ·logвӮӮ(n)\n  Worst:     O(n log n)\n  Average:   O(n log n)\n  Best:      O(n log n)\n  Space:     O(n) auxiliary\n```\n\n---\n\n## рҹ“җ Scoring Formula\n\n### Vibe Score (Equal Weights)\n\nEach track receives a **Vibe Score** calculated as:\n\n```\nVibe Score = (popularity + danceabilityГ—100 + energyГ—100 + valenceГ—100) Г· 4\n```\n\n**Why multiply by 100?**\n- `popularity` is already 0вҖ“100\n- `danceability`, `energy`, and `valence` are 0.0вҖ“1.0\n- Multiplying by 100 normalizes them all to the 0вҖ“100 scale\n\n**Example:**\n\n| Track | Popularity | Danceability | Energy | Valence | Vibe Score |\n|-------|-----------|-------------|--------|---------|------------|\n| Song A | 80 | 0.75 | 0.60 | 0.80 | **73.8** |\n\n```\n(80 + 75 + 60 + 80) Г· 4 = 73.75 вүҲ 73.8\n```\n\n---\n\n## рҹӣ пёҸ Troubleshooting\n\n### \"JavaFX SDK not found\"\n\n```\n[ERROR] JavaFX SDK not found at: C:\\javafx-sdk-26\\lib\n```\n\n**Fix:**\n1. Make sure you downloaded and extracted the JavaFX SDK zip\n2. Check that this file exists: `C:\\javafx-sdk-26\\lib\\javafx.controls.jar`\n3. Update `JAVAFX_LIB` in `build.bat` to the correct `lib` folder path\n\n### \"javac not found\"\n\n```\n[ERROR] javac not found at: ...\n```\n\n**Fix:**\n1. Install a JDK (not just a JRE). Recommended: https://adoptium.net/\n2. Update `JAVA_HOME` in `build.bat` to your JDK installation path\n3. Open a **new** terminal after installing Java\n\n### Compilation errors about `javafx.application`\n\n```\nerror: package javafx.application is not visible\n```\n\n**Fix:** This means the `--module-path` and `--add-modules` flags aren't being passed to `javac`. Ensure `JAVAFX_LIB` is set correctly in `build.bat` and use `build.bat` (not raw `javac`) to compile.\n\n### App window doesn't appear\n\n- Check the terminal for error messages\n- Ensure the CSV file exists at `dataset/dataset.csv` relative to the project folder\n- The dataset is ~19MB and 114K rows вҖ” loading takes 2вҖ“5 seconds. Wait for the window to appear.\n\n### \"No matching tracks found\"\n\n- Try selecting a different genre\n- Check if your **Min Popularity** filter is too high (e.g., `95` may return very few results)\n- Some genres have fewer tracks than others\n\n---\n\n## рҹ’» Tech Stack\n\n| Technology | Version | Purpose |\n|------------|---------|---------|\n| **Java (Temurin)** | 25 LTS | Programming language |\n| **JavaFX** | 26 | GUI framework |\n| **CSV Dataset** | Spotify ~114K tracks | Music data source |\n\n### External Dependencies\n\n**None.** The project uses only:\n- Java Standard Library (`java.io`, `java.nio`, `java.util`)\n- JavaFX (`javafx.controls`, `javafx.fxml`)\n\nNo third-party libraries (no OpenCSV, no Maven, no Gradle).\n\n---\n\n## рҹ“қ Dataset\n\nThe project uses a Spotify dataset CSV file with the following columns:\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `track_id` | String | Unique Spotify ID |\n| `artists` | String | Artist name(s) |\n| `album_name` | String | Album title |\n| `track_name` | String | Song title |\n| `popularity` | int (0вҖ“100) | Spotify popularity metric |\n| `duration_ms` | long | Track length in milliseconds |\n| `explicit` | boolean | Explicit content flag |\n| `danceability` | double (0.0вҖ“1.0) | Danceability metric |\n| `energy` | double (0.0вҖ“1.0) | Energy / intensity metric |\n| `valence` | double (0.0вҖ“1.0) | Musical positiveness |\n| `track_genre` | String | Single genre classification |\n\nThe dataset contains **114 unique genres** and **~114,000 tracks**.\n\n---\n\n## рҹ‘Ө Author\n\nUniversity project вҖ” Data Structures \u0026 Algorithms course.\n\n---\n\n## рҹ“„ License\n\nEducational use only. Dataset sourced from Spotify for academic purposes.\n"
